<section class="flex h-full flex-col bg-slate-950/80 text-slate-100" data-ng-controller="HeaderController">
  <div class="border-b border-white/10 px-5 py-6">
    <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Lab controls</p>
    <p class="text-sm text-slate-300">Add nodes, manage networks, and tune startup configs from here.</p>
  </div>

  <div class="flex-1 space-y-8 overflow-y-auto px-5 py-6">
    <div class="space-y-3">
      <p class="text-xs uppercase tracking-[0.4em] text-slate-400">Add an object</p>
      <div class="grid gap-2">
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="addNewCursor('node')">
          Node
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="addNewCursor('network')">
          Network
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="addNewCursor('image')">
          Picture
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="addNewCursor('shape')">
          Custom shape
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="addNewCursor('text')">
          Text label
        </button>
      </div>
    </div>

    <div class="space-y-3">
      <p class="text-xs uppercase tracking-[0.4em] text-slate-400">Inventory panels</p>
      <div class="space-y-2">
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/5 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/15"
                ng-click="openModal('nodeList', 'megalg')">
          Nodes
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/5 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/15"
                ng-click="openModal('netList', 'megalg')">
          Networks
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/5 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/15"
                ng-click="openModal('startUpConfig', 'megalg')">
          Startup-configs
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/5 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/15"
                ng-click="openModal('configObject', 'megalg')">
          Configured objects
        </button>
      </div>
    </div>

    <div class="space-y-3">
      <p class="text-xs uppercase tracking-[0.4em] text-slate-400">More actions</p>
      <div class="space-y-2">
        <button type="button"
                class="pointer w-full rounded-2xl border border-emerald-400/40 bg-emerald-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-emerald-100 transition hover:bg-emerald-500/30"
                ng-click="startAllNode()">
          Start all nodes
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-amber-400/40 bg-amber-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-amber-100 transition hover:bg-amber-500/30"
                ng-click="stopAllNode()">
          Stop all nodes
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-rose-400/40 bg-rose-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-rose-100 transition hover:bg-rose-500/30"
                ng-click="wipeAllNode()">
          Wipe all nodes
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
                ng-click="exportAllCFG()">
          Export all CFGs
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-sky-400/40 bg-sky-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-sky-100 transition hover:bg-sky-500/30"
                ng-click="setAllStartupExport()">
          Set startup-cfg exported
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-slate-400/40 bg-slate-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-slate-100 transition hover:bg-slate-500/30"
                ng-click="setAllStartupNone()">
          Set startup-cfg none
        </button>
        <button type="button"
                class="pointer w-full rounded-2xl border border-rose-400/40 bg-rose-500/15 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] text-rose-100 transition hover:bg-rose-500/30"
                ng-click="deleteAllStartupConfig()">
          Delete all startup-cfg
        </button>
      </div>
    </div>

    <div class="space-y-2">
      <p class="text-xs uppercase tracking-[0.4em] text-slate-400">Utilities</p>
      <button type="button"
              class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              data-ng-click="topologyRefresh()">
        Refresh topology
      </button>
      <button type="button"
              id="freeSelect"
              class="pointer noneActive w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              data-ng-click="freeSelect()">
        Free select
      </button>
      <button type="button"
              class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              ng-click="openModal('sysStat', 'megalg')">
        Status
      </button>
      <button type="button"
              class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              ng-click="openModal('labDetails', 'megalg')">
        Lab details
      </button>
      <button type="button"
              class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              data-ng-click="closeLab()">
        Close lab
      </button>
      <button type="button"
              class="pointer w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-left text-sm font-semibold uppercase tracking-[0.2em] transition hover:bg-white/10"
              ng-click="logout()">
        Logout
      </button>
    </div>
  </div>
</section>
