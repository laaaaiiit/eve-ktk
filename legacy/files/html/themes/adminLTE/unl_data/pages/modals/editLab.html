<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm"></div>
  <div class="relative w-full max-w-5xl rounded-3xl border border-white/10 bg-gradient-to-br from-slate-950 via-blue-950 to-slate-900 text-slate-100 shadow-2xl">
    <div class="flex items-start justify-between gap-4 border-b border-white/10 px-8 py-6">
      <div>
        <p class="text-xs uppercase tracking-[0.4em] text-blue-200/80">Workspace</p>
        <h3 class="text-2xl font-semibold text-white">Edit lab metadata</h3>
        <p class="text-sm text-slate-300">Adjust the name, version, timeout, or descriptive text for this lab.</p>
      </div>
      <button type="button" class="text-slate-400 hover:text-white transition text-2xl leading-none" ng-click="closeModal()">&times;</button>
    </div>

    <div class="px-8 py-6">
      <form id="form-lab-edit" name="formLabEdit" class="space-y-6">
        <div class="grid gap-6 lg:grid-cols-[1.2fr_1fr]">
          <div class="space-y-4">
            <div>
              <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Path</label>
              <input class="w-full rounded-2xl border border-white/10 bg-slate-900/50 px-4 py-3 text-white opacity-60"
                     name="lab[path]"
                     ng-model="labData.filename"
                     disabled>
            </div>

            <div>
              <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Name <span class="text-rose-300">*</span></label>
              <input class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                     name="name"
                     ng-model="labData.name"
                     required
                     ng-pattern="restrictNumber">
              <p class="text-xs mt-1" ng-class="formLabEdit.name.$valid ? 'text-slate-500' : 'text-rose-400'">Use only [A-Z a-z 0-9 -] characters.</p>
            </div>

            <div class="grid gap-4 sm:grid-cols-2">
              <div>
                <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Version <span class="text-rose-300">*</span></label>
                <input class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                       name="version"
                       ng-model="labData.version"
                       ng-pattern="restrictTest">
                <p class="text-xs mt-1" ng-class="formLabEdit.version.$valid ? 'text-slate-500' : 'text-rose-400'">Must be numeric.</p>
              </div>
              <div>
                <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Script timeout (sec)</label>
                <input class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                       name="lab[scripttimeout]"
                       ng-model="labData.scripttimeout"
                       placeholder="300">
              </div>
            </div>

            <div ng-if="role === 'admin'">
              <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Author</label>
              <input class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                     name="lab[author]"
                     ng-model="labData.author">
            </div>

            <p class="text-xs text-slate-400"><span class="text-rose-300">*</span> Required fields</p>
          </div>

          <div class="space-y-4">
            <div>
              <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Description</label>
              <textarea class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white min-h-[8rem] focus:outline-none focus:ring-2 focus:ring-blue-400"
                        name="lab[description]"
                        ng-model="labData.description"></textarea>
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.3em] text-slate-400">Tasks</label>
              <textarea class="w-full rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 text-white min-h-[8rem] focus:outline-none focus:ring-2 focus:ring-blue-400"
                        name="lab[body]"
                        ng-model="labData.body"></textarea>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-end gap-3">
          <button type="button"
                  class="rounded-2xl border border-white/20 px-4 py-2 text-xs font-semibold uppercase tracking-[0.3em] text-slate-200 hover:bg-white/10 transition"
                  ng-click="closeModal()">
            Cancel
          </button>
          <button type="submit"
                  class="rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-400 px-5 py-2 text-xs font-semibold uppercase tracking-[0.3em] text-white shadow-lg hover:shadow-2xl transition"
                  ng-click="saveChanged()">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
