<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 theme-overlay transition-colors duration-300"></div>
  <div class="relative w-full max-w-xl rounded-3xl border shadow-2xl transition-colors duration-300"
       ng-class="themeClass('border-white/10 bg-gradient-to-br from-blue-950 via-blue-900 to-slate-900 text-slate-100','bg-white border-slate-200 text-slate-900')">
    <div class="flex flex-col gap-2 px-8 pt-8 pb-4 border-b" ng-class="themeClass('border-white/10','border-slate-200')">
      <div>
        <h3 class="text-2xl font-semibold theme-heading" data-ng-bind="t.modalEditTitle"></h3>
        <p class="theme-muted text-sm" data-ng-bind="t.modalEditSubtitle"></p>
      </div>
    </div>

    <div class="px-8 py-6">
      <form role="form" name="form" class="space-y-5">
        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalUsernameLabel"></label>
          <input type="text"
                 class="theme-input disabled:opacity-60"
                 ng-class="themeClass('', 'bg-slate-100 text-slate-500 border-slate-200 cursor-not-allowed')"
                 data-ng-model="username"
                 disabled>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalPasswordLabel"></label>
          <input type="password"
                 class="theme-input"
                 ng-class="{'input-error': errorClass == 'has-error passwd'}"
                 data-ng-model="passwd"
                 placeholder="{{t.modalPasswordLabel}}">
          <p class="text-xs text-red-500 mt-1" data-ng-show="errorClass == 'has-error passwd'" data-ng-bind="errorMessage"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalPasswordConfirmLabel"></label>
          <input type="password"
                 class="theme-input"
                 ng-class="{'input-error': errorClass == 'has-error passwdConfirm' || passwdConfirm != passwd}"
                 data-ng-model="passwdConfirm"
                 placeholder="{{t.modalPasswordConfirmLabel}}">
          <p class="text-xs text-red-500 mt-1" data-ng-show="passwdConfirm != passwd" data-ng-bind="t.modalPasswordMismatch"></p>
          <p class="text-xs text-red-500 mt-1" data-ng-show="errorClass == 'has-error passwdConfirm'" data-ng-bind="errorMessage"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalRoleLabel"></label>
          <div class="relative">
            <select data-ng-model="selectRole"
                    data-ng-options="y for (x,y) in roles"
                    class="theme-select">
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center" ng-class="themeClass('text-slate-500','text-slate-500')">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalLanguageLabel"></label>
          <div class="relative">
            <select data-ng-model="selectedLanguage"
                    data-ng-options="opt.key as opt.label for opt in languageOptions"
                    class="theme-select">
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center" ng-class="themeClass('text-slate-500','text-slate-500')">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalPodLabel"></label>
          <input type="text"
                 inputmode="numeric"
                 pattern="[0-9]*"
                 class="theme-input"
                 data-ng-model="pod"
                 ng-model-options="{ allowInvalid: true }"
                 placeholder="{{t.modalPodLabel}}">
        </div>

        <p class="text-xs theme-muted" data-ng-bind="t.modalRequiredHint"></p>
      </form>
    </div>

    <div class="flex items-center justify-end gap-3 px-8 pb-8 pt-2">
      <button class="px-4 py-2 rounded-xl border transition cursor-pointer"
              ng-class="themeClass('border-white/20 text-slate-200 hover:bg-white/10','border-slate-200 text-slate-800 hover:bg-slate-100')"
              type="button"
              ng-click="closeModal()"
              data-ng-bind="t.modalCancel">
      </button>
      <button class="px-5 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-400 text-white uppercase tracking-[0.25em] shadow-lg hover:shadow-2xl transition cursor-pointer {{blockButtonsClass}}"
              type="button"
              ng-disabled="blockButtons"
              ng-click="editUser()"
              data-ng-bind="t.modalSave">
      </button>
    </div>
  </div>
</div>
