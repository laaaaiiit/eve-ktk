<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController"></div>

<main class="min-h-screen theme-page transition-colors duration-300">
  <section class="max-w-[95rem] mx-auto w-full px-4 lg:px-8 py-12 flex flex-col gap-10">
    <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs uppercase theme-muted" data-ng-bind="t.heroEyebrow"></p>
        <h1 class="text-3xl lg:text-4xl font-semibold theme-heading" data-ng-bind="t.heroTitle"></h1>
        <p class="theme-muted text-lg leading-relaxed" data-ng-bind="t.heroDescription"></p>
        <p class="theme-muted text-sm" data-ng-bind="t.heroHint"></p>
      </div>
      <div class="self-start lg:self-auto">
        <button type="button"
                class="bg-gradient-to-r from-emerald-500 to-cyan-400 text-white font-semibold rounded-2xl px-6 py-3 uppercase shadow-xl hover:shadow-2xl transition text-sm cursor-pointer"
                data-ng-click="openModal('addcloud')">
          <span class="mr-2">+</span>
          <span data-ng-bind="t.addCloudButton"></span>
        </button>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-3">
      <article class="rounded-3xl theme-surface shadow-2xl p-5 space-y-2">
        <p class="text-xs uppercase theme-muted" data-ng-bind="t.statMappingsLabel"></p>
        <p class="text-4xl font-semibold theme-heading">{{cloudStats.total}}</p>
        <p class="theme-muted text-sm" data-ng-bind="t.statMappingsHint"></p>
      </article>
      <article class="rounded-3xl theme-surface shadow-2xl p-5 space-y-2">
        <p class="text-xs uppercase theme-muted" data-ng-bind="t.statUsersLabel"></p>
        <p class="text-4xl font-semibold theme-heading">{{cloudStats.users}}</p>
        <p class="theme-muted text-sm" data-ng-bind="t.statUsersHint"></p>
      </article>
      <article class="rounded-3xl theme-surface shadow-2xl p-5 space-y-2">
        <p class="text-xs uppercase theme-muted" data-ng-bind="t.statPnLabel"></p>
        <p class="text-4xl font-semibold theme-heading">{{cloudStats.pnets}}</p>
        <p class="theme-muted text-sm" data-ng-bind="t.statPnHint"></p>
      </article>
    </div>

    <div class="grid gap-4 xl:grid-cols-3">
      <section class="xl:col-span-2 flex flex-col gap-5">
        <div class="theme-surface rounded-3xl shadow-2xl p-6 space-y-4 transition-colors duration-300">
          <div class="flex items-center justify-between flex-wrap gap-4">
            <div>
              <h2 class="text-2xl font-semibold theme-heading" data-ng-bind="t.tableTitle"></h2>
              <p class="theme-muted text-sm" data-ng-bind="t.tableSubtitle"></p>
            </div>
          </div>

          <div class="rounded-2xl border shadow-inner overflow-x-auto transition-colors duration-300"
               ng-class="themeClass('border-white/10 bg-slate-950/50','border-slate-200 bg-white')">
            <table class="w-full min-w-[720px] text-sm text-left theme-table-body">
          <thead class="text-xs uppercase theme-table-head">
                <tr>
                  <th class="px-4 py-3 w-1/3">
                    <button type="button" class="flex items-center gap-2 w-full text-left cursor-pointer"
                            ng-click="setSort('cloudname')">
                      <span data-ng-bind="t.colCloudName"></span>
                      <i ng-class="sortIcon('cloudname')"></i>
                    </button>
                  </th>
                  <th class="px-4 py-3 w-1/4">
                    <button type="button" class="flex items-center gap-2 w-full text-left cursor-pointer"
                            ng-click="setSort('username')">
                      <span data-ng-bind="t.colUser"></span>
                      <i ng-class="sortIcon('username')"></i>
                    </button>
                  </th>
                  <th class="px-4 py-3 w-1/4">
                    <button type="button" class="flex items-center gap-2 w-full text-left cursor-pointer"
                            ng-click="setSort('pnet')">
                      <span data-ng-bind="t.colPnet"></span>
                      <i ng-class="sortIcon('pnet')"></i>
                    </button>
                  </th>
                  <th class="px-4 py-3 w-1/6 text-center" data-ng-bind="t.colActions"></th>
                </tr>
              </thead>
              <tbody class="divide-y" ng-class="themeClass('divide-white/5 text-slate-100','divide-slate-200 text-slate-900')" data-ng-if="sortedClouds.length">
                <tr data-ng-repeat="cloud in sortedClouds track by cloud.id" class="theme-hoverable transition">
                  <td class="px-4 py-3">
                    <p class="font-semibold theme-heading">{{cloud.cloudname}}</p>
                    <p class="text-xs theme-muted" data-ng-bind="t.colCloudDesc"></p>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex items-center gap-2">
                    <span class="inline-flex items-center rounded-full px-3 py-1 text-xs uppercase"
                          ng-class="themeClass('bg-blue-500/20 text-blue-100','bg-blue-100 text-blue-800')">
                        {{cloud.username || '—'}}
                      </span>
                    </div>
                  </td>
                  <td class="px-4 py-3">
                    <span class="inline-flex items-center rounded-xl border px-3 py-1 text-sm font-semibold"
                          ng-class="themeClass('border-white/15 bg-white/5 text-slate-100','border-slate-300 bg-white text-slate-800')">
                      {{cloud.pnet}}
                    </span>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex items-center justify-center gap-2">
                      <button class="px-3 py-2 rounded-xl transition cursor-pointer border"
                              ng-class="themeClass('bg-white/10 hover:bg-blue-500/30 text-slate-100 border-white/20','bg-white hover:bg-blue-50 text-slate-800 border-slate-300')"
                              title="{{t.editAction}}"
                              ng-click="openModal('editcloud', cloud)">
                        <i class="fa fa-edit"></i>
                      </button>
                      <button class="px-3 py-2 rounded-xl transition cursor-pointer border"
                              ng-class="themeClass('bg-rose-500/30 hover:bg-rose-500/50 text-slate-100 border-rose-300/60','bg-rose-100 hover:bg-rose-200 text-rose-700 border-rose-300')"
                              title="{{t.deleteAction}}"
                              ng-click="confirmDeleteCloud(cloud)">
                        <i class="fa fa-trash"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <p class="text-sm theme-muted" data-ng-if="!sortedClouds.length">
            <span data-ng-bind="t.emptyStateTitle"></span>
            <span class="block" ng-class="themeClass('text-slate-500','text-slate-600')" data-ng-bind="t.emptyStateHint"></span>
          </p>
        </div>
      </section>

      <aside class="flex flex-col gap-3">
        <div class="rounded-3xl theme-surface shadow-2xl p-6 space-y-4 transition-colors duration-300">
          <div>
            <h3 class="text-xl font-semibold theme-heading" data-ng-bind="t.sidebarMappingsTitle"></h3>
            <p class="theme-muted text-sm" data-ng-bind="t.sidebarMappingsSubtitle"></p>
          </div>
          <div class="space-y-3 max-h-[28rem] overflow-y-auto pr-2 eve-scroll">
            <article class="rounded-2xl border p-4 space-y-3 transition-colors duration-300"
                     ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')"
                     data-ng-repeat="user in userCloudMap track by user.username">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <p class="text-xs uppercase theme-muted" data-ng-bind="t.sidebarUserLabel"></p>
                  <p class="text-lg font-semibold theme-heading">{{user.username}}</p>
                </div>
                <span class="text-xs uppercase" ng-class="themeClass('text-blue-200','text-blue-700')">
                  {{user.clouds.length}} × {{t.sidebarCloudCount}}
                </span>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between gap-3 rounded-xl border px-3 py-2 transition-colors duration-300"
                     ng-class="themeClass('border-white/10 bg-white/5','border-slate-200 bg-slate-50')"
                     data-ng-repeat="cloud in user.clouds track by cloud.id">
                  <div>
                    <p class="font-semibold text-sm theme-heading">{{cloud.cloudname}}</p>
                    <p class="text-xs theme-muted">{{t.sidebarPnetLabel}} {{cloud.pnet}}</p>
                  </div>
                  <span class="inline-flex items-center rounded-full px-3 py-1 text-xs uppercase"
                        ng-class="themeClass('bg-blue-500/20 text-blue-100','bg-blue-100 text-blue-800')">
                    {{cloud.pnet}}
                  </span>
                </div>
              </div>
            </article>
            <p class="text-sm theme-muted" data-ng-if="!userCloudMap.length" data-ng-bind="t.sidebarNoMappings"></p>
          </div>
        </div>

        <div class="rounded-3xl theme-surface shadow-2xl p-6 space-y-4 transition-colors duration-300">
          <div>
            <h3 class="text-xl font-semibold theme-heading" data-ng-bind="t.guidelinesTitle"></h3>
            <p class="theme-muted text-sm" data-ng-bind="t.guidelinesSubtitle"></p>
          </div>
          <ul class="space-y-3">
            <li class="flex items-start gap-3" data-ng-repeat="tip in t.guidelines track by $index">
              <span class="font-semibold" ng-class="themeClass('text-blue-200','text-blue-700')">{{$index + 1}}.</span>
              <p class="text-sm theme-muted" ng-bind="tip"></p>
            </li>
          </ul>
          <div>
            <p class="text-xs uppercase theme-muted" data-ng-bind="t.interfacesSampleTitle"></p>
            <pre class="mt-2 rounded-2xl border p-4 text-xs overflow-x-auto transition-colors duration-300"
                 ng-class="themeClass('bg-slate-950/70 border-white/10 text-slate-200','bg-slate-100 border-slate-300 text-slate-800')"
                 ng-bind="t.interfacesSampleSnippet"></pre>
          </div>
        </div>
      </aside>
    </div>
  </section>
</main>
