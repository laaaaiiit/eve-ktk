<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController"></div>

<main class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950/80 to-slate-900 text-slate-100">
  <section class="max-w-6xl mx-auto w-full px-6 py-12 flex flex-col gap-10">
    <div class="flex flex-col gap-8 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs uppercase text-blue-200/80" data-ng-bind="t.heroEyebrow"></p>
        <h1 class="text-4xl font-semibold text-white" data-ng-bind="t.heroTitle"></h1>
        <p class="text-slate-300 text-lg leading-relaxed" data-ng-bind="t.heroDescription"></p>
      </div>
      <div class="flex flex-col gap-3">
        <div class="flex flex-wrap gap-3">
          <div class="px-4 py-3 rounded-2xl bg-white/5 border border-white/10 backdrop-blur text-sm uppercase flex items-center gap-3">
            <span data-ng-bind="t.chipQemuLabel"></span>
            <strong class="text-base tracking-normal" data-ng-bind="serverstatus.qemu_version">--</strong>
          </div>
          <div class="px-4 py-3 rounded-2xl bg-white/5 border border-white/10 backdrop-blur text-sm uppercase flex items-center gap-3">
            <span data-ng-bind="t.chipPlatformLabel"></span>
            <strong class="text-base tracking-normal" data-ng-bind="versiondata">--</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-xl flex flex-col gap-6">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeCpuLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueCPU" options="optionsCPU"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-xl flex flex-col gap-6">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeMemLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueMem" options="optionsMem"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-xl flex flex-col gap-6">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeSwapLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueSwap" options="optionsSwap"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-xl flex flex-col gap-6">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeDiskLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueDisk" options="optionsDisk"></ui-knob>
        </div>
      </div>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-3xl shadow-2xl p-8 space-y-6">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <h2 class="text-2xl font-semibold" data-ng-bind="t.nodesTitle"></h2>
      </div>
      <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
        <div class="rounded-2xl bg-gradient-to-br from-blue-900/80 via-blue-800/70 to-slate-900/60 border border-blue-500/30 p-5 flex flex-col gap-2">
          <p class="text-sm uppercase">IOL</p>
          <strong class="text-3xl font-semibold text-white" data-ng-bind="serverstatus.iol">0</strong>
          <span class="text-slate-300 text-sm" data-ng-bind="t.nodeIolDescription"></span>
        </div>
        <div class="rounded-2xl bg-gradient-to-br from-emerald-900/70 via-emerald-800/60 to-slate-900/50 border border-emerald-500/30 p-5 flex flex-col gap-2">
          <p class="text-sm uppercase">Dynamips</p>
          <strong class="text-3xl font-semibold text-white" data-ng-bind="serverstatus.dynamips">0</strong>
          <span class="text-slate-300 text-sm" data-ng-bind="t.nodeDynamipsDescription"></span>
        </div>
        <div class="rounded-2xl bg-gradient-to-br from-indigo-900/70 via-indigo-800/60 to-slate-900/50 border border-indigo-500/30 p-5 flex flex-col gap-2">
          <p class="text-sm uppercase">QEMU</p>
          <strong class="text-3xl font-semibold text-white" data-ng-bind="serverstatus.qemu">0</strong>
          <span class="text-slate-300 text-sm" data-ng-bind="t.nodeQemuDescription"></span>
        </div>
        <div class="rounded-2xl bg-gradient-to-br from-cyan-900/70 via-cyan-800/60 to-slate-900/50 border border-cyan-500/30 p-5 flex flex-col gap-2">
          <p class="text-sm uppercase">Docker</p>
          <strong class="text-3xl font-semibold text-white" data-ng-bind="serverstatus.docker">0</strong>
          <span class="text-slate-300 text-sm" data-ng-bind="t.nodeDockerDescription"></span>
        </div>
        <div class="rounded-2xl bg-gradient-to-br from-rose-900/70 via-rose-800/60 to-slate-900/50 border border-rose-500/30 p-5 flex flex-col gap-2">
          <p class="text-sm uppercase">VPCS</p>
          <strong class="text-3xl font-semibold text-white" data-ng-bind="serverstatus.vpcs">0</strong>
          <span class="text-slate-300 text-sm" data-ng-bind="t.nodeVpcsDescription"></span>
        </div>
      </div>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-3xl shadow-2xl p-8 space-y-6" ng-if="role === 'admin'">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <h2 class="text-2xl font-semibold" data-ng-bind="t.statusTitle"></h2>
      </div>
      <div class="space-y-4">
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80 px-6 py-4" id="pUKSM">
          <div>
            <p class="text-lg font-semibold" data-ng-bind="t.uksmTitle"></p>
            <span class="text-slate-300 text-sm" data-ng-bind="t.uksmSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleUKSM" class="sr-only peer">
            <span class="w-16 h-8 rounded-full bg-slate-700/70 peer-checked:bg-emerald-500/80 transition-colors duration-300 border border-white/10"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80 px-6 py-4" id="pKSM">
          <div>
            <p class="text-lg font-semibold" data-ng-bind="t.ksmTitle"></p>
            <span class="text-slate-300 text-sm" data-ng-bind="t.ksmSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleKSM" class="sr-only peer">
            <span class="w-16 h-8 rounded-full bg-slate-700/70 peer-checked:bg-emerald-500/80 transition-colors duration-300 border border-white/10"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80 px-6 py-4">
          <div>
            <p class="text-lg font-semibold" data-ng-bind="t.cpulimitTitle"></p>
            <span class="text-slate-300 text-sm" data-ng-bind="t.cpulimitSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleCPULIMIT" class="sr-only peer">
            <span class="w-16 h-8 rounded-full bg-slate-700/70 peer-checked:bg-emerald-500/80 transition-colors duration-300 border border-white/10"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
      </div>
    </div>
  </section>
</main>
