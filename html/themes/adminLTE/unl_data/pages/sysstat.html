<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController">
</div>
<link rel="stylesheet" href="/themes/adminLTE/dist/css/skins/skin-blue.min.css">
<script src="/themes/adminLTE/dist/js/app.js"></script>

<div class="wrapper sysstat-wrapper">
  <div class="content-wrapper sysstat-content">
    <section class="sysstat">
      <div class="sysstat__hero">
        <div class="sysstat__hero-text">
          <p class="sysstat__eyebrow" data-ng-bind="t.heroEyebrow"></p>
          <h1 data-ng-bind="t.heroTitle"></h1>
          <p class="sysstat__description" data-ng-bind="t.heroDescription"></p>
        </div>
        <div class="sysstat__hero-meta">
          <div class="sysstat__chip">
            <span data-ng-bind="t.chipQemuLabel"></span>
            <strong data-ng-bind="serverstatus.qemu_version">--</strong>
          </div>
          <div class="sysstat__chip">
            <span data-ng-bind="t.chipPlatformLabel"></span>
            <strong data-ng-bind="versiondata">--</strong>
          </div>
        </div>
      </div>

      <div class="sysstat__gauges">
        <div class="sysstat__gauge-card">
          <div class="sysstat__gauge-label">
            <span data-ng-bind="t.gaugeCpuLabel"></span>
            <small data-ng-bind="t.gaugeCpuSub"></small>
          </div>
          <div class="sysstat__gauge">
            <ui-knob value="valueCPU" options="optionsCPU"></ui-knob>
          </div>
        </div>
        <div class="sysstat__gauge-card">
          <div class="sysstat__gauge-label">
            <span data-ng-bind="t.gaugeMemLabel"></span>
            <small data-ng-bind="t.gaugeMemSub"></small>
          </div>
          <div class="sysstat__gauge">
            <ui-knob value="valueMem" options="optionsMem"></ui-knob>
          </div>
        </div>
        <div class="sysstat__gauge-card">
          <div class="sysstat__gauge-label">
            <span data-ng-bind="t.gaugeSwapLabel"></span>
            <small data-ng-bind="t.gaugeSwapSub"></small>
          </div>
          <div class="sysstat__gauge">
            <ui-knob value="valueSwap" options="optionsSwap"></ui-knob>
          </div>
        </div>
        <div class="sysstat__gauge-card">
          <div class="sysstat__gauge-label">
            <span data-ng-bind="t.gaugeDiskLabel"></span>
            <small data-ng-bind="t.gaugeDiskSub"></small>
          </div>
          <div class="sysstat__gauge">
            <ui-knob value="valueDisk" options="optionsDisk"></ui-knob>
          </div>
        </div>
      </div>

      <div class="sysstat__nodes-panel">
        <h2 data-ng-bind="t.nodesTitle"></h2>
        <div class="sysstat__nodes-grid">
          <div class="sysstat__node-card">
            <p>IOL</p>
            <strong data-ng-bind="serverstatus.iol">0</strong>
            <span data-ng-bind="t.nodeIolDescription"></span>
          </div>
          <div class="sysstat__node-card">
            <p>Dynamips</p>
            <strong data-ng-bind="serverstatus.dynamips">0</strong>
            <span data-ng-bind="t.nodeDynamipsDescription"></span>
          </div>
          <div class="sysstat__node-card">
            <p>QEMU</p>
            <strong data-ng-bind="serverstatus.qemu">0</strong>
            <span data-ng-bind="t.nodeQemuDescription"></span>
          </div>
          <div class="sysstat__node-card">
            <p>Docker</p>
            <strong data-ng-bind="serverstatus.docker">0</strong>
            <span data-ng-bind="t.nodeDockerDescription"></span>
          </div>
          <div class="sysstat__node-card">
            <p>VPCS</p>
            <strong data-ng-bind="serverstatus.vpcs">0</strong>
            <span data-ng-bind="t.nodeVpcsDescription"></span>
          </div>
        </div>
      </div>

      <div class="sysstat__status-panel">
        <h2 data-ng-bind="t.statusTitle"></h2>
        <div class="sysstat__status-grid">
          <div class="sysstat__status-row" id="pUKSM">
            <div>
              <p data-ng-bind="t.uksmTitle"></p>
              <span data-ng-bind="t.uksmSubtitle"></span>
            </div>
            <div class="sysstat__status-toggle">
              <input type="checkbox" id="ToggleUKSM" />
            </div>
          </div>
          <div class="sysstat__status-row" id="pKSM">
            <div>
              <p data-ng-bind="t.ksmTitle"></p>
              <span data-ng-bind="t.ksmSubtitle"></span>
            </div>
            <div class="sysstat__status-toggle">
              <input type="checkbox" id="ToggleKSM" />
            </div>
          </div>
          <div class="sysstat__status-row">
            <div>
              <p data-ng-bind="t.cpulimitTitle"></p>
              <span data-ng-bind="t.cpulimitSubtitle"></span>
            </div>
            <div class="sysstat__status-toggle">
              <input type="checkbox" id="ToggleCPULIMIT" />
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
