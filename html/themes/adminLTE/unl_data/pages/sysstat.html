<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController"></div>

<main class="min-h-screen theme-page transition-colors duration-300">
  <section class="max-w-6xl mx-auto w-full px-6 py-12 flex flex-col gap-10">
    <div class="flex flex-col gap-8 lg:flex-row lg:items-center lg:justify-between">
      <div class="space-y-3">
        <p class="text-xs uppercase theme-muted" data-ng-bind="t.heroEyebrow"></p>
        <h1 class="text-4xl font-semibold theme-heading" data-ng-bind="t.heroTitle"></h1>
        <p class="theme-muted text-lg leading-relaxed" data-ng-bind="t.heroDescription"></p>
      </div>
      <div class="flex flex-col gap-3">
        <div class="flex flex-wrap gap-3">
          <div class="px-4 py-3 rounded-2xl text-sm uppercase flex items-center gap-3 theme-subtle-surface">
            <span data-ng-bind="t.chipQemuLabel"></span>
            <strong class="text-base tracking-normal" data-ng-bind="serverstatus.qemu_version">--</strong>
          </div>
          <div class="px-4 py-3 rounded-2xl text-sm uppercase flex items-center gap-3 theme-subtle-surface">
            <span data-ng-bind="t.chipPlatformLabel"></span>
            <strong class="text-base tracking-normal" data-ng-bind="versiondata">--</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
      <div class="rounded-3xl theme-surface p-6 shadow-xl flex flex-col gap-6 transition-colors duration-300">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeCpuLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueCPU" options="optionsCPU"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl theme-surface p-6 shadow-xl flex flex-col gap-6 transition-colors duration-300">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeMemLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueMem" options="optionsMem"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl theme-surface p-6 shadow-xl flex flex-col gap-6 transition-colors duration-300">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeSwapLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueSwap" options="optionsSwap"></ui-knob>
        </div>
      </div>
      <div class="rounded-3xl theme-surface p-6 shadow-xl flex flex-col gap-6 transition-colors duration-300">
        <div class="flex flex-col gap-1">
          <span class="text-sm uppercase" data-ng-bind="t.gaugeDiskLabel"></span>
        </div>
        <div class="flex justify-center py-2">
          <ui-knob value="valueDisk" options="optionsDisk"></ui-knob>
        </div>
      </div>
    </div>

    <div class="theme-surface rounded-3xl shadow-2xl p-8 space-y-6 transition-colors duration-300">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <h2 class="text-2xl font-semibold theme-heading" data-ng-bind="t.nodesTitle"></h2>
      </div>
      <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
        <div class="rounded-2xl p-5 flex flex-col gap-2 border transition-colors duration-300"
             ng-class="themeClass('bg-gradient-to-br from-blue-900/80 via-blue-800/70 to-slate-900/60 border-blue-500/30 text-white','bg-white border-slate-200 text-slate-900')">
          <p class="text-sm uppercase" ng-class="themeClass('text-slate-200','text-slate-700')">IOL</p>
          <strong class="text-3xl font-semibold" ng-class="themeClass('text-white','text-slate-900')" data-ng-bind="serverstatus.iol">0</strong>
          <span class="text-sm" ng-class="themeClass('text-slate-300','text-slate-600')" data-ng-bind="t.nodeIolDescription"></span>
        </div>
        <div class="rounded-2xl p-5 flex flex-col gap-2 border transition-colors duration-300"
             ng-class="themeClass('bg-gradient-to-br from-emerald-900/70 via-emerald-800/60 to-slate-900/50 border-emerald-500/30 text-white','bg-white border-slate-200 text-slate-900')">
          <p class="text-sm uppercase" ng-class="themeClass('text-slate-200','text-slate-700')">Dynamips</p>
          <strong class="text-3xl font-semibold" ng-class="themeClass('text-white','text-slate-900')" data-ng-bind="serverstatus.dynamips">0</strong>
          <span class="text-sm" ng-class="themeClass('text-slate-300','text-slate-600')" data-ng-bind="t.nodeDynamipsDescription"></span>
        </div>
        <div class="rounded-2xl p-5 flex flex-col gap-2 border transition-colors duration-300"
             ng-class="themeClass('bg-gradient-to-br from-indigo-900/70 via-indigo-800/60 to-slate-900/50 border-indigo-500/30 text-white','bg-white border-slate-200 text-slate-900')">
          <p class="text-sm uppercase" ng-class="themeClass('text-slate-200','text-slate-700')">QEMU</p>
          <strong class="text-3xl font-semibold" ng-class="themeClass('text-white','text-slate-900')" data-ng-bind="serverstatus.qemu">0</strong>
          <span class="text-sm" ng-class="themeClass('text-slate-300','text-slate-600')" data-ng-bind="t.nodeQemuDescription"></span>
        </div>
        <div class="rounded-2xl p-5 flex flex-col gap-2 border transition-colors duration-300"
             ng-class="themeClass('bg-gradient-to-br from-cyan-900/70 via-cyan-800/60 to-slate-900/50 border-cyan-500/30 text-white','bg-white border-slate-200 text-slate-900')">
          <p class="text-sm uppercase" ng-class="themeClass('text-slate-200','text-slate-700')">Docker</p>
          <strong class="text-3xl font-semibold" ng-class="themeClass('text-white','text-slate-900')" data-ng-bind="serverstatus.docker">0</strong>
          <span class="text-sm" ng-class="themeClass('text-slate-300','text-slate-600')" data-ng-bind="t.nodeDockerDescription"></span>
        </div>
        <div class="rounded-2xl p-5 flex flex-col gap-2 border transition-colors duration-300"
             ng-class="themeClass('bg-gradient-to-br from-rose-900/70 via-rose-800/60 to-slate-900/50 border-rose-500/30 text-white','bg-white border-slate-200 text-slate-900')">
          <p class="text-sm uppercase" ng-class="themeClass('text-slate-200','text-slate-700')">VPCS</p>
          <strong class="text-3xl font-semibold" ng-class="themeClass('text-white','text-slate-900')" data-ng-bind="serverstatus.vpcs">0</strong>
          <span class="text-sm" ng-class="themeClass('text-slate-300','text-slate-600')" data-ng-bind="t.nodeVpcsDescription"></span>
        </div>
      </div>
    </div>

    <div class="theme-surface rounded-3xl shadow-2xl p-8 space-y-6 transition-colors duration-300">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div>
          <h2 class="text-2xl font-semibold theme-heading" data-ng-bind="t.jobTitle"></h2>
          <p class="theme-muted text-sm" data-ng-bind="t.jobSubtitle"></p>
        </div>
      </div>
      <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
        <div class="rounded-2xl p-4 border transition-colors duration-300" ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
          <p class="text-sm uppercase" data-ng-bind="t.jobPending"></p>
          <strong class="text-3xl font-semibold" data-ng-bind="jobSummary.counts.pending || 0"></strong>
        </div>
        <div class="rounded-2xl p-4 border transition-colors duration-300" ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
          <p class="text-sm uppercase" data-ng-bind="t.jobRunning"></p>
          <strong class="text-3xl font-semibold" data-ng-bind="jobSummary.counts.running || 0"></strong>
        </div>
        <div class="rounded-2xl p-4 border transition-colors duration-300" ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
          <p class="text-sm uppercase" data-ng-bind="t.jobSuccess"></p>
          <strong class="text-3xl font-semibold" data-ng-bind="jobSummary.counts.success || 0"></strong>
        </div>
        <div class="rounded-2xl p-4 border transition-colors duration-300" ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
          <p class="text-sm uppercase" data-ng-bind="t.jobFailed"></p>
          <strong class="text-3xl font-semibold" data-ng-bind="jobSummary.counts.failed || 0"></strong>
        </div>
      </div>
      <div class="overflow-x-auto rounded-2xl border transition-colors duration-300" ng-class="themeClass('border-white/10 bg-slate-900/30','border-slate-200 bg-white')">
        <table class="min-w-full divide-y" ng-class="themeClass('divide-white/10 text-slate-200','divide-slate-200 text-slate-900')">
          <thead ng-class="themeClass('bg-white/5','bg-slate-50')">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" data-ng-bind="t.jobTableId"></th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" data-ng-bind="t.jobTableAction"></th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" data-ng-bind="t.jobTableStatus"></th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" data-ng-bind="t.jobTableProgress"></th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" ng-if="role === 'admin'" data-ng-bind="t.jobTableUser"></th>
              <th class="px-4 py-3 text-left text-xs font-semibold uppercase" data-ng-bind="t.jobTableUpdated"></th>
            </tr>
          </thead>
          <tbody class="divide-y" ng-class="themeClass('divide-white/10','divide-slate-200')">
            <tr data-ng-repeat="job in jobSummary.recent track by job.id">
              <td class="px-4 py-3 font-semibold">#{{job.id}}</td>
              <td class="px-4 py-3 uppercase tracking-wide text-sm" data-ng-bind="job.action"></td>
              <td class="px-4 py-3">
                <span class="px-3 py-1 rounded-full text-xs font-semibold" ng-class="jobStatusClass(job.status)" data-ng-bind="jobStatusLabel(job.status)"></span>
              </td>
              <td class="px-4 py-3">
                <div class="w-full bg-slate-200/40 dark:bg-white/10 rounded-full h-2 overflow-hidden">
                  <div class="h-full bg-blue-500 dark:bg-cyan-400 transition-all duration-300" ng-style="{'width': (job.progress || 0) + '%'}"></div>
                </div>
                <span class="text-xs theme-muted mt-1 inline-block">{{job.progress || 0}}%</span>
              </td>
              <td class="px-4 py-3 text-sm" ng-if="role === 'admin'">{{job.username}}</td>
              <td class="px-4 py-3 text-sm" data-ng-bind="job.updated_at | date:'short'"></td>
            </tr>
            <tr data-ng-if="!jobSummary.recent.length">
              <td class="px-4 py-4 text-center text-sm" ng-attr-colspan="{{ (role === 'admin') ? 6 : 5 }}" data-ng-bind="t.jobEmpty"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="theme-surface rounded-3xl shadow-2xl p-8 space-y-6 transition-colors duration-300" ng-if="role === 'admin'">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <h2 class="text-2xl font-semibold theme-heading" data-ng-bind="t.statusTitle"></h2>
      </div>
      <div class="space-y-4">
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border px-6 py-4 transition-colors duration-300" id="pUKSM"
             ng-class="themeClass('border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80','border-slate-200 bg-slate-50')">
          <div>
            <p class="text-lg font-semibold theme-heading" data-ng-bind="t.uksmTitle"></p>
            <span class="theme-muted text-sm" data-ng-bind="t.uksmSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleUKSM" class="sr-only peer">
            <span class="w-16 h-8 rounded-full transition-colors duration-300 border"
                  ng-class="themeClass('bg-slate-700/70 peer-checked:bg-emerald-500/80 border-white/10','bg-slate-200 peer-checked:bg-emerald-400 border-slate-300')"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border px-6 py-4 transition-colors duration-300" id="pKSM"
             ng-class="themeClass('border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80','border-slate-200 bg-slate-50')">
          <div>
            <p class="text-lg font-semibold theme-heading" data-ng-bind="t.ksmTitle"></p>
            <span class="theme-muted text-sm" data-ng-bind="t.ksmSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleKSM" class="sr-only peer">
            <span class="w-16 h-8 rounded-full transition-colors duration-300 border"
                  ng-class="themeClass('bg-slate-700/70 peer-checked:bg-emerald-500/80 border-white/10','bg-slate-200 peer-checked:bg-emerald-400 border-slate-300')"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
        <div class="flex flex-wrap items-center justify-between gap-4 rounded-2xl border px-6 py-4 transition-colors duration-300"
             ng-class="themeClass('border-white/10 bg-gradient-to-r from-slate-900/80 via-slate-900/50 to-slate-900/80','border-slate-200 bg-slate-50')">
          <div>
            <p class="text-lg font-semibold theme-heading" data-ng-bind="t.cpulimitTitle"></p>
            <span class="theme-muted text-sm" data-ng-bind="t.cpulimitSubtitle"></span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="ToggleCPULIMIT" class="sr-only peer">
            <span class="w-16 h-8 rounded-full transition-colors duration-300 border"
                  ng-class="themeClass('bg-slate-700/70 peer-checked:bg-emerald-500/80 border-white/10','bg-slate-200 peer-checked:bg-emerald-400 border-slate-300')"></span>
            <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </label>
        </div>
      </div>
    </div>
  </section>
</main>
