<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController">
</div>
<link rel="stylesheet" href="/themes/adminLTE/dist/css/skins/skin-blue.min.css">
<script src="/themes/adminLTE/dist/js/app.js"></script>

<div class="wrapper syslog-wrapper">
  <div class="content-wrapper syslog-content">
    <section class="syslog">
      <div class="syslog__hero">
        <div class="syslog__hero-text">
          <p class="syslog__eyebrow" data-ng-bind="t.heroEyebrow"></p>
          <h1 data-ng-bind="t.heroTitle"></h1>
          <p class="syslog__description" data-ng-bind="t.heroDescription"></p>
        </div>
        <div class="syslog__meta">
          <div class="syslog__chip">
            <span data-ng-bind="t.chipSelectedLabel"></span>
            <strong data-ng-bind="fileSelection || t.chipSelectedEmpty"></strong>
          </div>
          <div class="syslog__chip">
            <span data-ng-bind="t.chipLinesLabel"></span>
            <strong data-ng-bind="lineCount || 200"></strong>
          </div>
        </div>
      </div>

      <div class="syslog__filters">
        <div class="syslog__filter">
          <label data-ng-bind="t.filterFileLabel"></label>
          <select class="form-control"
                  data-ng-init="fileSelection = logfiles[0]"
                  data-ng-model="fileSelection"
                  ng-options="x for x in logfiles"
                  data-ng-change="readFile()"></select>
        </div>
        <div class="syslog__filter">
          <label data-ng-bind="t.filterLinesLabel"></label>
          <input type="text" class="form-control" id="log_lines" placeholder="{{t.placeholderLines}}" data-ng-model="lineCount">
        </div>
        <div class="syslog__filter">
          <label data-ng-bind="t.filterSearchLabel"></label>
          <input type="text" class="form-control" id="log_search" placeholder="{{t.placeholderSearch}}" data-ng-model="searchText">
        </div>
        <div class="syslog__filter syslog__filter--button">
          <button type="button"
                  class="btn btn-primary btn-block {{blockButtonsClass}}"
                  ng-disabled="blockButtons"
                  data-ng-click="readFile(fileSelection)">
            {{t.filterButton}}
          </button>
        </div>
      </div>

      <div class="syslog__output-card">
        <div class="syslog__output-header">
          <div>
            <p data-ng-bind="t.outputTitle"></p>
            <small>{{fileselect ? fileSelection : t.choosePrompt}}</small>
          </div>
          <span class="syslog__output-pill">{{logInfo.length}} {{t.linesSuffix}}</span>
        </div>
        <div class="syslog__output-body" data-ng-class="{'syslog__output-body--empty': logInfo.length == 0}">
          <h4 class="text-center" data-ng-show="!fileselect" data-ng-bind="t.choosePrompt"></h4>
          <h4 class="text-center" data-ng-show="logInfo.length == 0 && fileselect" data-ng-bind="t.emptyPrompt"></h4>
          <pre class="syslog__log-line" data-ng-repeat="x in logInfo track by $index">{{x}}</pre>
        </div>
      </div>
    </section>
  </div>
</div>
