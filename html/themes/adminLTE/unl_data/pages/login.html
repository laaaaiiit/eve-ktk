<main class="min-h-screen theme-page flex items-center justify-center px-6 py-10 relative overflow-hidden transition-colors duration-300">
  <div class="absolute -left-24 -top-32 w-80 h-80 rounded-full blur-3xl pointer-events-none"
       ng-class="themeClass('bg-blue-500/25','bg-blue-300/30')"></div>
  <div class="absolute -right-28 top-10 w-72 h-72 rounded-full blur-3xl pointer-events-none"
       ng-class="themeClass('bg-cyan-400/20','bg-cyan-200/40')"></div>
  <div class="absolute inset-0 pointer-events-none opacity-30"
       ng-class="themeClass('bg-gradient-to-br from-slate-900 via-slate-950 to-black','bg-gradient-to-br from-white via-slate-100 to-slate-50')"></div>

  <div class="absolute top-6 right-6 flex flex-col sm:flex-row sm:items-center gap-4 z-10 w-[14rem] sm:w-auto">
    <fancy-select class="w-full sm:w-48"
                  options="languageOptions"
                  model="lang"
                  on-change="onLanguageChange(value)"
                  theme-class="themeClass(darkClasses, lightClasses)"></fancy-select>
    <fancy-select class="w-full sm:w-48"
                  options="themeOptions"
                  model="theme"
                  on-change="onThemeChange(value)"
                  theme-class="themeClass(darkClasses, lightClasses)"></fancy-select>
  </div>

  <div class="relative w-full max-w-6xl grid gap-8 lg:grid-cols-[1.05fr_0.95fr] items-stretch z-0">
    <section class="relative theme-surface rounded-3xl p-10 overflow-hidden transition-colors duration-300">
      <div class="absolute inset-0 opacity-60"
           ng-class="themeClass('bg-gradient-to-br from-blue-600/20 via-cyan-500/10 to-emerald-400/20','bg-gradient-to-br from-blue-200 via-cyan-100 to-emerald-100')"></div>
      <div class="relative flex flex-col h-full justify-center gap-8">
        <div class="text-center lg:text-left space-y-4 flex flex-col items-center lg:items-start">
          <img src="/themes/adminLTE/unl_data/img/Logo_EVE_Color.png" alt="EVE-NG logo" class="w-48 lg:w-60 h-auto drop-shadow-2xl">
          <p class="text-xs uppercase tracking-[0.45em] theme-muted" data-ng-bind="eveversion"></p>
        </div>
        <div class="space-y-4">
          <h1 class="text-4xl font-semibold theme-heading" data-ng-bind="t.brandTitle"></h1>
          <p class="text-lg leading-relaxed theme-muted max-w-2xl" data-ng-bind="t.brandSubtitle"></p>
        </div>
        <ul class="space-y-4">
          <li class="flex items-start gap-3">
            <span class="w-2 h-2 rounded-full mt-2"
                  ng-class="themeClass('bg-blue-400','bg-blue-600')"></span>
            <span class="theme-heading" data-ng-bind="t.brandBulletOne"></span>
          </li>
          <li class="flex items-start gap-3">
            <span class="w-2 h-2 rounded-full mt-2"
                  ng-class="themeClass('bg-emerald-300','bg-emerald-600')"></span>
            <span class="theme-heading" data-ng-bind="t.brandBulletTwo"></span>
          </li>
        </ul>
      </div>
    </section>

    <section class="theme-surface rounded-3xl shadow-2xl p-10 flex flex-col gap-6 transition-colors duration-300">
      <div class="flex flex-col gap-4">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 class="text-2xl font-semibold theme-heading" data-ng-bind="t.cardTitle"></h2>
            <p class="theme-muted" data-ng-bind="t.cardSubtitle"></p>
          </div>
        </div>
      </div>

      <form class="flex flex-col gap-5" ng-submit="tryLogin()" novalidate>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.usernameLabel"></label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 theme-muted"><i class="fa fa-user"></i></span>
            <input type="text"
                   class="theme-input pl-10"
                   placeholder="{{t.usernamePlaceholder}}"
                   ng-model="username"
                   autofocus>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.passwordLabel"></label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 theme-muted"><i class="fa fa-lock"></i></span>
            <input type="password"
                   class="theme-input pl-10"
                   placeholder="{{t.passwordPlaceholder}}"
                   ng-model="password">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.consoleLabel"></label>
          <fancy-select options="consoleOptions"
                        model="html5"
                        on-change="onConsoleChange(value)"
                        theme-class="themeClass(darkClasses, lightClasses)"></fancy-select>
        </div>
        <button id="btnlogin"
                type="submit"
                class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 text-white font-semibold rounded-2xl py-3.5 tracking-[0.25em] uppercase shadow-xl hover:shadow-2xl transition"
                data-ng-bind="t.submitButton">
        </button>
      </form>
      <p class="theme-muted text-sm" data-ng-bind="t.hintText"></p>
      <p class="text-red-400 text-sm min-h-[20px]" data-ng-bind="loginMessageInfo" role="alert" aria-live="polite"></p>
    </section>
  </div>
</main>
