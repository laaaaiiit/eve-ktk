<div class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950/80 to-slate-900 text-slate-100 flex items-center justify-center p-6">
  <div class="max-w-6xl w-full grid gap-10 lg:grid-cols-2">
    <section class="backdrop-blur-sm bg-white/5 rounded-3xl border border-white/10 shadow-2xl p-10 flex flex-col justify-center">
      <div class="mb-12 text-center flex flex-col items-center gap-4">
        <img src="/themes/adminLTE/unl_data/img/Logo_EVE_Color.png" alt="EVE-NG logo" class="w-64 h-auto drop-shadow-2xl">
        <div>
          <p class="text-xs uppercase tracking-[0.45em] text-slate-400" data-ng-bind="eveversion"></p>
          </div>
      </div>
      <h1 class="text-4xl font-semibold text-white mb-6" data-ng-bind="t.brandTitle"></h1>
      <p class="text-slate-300 text-lg" data-ng-bind="t.brandSubtitle"></p>
      <ul class="mt-9 space-y-5 text-slate-200/90">
        <li class="flex items-start gap-3"><span class="w-2 h-2 rounded-full bg-blue-400 mt-2"></span><span data-ng-bind="t.brandBulletOne"></span></li>
        <li class="flex items-start gap-3"><span class="w-2 h-2 rounded-full bg-blue-400 mt-2"></span><span data-ng-bind="t.brandBulletTwo"></span></li>
      </ul>
    </section>

    <section class="bg-white/10 backdrop-blur-md rounded-3xl border border-white/15 shadow-2xl p-10 flex flex-col gap-6">
      <div class="flex flex-col gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.4em] text-slate-400" data-ng-bind="t.languageLabel"></p>
          <h2 class="text-2xl font-semibold" data-ng-bind="t.cardTitle"></h2>
          <p class="text-slate-300" data-ng-bind="t.cardSubtitle"></p>
        </div>
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div class="text-xs uppercase tracking-[0.3em] text-slate-400 sm:hidden" data-ng-bind="t.languageLabel"></div>
          <div class="relative w-full sm:w-48">
            <select class="w-full bg-slate-900/60 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring focus:ring-blue-400 appearance-none pr-12"
                    ng-model="lang"
                    ng-change="setLanguage(lang)"
                    ng-options="language.key as language.label for language in languages">
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-500">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>
      </div>

      <form class="flex flex-col gap-5" ng-submit="tryLogin()" novalidate>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.usernameLabel"></label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa fa-user"></i></span>
            <input type="text"
                   class="w-full bg-slate-900/60 border border-white/10 rounded-2xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="{{t.usernamePlaceholder}}"
                   ng-model="username"
                   autofocus>
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.passwordLabel"></label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="fa fa-lock"></i></span>
            <input type="password"
                   class="w-full bg-slate-900/60 border border-white/10 rounded-2xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"
                   placeholder="{{t.passwordPlaceholder}}"
                   ng-model="password">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.consoleLabel"></label>
          <div class="relative">
            <select name="html5"
                    class="w-full bg-slate-900/60 border border-white/10 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 appearance-none pr-12"
                    ng-init="html5='1'"
                    ng-model="html5">
              <option value="1" data-ng-bind="t.html5Console"></option>
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-500">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>
        <button id="btnlogin"
                type="submit"
                class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 text-white font-semibold rounded-2xl py-3.5 tracking-[0.3em] uppercase shadow-xl hover:shadow-2xl transition-shadow"
                data-ng-bind="t.submitButton">
        </button>
      </form>
      <p class="text-slate-300 text-sm" data-ng-bind="t.hintText"></p>
      <p class="text-red-400 text-sm min-h-[20px]" data-ng-bind="loginMessageInfo"></p>
    </section>
  </div>
</div>
