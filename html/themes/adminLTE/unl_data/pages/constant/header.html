<header class="theme-surface shadow-2xl border-b transition-colors duration-300">
  <div class="w-full px-6 lg:px-8 py-5">
    <div class="flex items-center gap-4 flex-wrap lg:flex-nowrap">
      <div class="flex items-center gap-4 flex-shrink-0">
        <img src="/themes/adminLTE/unl_data/img/Logo_EVE_Color.png" alt="EVE-NG logo" class="w-28 h-auto drop-shadow-2xl">
        <div class="leading-tight">
          <p class="text-sm tracking-[0.2em] uppercase theme-heading">EVE-NG</p>
          <p class="text-sm theme-muted tracking-[0.15em]" data-ng-bind="'v' + EVE_VERSION"></p>
        </div>
      </div>

      <nav class="flex-1 flex justify-center min-w-[260px]">
        <ul class="flex flex-wrap items-center justify-center gap-3 text-base font-semibold tracking-[0.08em] uppercase">
          <li>
            <a href="#!/main" ng-click="blockui('/main')" class="flex items-center gap-3 px-5 py-2.5 rounded-xl transition"
               ng-class="[themeClass('bg-white/5 hover:bg-white/15 text-white','bg-slate-100 hover:bg-slate-200 text-slate-800'), currentPath == '/main' ? themeClass('bg-white/20 text-blue-200','bg-blue-100 text-blue-800') : '']">
              <i class="fa fa-home"></i>
              <span data-ng-bind="t.menuMain"></span>
            </a>
          </li>

          <li class="relative group" ng-if="role !== 'editor'">
            <button class="flex items-center gap-3 px-5 py-2.5 rounded-xl transition"
                    ng-class="themeClass('bg-white/5 hover:bg-white/15 text-white','bg-slate-100 hover:bg-slate-200 text-slate-800')">
              <i class="fa fa-wrench"></i>
              <span data-ng-bind="t.menuManagement"></span>
              <i class="fa fa-angle-down"></i>
            </button>
            <ul class="flex flex-col rounded-2xl shadow-xl min-w-[220px] overflow-hidden transition lg:absolute lg:top-full lg:left-1/2 lg:-translate-x-1/2 lg:hidden lg:group-hover:flex z-40"
                ng-class="themeClass('bg-slate-900/95 border border-white/10','bg-white border-slate-200')">
              <li class="px-0 first:rounded-t-2xl last:rounded-b-2xl overflow-hidden">
                <a href="#!/usermgmt" ng-click="blockui('/usermgmt')" class="flex items-center gap-2 px-4 py-3 transition w-full"
                  ng-class="[themeClass('hover:bg-white/10 text-white','hover:bg-slate-100 text-slate-800'), currentPath == '/usermgmt' ? themeClass('text-blue-200','text-blue-700') : '']">
                  <i class="fa fa-group mr-2"></i>
                  <span data-ng-bind="t.menuUserMgmt"></span>
                </a>
              </li>
              <li class="px-0 first:rounded-t-2xl last:rounded-b-2xl overflow-hidden">
                <a href="#!/nodemgmt" ng-click="blockui('/nodemgmt')" class="flex items-center gap-2 px-4 py-3 transition w-full"
                  ng-class="[themeClass('hover:bg-white/10 text-white','hover:bg-slate-100 text-slate-800'), currentPath == '/nodemgmt' ? themeClass('text-blue-200','text-blue-700') : '']">
                  <i class="fa fa-hdd-o mr-2"></i>
                  <span data-ng-bind="t.menuNodeMgmt"></span>
                </a>
              </li>
              <li class="px-0 first:rounded-t-2xl last:rounded-b-2xl overflow-hidden">
                <a href="#!/cloudmgmt" ng-click="blockui('/cloudmgmt')" class="flex items-center gap-2 px-4 py-3 transition w-full"
                  ng-class="[themeClass('hover:bg-white/10 text-white','hover:bg-slate-100 text-slate-800'), currentPath == '/cloudmgmt' ? themeClass('text-blue-200','text-blue-700') : '']">
                  <i class="fa fa-cloud mr-2"></i>
                  <span data-ng-bind="t.menuCloudMgmt"></span>
                </a>
              </li>
            </ul>
          </li>

          <li class="relative group">
            <button class="flex items-center gap-3 px-5 py-2.5 rounded-xl transition"
                    ng-class="themeClass('bg-white/5 hover:bg-white/15 text-white','bg-slate-100 hover:bg-slate-200 text-slate-800')">
              <i class="fa fa-book"></i>
              <span data-ng-bind="t.menuSystem"></span>
              <i class="fa fa-angle-down"></i>
            </button>
            <ul class="flex flex-col rounded-2xl shadow-xl min-w-[220px] overflow-hidden transition lg:absolute lg:top-full lg:left-1/2 lg:-translate-x-1/2 lg:hidden lg:group-hover:flex z-40"
                ng-class="themeClass('bg-slate-900/95 border border-white/10','bg-white border-slate-200')">
              <li class="px-0 first:rounded-t-2xl last:rounded-b-2xl overflow-hidden">
                <a href="#!/sysstat" ng-click="blockui('/sysstat')" class="flex items-center gap-2 px-4 py-3 transition w-full"
                  ng-class="[themeClass('hover:bg-white/10 text-white','hover:bg-slate-100 text-slate-800'), currentPath == '/sysstat' ? themeClass('text-blue-200','text-blue-700') : '']">
                  <i class="fa fa-adjust mr-2"></i>
                  <span data-ng-bind="t.menuSysStatus"></span>
                </a>
              </li>
              <li class="px-0 first:rounded-t-2xl last:rounded-b-2xl overflow-hidden" ng-if="role === 'admin'">
                <a href="#!/syslog" ng-click="blockui('/syslog')" class="flex items-center gap-2 px-4 py-3 transition w-full"
                  ng-class="[themeClass('hover:bg-white/10 text-white','hover:bg-slate-100 text-slate-800'), currentPath == '/syslog' ? themeClass('text-blue-200','text-blue-700') : '']">
                  <i class="fa fa-life-ring mr-2"></i>
                  <span data-ng-bind="t.menuSyslog"></span>
                </a>
              </li>
            </ul>
          </li>

          <li ng-if="role === 'admin'">
            <a ng-href="/html5/#?token={{guacToken}}" ng-click="blockui('/guacamole')" class="flex items-center gap-3 px-5 py-2.5 rounded-xl transition"
               ng-class="themeClass('bg-white/5 hover:bg-white/15 text-white','bg-slate-100 hover:bg-slate-200 text-slate-800')">
              <i class="fa fa-eye"></i>
              <span data-ng-bind="t.menuGuac"></span>
            </a>
          </li>
          
        </ul>
      </nav>

      <div class="flex items-center gap-3 flex-shrink-0 flex-wrap justify-end">
        <div class="flex items-center gap-2">
          <fancy-select class="min-w-[150px]"
                        options="languageOptions"
                        model="lang"
                        on-change="onLanguageChange(value)"
                        theme-class="themeClass(darkClasses, lightClasses)"></fancy-select>
          <fancy-select class="min-w-[160px]"
                        options="themeOptions"
                        model="theme"
                        on-change="onThemeChange(value)"
                        theme-class="themeClass(darkClasses, lightClasses)"></fancy-select>
        </div>
        <div class="rounded-xl px-3 py-2 flex items-center gap-2 transition min-w-[150px]"
             ng-class="themeClass('bg-white/10','bg-white border border-slate-200 shadow-sm')">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold"
               ng-class="themeClass('bg-white/20 text-white','bg-slate-100 text-slate-800')" data-ng-bind="((username || '?')[0]) | uppercase"></div>
          <div class="leading-tight text-left">
            <p class="text-sm font-semibold theme-heading" data-ng-bind="username || '—'"></p>
            <p class="text-[11px] uppercase tracking-[0.18em] theme-muted" data-ng-bind="role || 'user'"></p>
          </div>
        </div>
        <button class="px-4 py-2 rounded-xl text-sm font-semibold tracking-[0.08em] uppercase flex items-center gap-2 cursor-pointer transition"
                ng-class="themeClass('bg-white/5 hover:bg-white/15 text-white','bg-slate-100 hover:bg-slate-200 text-slate-800')"
                ng-click="logout()">
          <i class="fa fa-sign-out"></i>
          <span data-ng-bind="t.logout"></span>
        </button>
      </div>
    </div>
  </div>
</header>
