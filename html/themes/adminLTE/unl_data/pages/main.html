<div data-ng-include="'/themes/adminLTE/unl_data/pages/constant/header.html'" data-ng-controller="HeaderController"></div>

<main class="min-h-screen bg-gradient-to-br from-slate-950 via-blue-950/70 to-slate-900 text-slate-100">
  <section class="max-w-[95rem] mx-auto w-full px-4 lg:px-8 py-10 space-y-10">
    <!-- Hero -->
    <div class="flex flex-col items-center text-center gap-4 max-w-4xl mx-auto">
      <div class="space-y-3">
        <p class="text-xs uppercase text-blue-200/80" data-ng-bind="t.heroEyebrow"></p>
        <h1 class="text-3xl lg:text-4xl font-semibold text-white" data-ng-bind="t.heroTitle"></h1>
        <p class="text-slate-300 text-lg" data-ng-bind="t.heroDescription"></p>
      </div>
      <ol class="flex flex-wrap items-center justify-center gap-2 text-sm text-slate-400">
        <li class="uppercase text-blue-200/80" data-ng-bind="t.pathLabel"></li>
        <li class="text-slate-500">/</li>
        <li data-ng-repeat="foldername in splitPath track by $index" class="flex items-center gap-2">
          <a class="text-slate-200 hover:text-white transition cursor-pointer"
             data-ng-click="fileMngDraw(splitPathArray[$index])">{{foldername}}</a>
          <span class="text-slate-500" data-ng-if="!$last">/</span>
        </li>
      </ol>
      <div class="flex flex-col gap-3 sm:flex-row">
        <button type="button"
                class="px-6 py-3 rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-400 text-white font-semibold uppercase shadow-xl hover:shadow-2xl transition text-xs"
                data-ng-click="openModal('addfile', null,'megalg');">
          <i class="fa fa-file mr-2"></i><span data-ng-bind="t.newLabButton"></span>
        </button>
        <button type="button"
                class="px-6 py-3 rounded-2xl border border-white/20 text-slate-100 hover:bg-white/10 transition text-xs uppercase"
                data-ng-click="fileMngDraw(path); falseForSelAll();">
          <i class="fa fa-refresh mr-2"></i><span data-ng-bind="t.refreshButton"></span>
        </button>
      </div>
    </div>

    <div class="grid gap-8 lg:grid-cols-[1.35fr_0.65fr]">
      <!-- File manager -->
      <section class="space-y-6">
        <div class="rounded-3xl border border-white/10 bg-white/5 shadow-2xl p-6 space-y-6">
          <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
              <h2 class="text-2xl font-semibold" data-ng-bind="t.labsCardTitle"></h2>
              <p class="text-slate-400 text-sm" data-ng-bind="t.labsCardSubtitle"></p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button type="button"
                      class="px-3 py-2 rounded-xl border border-white/15 text-slate-200 hover:bg-white/10 transition text-xs uppercase"
                      data-ng-attr-title="{{t.orderTooltip}}"
                      data-ng-click="toggleOrder(); fileMngDraw(path); falseForSelAll();">
                <i class="fa fa-sort mr-2"></i><span data-ng-bind="t.orderButton"></span>
              </button>
              <button type="button"
                      class="px-3 py-2 rounded-xl border border-white/15 text-slate-200 hover:bg-white/10 transition text-xs uppercase"
                      data-ng-attr-title="{{t.refreshTooltip}}"
                      data-ng-click="fileMngDraw(path); falseForSelAll();">
                <i class="fa fa-refresh mr-2"></i><span data-ng-bind="t.refreshButton"></span>
              </button>
            </div>
          </div>

          <div class="flex flex-col gap-4 lg:flex-row lg:items-end">
            <div class="flex-1" data-ng-if="role === 'admin'">
              <label class="text-xs uppercase text-slate-400 block mb-2" data-ng-bind="t.newFolderLabel"></label>
              <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
                <input type="text"
                       class="flex-1 rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                       data-ng-attr-placeholder="{{t.newFolderPlaceholder}}"
                       data-ng-model="newElementName"
                       my-enter="createNewElement(thatCreate)"
                       focus-on="foCreate"
                       ng-focus="newElementName=''; elementToggleFun('Folder');">
                <button type="button"
                        class="px-4 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-500 text-white text-xs uppercase shadow-lg hover:shadow-2xl transition {{blockButtonsClass}}"
                        ng-disabled="blockButtons"
                        data-ng-click="createNewElement(thatCreate)">
                  <i class="fa fa-folder-open mr-2"></i><span data-ng-bind="t.createButton"></span>
                </button>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarSelectTitle}}"
                      data-ng-click="selectAll()"
                      data-ng-if="!allCheckedFlag">
                <i class="fa fa-square-o mr-2"></i><span data-ng-bind="t.toolbarSelect"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarClearTitle}}"
                      data-ng-click="selectAll()"
                      data-ng-if="allCheckedFlag">
                <i class="fa fa-check-square-o mr-2"></i><span data-ng-bind="t.toolbarClear"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarRenameTitle}}"
                      data-ng-click="editElementShow();"
                      ng-disabled="!selectedItemsCanBeModified()">
                <i class="fa fa-pencil mr-2"></i><span data-ng-bind="t.toolbarRename"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarMoveTitle}}"
                      data-ng-click="moveto()"
                      ng-disabled="!selectedItemsCanBeModified()">
                <i class="fa fa-scissors mr-2"></i><span data-ng-bind="t.toolbarMove"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-rose-500/50 text-xs uppercase text-rose-200 hover:bg-rose-500/10 transition"
                      data-ng-attr-title="{{t.toolbarDeleteTitle}}"
                      data-ng-click="deleteALLElement(); hideAllEdit()"
                      ng-disabled="!selectedItemsCanBeModified()">
                <i class="fa fa-trash mr-2"></i><span data-ng-bind="t.toolbarDelete"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarImportTitle}}"
                      data-ng-click="selectOneFileUplad(); falseForSelAll();">
                <i class="fa fa-download mr-2"></i><span data-ng-bind="t.toolbarImport"></span>
              </button>
              <button type="button"
                      class="px-4 py-2 rounded-xl border border-white/15 text-xs uppercase text-slate-100 hover:bg-white/10 transition"
                      data-ng-attr-title="{{t.toolbarExportTitle}}"
                      data-ng-click="exportFiles()">
                <i class="fa fa-upload mr-2"></i><span data-ng-bind="t.toolbarExport"></span>
              </button>
            </div>
          </div>

          <div class="rounded-2xl border border-white/10 bg-slate-950/50 shadow-inner overflow-hidden">
            <table class="w-full text-sm text-left" id="filesTree">
              <thead class="text-xs uppercase text-slate-300 bg-slate-900/60">
                <tr>
                  <th class="px-4 py-3 w-12"></th>
                  <th class="px-4 py-3" data-ng-bind="t.treeColumnName"></th>
                  <th class="px-4 py-3 w-32 text-right" data-ng-bind="t.treeColumnUpdated"></th>
                </tr>
              </thead>
              <tbody class="divide-y divide-white/5 text-slate-100">
                <tr data-ng-repeat="x in rootDir.folders" class="hover:bg-white/5 transition">
                  <td class="px-4 py-3 align-top">
                    <label class="inline-flex items-center gap-2 cursor-pointer">
                      <input type="checkbox"
                             class="sr-only"
                             data-ng-show="x.name != '..'"
                             data-ng-init="checkboxArray['Fo_'+x.name]['name']=x.name; checkboxArray['Fo_'+x.name]['checked']=false; checkboxArray['Fo_'+x.name]['type']='Folder';"
                             data-ng-model="checkboxArray['Fo_'+x.name]['checked']"
                             data-ng-click="falseForSelAll(); hideAllEdit();">
                      <span class="h-5 w-5 rounded-lg border border-white/20 bg-slate-900/70 flex items-center justify-center transition"
                            data-ng-class="{'bg-emerald-500/60 border-emerald-300': checkboxArray['Fo_'+x.name]['checked']}">
                        <i class="fa fa-check text-xs text-white" data-ng-show="checkboxArray['Fo_'+x.name]['checked']"></i>
                      </span>
                    </label>
                  </td>
                  <td class="px-4 py-3"
                      data-ng-click="selectElbyTD(checkboxArray['Fo_'+x.name])"
                      data-ng-mousemove="visibleArray[x.name]=true"
                      data-ng-mouseleave="visibleArray[x.name]=false">
                    <div class="flex items-center gap-3">
                      <button type="button"
                              class="text-left text-white font-semibold hover:text-blue-200 transition"
                              data-ng-click="fileMngDraw(x.path, x.name); $event.stopPropagation();"
                              data-ng-init="fileManagerItem['Fo_'+x.name]['visibleEdit']=false; fileManagerItem['Fo_'+x.name]['type']='Folder';"
                              data-ng-show="!fileManagerItem['Fo_'+x.name]['visibleEdit']">
                        <i class="fa fa-folder mr-2 text-blue-200"></i>{{x.name}}
                      </button>
                      <div class="spinner"
                           data-ng-init="fileManagerItem['Fo_'+x.name]['img']=false"
                           data-ng-show="fileManagerItem['Fo_'+x.name]['img']">
                        <div class="rect1"></div>
                        <div class="rect2"></div>
                        <div class="rect3"></div>
                        <div class="rect4"></div>
                        <div class="rect5"></div>
                      </div>
                    </div>
                    <div class="space-y-2" data-ng-show="fileManagerItem['Fo_'+x.name]['visibleEdit']">
                      <label class="text-xs uppercase text-slate-400" data-ng-bind="t.renameFolderLabel"></label>
                      <div class="flex gap-2 flex-wrap">
                        <input type="hidden"
                               data-ng-init="fileManagerItem['Fo_'+x.name]['oldvalue']=x.name"
                               data-ng-model="fileManagerItem['Fo_'+x.name]['oldvalue']">
                        <input type="text"
                               class="flex-1 rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                               focus-on="Fo_{{x.name}}"
                               data-ng-init="fileManagerItem['Fo_'+x.name]['value']=x.name"
                               data-ng-model="fileManagerItem['Fo_'+x.name]['value']"
                               data-ng-click="$event.stopPropagation();"
                               my-enter="editElementApply(fileManagerItem['Fo_'+x.name]); $event.stopPropagation();">
                        <button type="button"
                                class="px-4 py-2 rounded-xl bg-emerald-500/30 text-sm font-semibold hover:bg-emerald-500/50 transition {{blockButtonsClass}}"
                                ng-disabled="blockButtons"
                                data-ng-click="editElementApply(fileManagerItem['Fo_'+x.name]); $event.stopPropagation();">
                          <span data-ng-bind="t.actionApply"></span>
                        </button>
                      </div>
                    </div>
