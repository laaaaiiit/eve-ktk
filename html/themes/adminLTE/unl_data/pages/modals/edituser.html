<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm"></div>
  <div class="relative w-full max-w-xl rounded-3xl border border-white/10 bg-gradient-to-br from-blue-950 via-blue-900 to-slate-900 text-slate-100 shadow-2xl">
    <div class="flex flex-col gap-2 px-8 pt-8 pb-4 border-b border-white/10">
      <div>
        <h3 class="text-2xl font-semibold" data-ng-bind="t.modalEditTitle"></h3>
        <p class="text-slate-300 text-sm" data-ng-bind="t.modalEditSubtitle"></p>
      </div>
    </div>

    <div class="px-8 py-6">
      <form role="form" name="form" class="space-y-5">
        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalUsernameLabel"></label>
          <input type="text"
                 class="w-full rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-3 text-white disabled:opacity-60"
                 data-ng-model="username"
                 disabled>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalPasswordLabel"></label>
          <input type="password"
                 class="w-full rounded-2xl bg-slate-900/60 border px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                 ng-class="{'border-red-500 focus:ring-red-500': errorClass == 'has-error passwd'}"
                 data-ng-model="passwd"
                 placeholder="{{t.modalPasswordLabel}}">
          <p class="text-xs text-red-400 mt-1" data-ng-show="errorClass == 'has-error passwd'" data-ng-bind="errorMessage"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalPasswordConfirmLabel"></label>
          <input type="password"
                 class="w-full rounded-2xl bg-slate-900/60 border px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                 ng-class="{'border-red-500 focus:ring-red-500': errorClass == 'has-error passwdConfirm' || passwdConfirm != passwd}"
                 data-ng-model="passwdConfirm"
                 placeholder="{{t.modalPasswordConfirmLabel}}">
          <p class="text-xs text-red-400 mt-1" data-ng-show="passwdConfirm != passwd" data-ng-bind="t.modalPasswordMismatch"></p>
          <p class="text-xs text-red-400 mt-1" data-ng-show="errorClass == 'has-error passwdConfirm'" data-ng-bind="errorMessage"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalRoleLabel"></label>
          <div class="relative">
            <select data-ng-model="selectRole"
                    data-ng-options="y for (x,y) in roles"
                    class="w-full rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-3 pr-12 text-white focus:outline-none focus:ring-2 focus:ring-blue-400 appearance-none">
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-500">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalLanguageLabel"></label>
          <div class="relative">
            <select data-ng-model="selectedLanguage"
                    data-ng-options="opt.key as opt.label for opt in languageOptions"
                    class="w-full rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-3 pr-12 text-white focus:outline-none focus:ring-2 focus:ring-blue-400 appearance-none">
            </select>
            <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-500">
              <i class="fa fa-chevron-down"></i>
            </span>
          </div>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] text-slate-400" data-ng-bind="t.modalPodLabel"></label>
          <input type="text"
                 inputmode="numeric"
                 pattern="[0-9]*"
                 class="w-full rounded-2xl bg-slate-900/60 border border-white/10 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-400"
                 data-ng-model="pod"
                 ng-model-options="{ allowInvalid: true }"
                 placeholder="{{t.modalPodLabel}}">
        </div>

        <p class="text-xs text-slate-400" data-ng-bind="t.modalRequiredHint"></p>
      </form>
    </div>

    <div class="flex items-center justify-end gap-3 px-8 pb-8 pt-2">
      <button class="px-4 py-2 rounded-xl border border-white/20 text-slate-200 hover:bg-white/10 transition cursor-pointer"
              type="button"
              ng-click="closeModal()"
              data-ng-bind="t.modalCancel">
      </button>
      <button class="px-5 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-cyan-400 text-white uppercase tracking-[0.25em] shadow-lg hover:shadow-2xl transition cursor-pointer {{blockButtonsClass}}"
              type="button"
              ng-disabled="blockButtons"
              ng-click="editUser()"
              data-ng-bind="t.modalSave">
      </button>
    </div>
  </div>
</div>
