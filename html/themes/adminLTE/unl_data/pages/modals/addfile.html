<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 theme-modal-backdrop"></div>
  <div class="relative w-full max-w-5xl theme-modal-panel">
    <div class="theme-modal-header">
      <div>
        <p class="text-xs uppercase tracking-[0.4em] theme-muted" data-ng-bind="t.modalWorkspaceLabel"></p>
        <h3 class="text-2xl font-semibold theme-heading" data-ng-bind="isEdit ? t.modalEditTitle : t.modalAddTitle"></h3>
        <p class="text-sm theme-muted" data-ng-bind="isEdit ? t.modalEditSubtitle : t.modalAddSubtitle"></p>
      </div>
    </div>

    <div class="theme-modal-body">
      <form id="form-lab-edit" name="formLabEdit" class="space-y-2">
        <div class="grid gap-3 lg:grid-cols-2">
          <div class="space-y-2">
            <div>
              <label class="text-xs uppercase tracking-[0.3em] theme-muted">
                <span data-ng-bind="t.modalNameLabel"></span>
                <span class="text-rose-400 text-base leading-none align-middle ml-1">*</span>
              </label>
              <input class="w-full theme-input"
                     name="name"
                     ng-model="labName"
                     data-ng-attr-placeholder="{{t.modalNameLabel}}"
                     autocomplete="off"
                     ng-pattern="restrictNumber"
                     required>
              <p class="text-xs mt-1" ng-class="formLabEdit.name.$valid ? 'text-slate-500' : 'text-rose-400'" data-ng-bind="t.modalNameHint"></p>
              <p class="text-xs text-rose-400" data-ng-show="errorClass == 'has-error name'" data-ng-bind="errorMessage"></p>
            </div>

            <div class="grid gap-3 sm:grid-cols-2">
              <div>
                <label class="text-xs uppercase tracking-[0.3em] theme-muted">
                  <span data-ng-bind="t.modalVersionLabel"></span>
                  <span class="text-rose-400 text-base leading-none align-middle ml-1">*</span>
                </label>
                <input id="version"
                       class="w-full theme-input"
                       name="version"
                       ng-model="version"
                       placeholder="1"
                       ng-pattern="restrictTest"
                       required>
                <p class="text-xs mt-1" ng-class="formLabEdit.version.$valid ? 'text-slate-500' : 'text-rose-400'" data-ng-bind="t.modalVersionHint"></p>
              </div>
              <div>
                <label class="text-xs uppercase tracking-[0.3em] theme-muted" data-ng-bind="t.modalTimeoutLabel"></label>
                <input class="w-full theme-input"
                       ng-model="scripttimeout"
                       placeholder="300">
              </div>
            </div>

            <div class="space-y-1">
              <label class="flex items-center justify-between gap-4 rounded-2xl border px-4 py-3 cursor-pointer select-none transition-colors duration-300"
                     ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
                <div>
                  <p class="text-sm font-semibold theme-heading" data-ng-bind="t.modalSharedLabel"></p>
                  <span class="text-xs theme-muted" data-ng-bind="t.modalSharedHint"></span>
                </div>
                <span class="relative inline-flex items-center">
                  <input type="checkbox" class="sr-only peer" ng-model="shared">
                  <span class="w-16 h-8 rounded-full border transition-colors duration-300 peer-checked:bg-emerald-500/80"
                        ng-class="themeClass('border-white/10 bg-slate-700/70','border-slate-300 bg-slate-200')"></span>
                  <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
                </span>
              </label>
              <label class="flex items-center justify-between gap-4 rounded-2xl border px-4 py-3 cursor-pointer select-none transition-colors duration-300"
                     ng-class="themeClass('border-white/10 bg-slate-900/40','border-slate-200 bg-white')">
                <div>
                  <p class="text-sm font-semibold theme-heading" data-ng-bind="t.modalCollaborateLabel"></p>
                  <span class="text-xs theme-muted" data-ng-bind="t.modalCollaborateHint"></span>
                </div>
                <span class="relative inline-flex items-center">
                  <input type="checkbox" class="sr-only peer" ng-model="collaborateAllowed">
                  <span class="w-16 h-8 rounded-full border transition-colors duration-300 peer-checked:bg-emerald-500/80"
                        ng-class="themeClass('border-white/10 bg-slate-700/70','border-slate-300 bg-slate-200')"></span>
                  <span class="absolute left-1 top-1 w-6 h-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
                </span>
              </label>
            </div>

            <div ng-show="shared">
              <p class="text-xs uppercase tracking-[0.25em] theme-muted">Доступ</p>
              <p class="text-xs theme-muted mb-1">Добавьте пользователей, которым нужен доступ к лаборатории. Выберите из списка или введите точное имя.</p>
              <div class="space-y-2">
                <div class="flex flex-wrap gap-2 min-h-[2rem]">
                  <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold"
                        ng-class="themeClass('bg-emerald-500/20 text-emerald-50 border border-white/10','bg-emerald-50 text-emerald-800 border border-emerald-200')"
                        ng-repeat="user in sharedWithUsers track by $index">
                    {{user}}
                    <button type="button"
                            class="text-[10px] leading-none"
                            ng-click="removeSharedWithUser(user)">
                      <i class="fa fa-times"></i>
                    </button>
                  </span>
                </div>
                <div class="relative">
                  <input class="w-full theme-input"
                         ng-model="sharedWithInput"
                         ng-change="onSharedWithInput()"
                         ng-focus="onSharedWithFocus()"
                         ng-blur="onSharedWithBlur()"
                         ng-keydown="handleSharedWithKey($event)"
                         placeholder="user1">
                  <ul class="absolute z-10 mt-2 w-full rounded-2xl border shadow-2xl max-h-48 overflow-auto"
                      ng-class="themeClass('bg-slate-900/90 border-white/10','bg-white border-slate-200')"
                      style="max-height: 12rem;"
                      data-ng-if="sharedWithFocused && sharedWithSuggestions.length">
                    <li data-ng-repeat="user in sharedWithSuggestions track by user">
                      <button type="button"
                              class="w-full text-left px-3 py-2 hover:bg-emerald-500/20 rounded-xl"
                              ng-class="themeClass('text-slate-100 hover:text-white','text-slate-800 hover:text-slate-900')"
                              ng-click="addSharedWithUser(user)">
                        {{user}}
                      </button>
                    </li>
                  </ul>
                  <p class="text-xs text-rose-400 mt-1" data-ng-if="sharedWithError">{{sharedWithError}}</p>
                </div>
              </div>
            </div>

          </div>

          <div class="space-y-2">
            <div>
              <label class="text-xs uppercase tracking-[0.3em] theme-muted" data-ng-bind="t.modalDescriptionLabel"></label>
              <textarea class="w-full theme-input min-h-[6rem]"
                        ng-model="description"
                        data-ng-attr-placeholder="{{t.modalDescriptionLabel}}"></textarea>
            </div>
            <div>
              <label class="text-xs uppercase tracking-[0.3em] theme-muted" data-ng-bind="t.modalTasksLabel"></label>
              <textarea class="w-full theme-input min-h-[6rem]"
                        ng-model="body"
                        data-ng-attr-placeholder="{{t.modalTasksLabel}}"></textarea>
            </div>
          </div>
        </div>

        <div class="flex items-center justify-between gap-3">
          <p class="text-xs theme-muted flex items-center">
            <span class="text-rose-400 text-base align-middle mr-1">*</span><span data-ng-bind="t.modalRequiredNote"></span>
          </p>
          <div class="flex items-center gap-3">
            <button type="button"
                    class="rounded-2xl border px-4 py-2 text-xs font-semibold transition cursor-pointer"
                    ng-class="themeClass('border-white/20 text-slate-200 hover:bg-white/10','border-slate-300 text-slate-800 hover:bg-slate-100')"
                    ng-click="closeModal()">
              <span data-ng-bind="t.modalCancel"></span>
            </button>
            <button type="submit"
                    class="rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-400 px-5 py-2 text-xs font-semibold uppercase tracking-[0.3em] text-white shadow-lg hover:shadow-2xl transition cursor-pointer"
                    ng-click="saveLab()">
              <span data-ng-bind="isEdit ? t.modalSaveChanges : t.modalCreate"></span>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
