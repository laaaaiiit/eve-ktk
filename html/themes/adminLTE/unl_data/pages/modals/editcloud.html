<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 theme-overlay transition-colors duration-300"></div>
  <div class="relative w-full max-w-xl rounded-3xl border shadow-2xl"
       ng-class="themeClass('border-white/10 bg-gradient-to-br from-blue-950 via-blue-900 to-slate-900 text-slate-100','bg-white border-slate-200 text-slate-900')">
    <div class="flex flex-col gap-2 px-8 pt-8 pb-4 border-b" ng-class="themeClass('border-white/10','border-slate-200')">
      <div>
        <h3 class="text-2xl font-semibold theme-heading" data-ng-bind="t.modalEditTitle"></h3>
        <p class="theme-muted text-sm" data-ng-bind="t.modalEditSubtitle"></p>
      </div>
    </div>

    <div class="px-8 py-6">
      <form name="cloudForm" class="space-y-5" novalidate>
        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalCloudNameLabel"></label>
          <input type="text"
                 name="cloudname"
                 class="theme-input"
                 data-ng-model="cloud.cloudname"
                 ng-pattern="/^[A-Za-z0-9_-]+$/"
                 required
                 placeholder="{{t.modalCloudNameLabel}}">
          <p class="text-xs theme-muted mt-1" data-ng-bind="t.modalCloudNameHint"></p>
          <p class="text-xs text-rose-500 mt-1" ng-show="cloudForm.cloudname.$invalid && cloudForm.cloudname.$touched"
             data-ng-bind="t.modalValidationCloudName"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalUserLabel"></label>
          <input type="text"
                 name="username"
                 class="theme-input"
                 data-ng-model="cloud.username"
                 required
                 placeholder="{{t.modalUserLabel}}">
          <p class="text-xs theme-muted mt-1" data-ng-bind="t.modalUserHint"></p>
        </div>

        <div>
          <label class="text-xs uppercase tracking-[0.35em] theme-muted" data-ng-bind="t.modalPnetLabel"></label>
          <input type="text"
                 name="pnet"
                 class="theme-input"
                 data-ng-model="cloud.pnet"
                 required
                 ng-pattern="/^pnet((0[1-9])|([1-9][0-9]{0,3}))$/"
                 placeholder="pnet1">
          <p class="text-xs theme-muted mt-1" data-ng-bind="t.modalPnetHint"></p>
          <p class="text-xs text-rose-500 mt-1" ng-show="cloudForm.pnet.$invalid && cloudForm.pnet.$touched"
             data-ng-bind="t.modalValidationPnet"></p>
        </div>
      </form>
    </div>

    <div class="flex items-center justify-end gap-3 px-8 pb-8 pt-2">
      <button class="px-4 py-2 rounded-xl border transition cursor-pointer"
              ng-class="themeClass('border-white/20 text-slate-200 hover:bg-white/10','border-slate-200 text-slate-800 hover:bg-slate-100')"
              type="button"
              ng-click="closeModal()"
              data-ng-bind="t.modalCancel">
      </button>
      <button class="px-5 py-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-500 text-white uppercase tracking-[0.25em] shadow-lg hover:shadow-2xl transition cursor-pointer"
              type="button"
              ng-disabled="cloudForm.$invalid"
              ng-click="editCloud(cloud)"
              data-ng-bind="t.modalSave">
      </button>
    </div>
  </div>
</div>
