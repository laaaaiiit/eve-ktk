<body data-ng-controller="unlMainController" class="page-loading">
<div ui-view></div>
<script>
$(document).ready(function(){
    if ($.fn && $.fn.tooltip) {
        $('[data-toggle="tooltip"]').tooltip({trigger: "click"});
    }
    if ($.fn && $.fn.popover) {
        $('[data-toggle="popover"]').popover({
            trigger: 'hover',
            placement: 'top'
        });
    }
});

toastr.options = {
  "closeButton": false,
  "debug": false,
  "newestOnTop": true,
  "progressBar": true,
  "positionClass": "toast-top-right",
  "preventDuplicates": false,
  "onclick": null,
  "showDuration": "300",
  "hideDuration": "1000",
  "timeOut": "2000",
  "extendedTimeOut": "1000",
  "showEasing": "swing",
  "hideEasing": "linear",
  "showMethod": "fadeIn",
  "hideMethod": "fadeOut"
}
var blockUI = function(options) {
    $.blockUI({
        message: '<div class="flex flex-col items-center gap-4 text-slate-100"><div class="w-14 h-14 border-4 border-t-transparent border-white/70 rounded-full animate-spin"></div><div class="text-sm tracking-[0.35em] uppercase">Loading</div></div>',
        css: {
            backgroundColor: 'rgba(14,18,27,0.95)',
            border: '1px solid rgba(255,255,255,0.1)',
            borderRadius: '1.5rem',
            padding: '24px 32px',
            boxShadow: '0 15px 45px rgba(8,10,18,0.5)'
        },
        overlayCSS: {
            backgroundColor: '#020617',
            opacity: 0.85,
            cursor: 'wait'
        }
    });
}
</script>
