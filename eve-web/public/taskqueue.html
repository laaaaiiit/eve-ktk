<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Task Queue</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="stylesheet" href="/assets/css/main.output.css">
  <link rel="stylesheet" href="/assets/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/assets/v2-scrollbar.css">
  <style>
    #taskSettingsModal input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
    #taskSettingsModal input[type="number"]::-webkit-outer-spin-button,
    #taskSettingsModal input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="toastRoot" class="fixed right-4 bottom-4 z-[80] flex w-[min(92vw,420px)] flex-col items-end gap-2 sm:right-6 sm:bottom-6"></div>
  <div id="headerHost"></div>
  <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6">
    <section id="pageCard" class="rounded-3xl border p-5 shadow-2xl transition-colors duration-300">
      <div class="mb-5 flex flex-wrap items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-black tracking-tight" data-i18n="title">Очередь задач</h1>
          <p class="mt-1 text-sm opacity-85" data-i18n="subTitle">Мониторинг операций запуска и остановки нод.</p>
        </div>
        <div class="ml-auto flex items-center gap-3">
          <div class="text-xs opacity-75">
            <span data-i18n="lastUpdate">Последнее обновление</span>:
            <span id="lastUpdateValue">-</span>
          </div>
          <div class="ml-auto flex items-center gap-2">
            <button id="clearHistoryBtn" type="button" class="hidden inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">
              <i class="fa fa-trash" aria-hidden="true"></i>
              <span data-i18n="clearHistory">Очистить журнал</span>
            </button>
            <button id="autoRefreshBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">
              <i id="autoRefreshIcon" class="fa fa-pause" aria-hidden="true"></i>
              <span data-i18n="autoRefresh">Автообновление</span>
              <span id="autoRefreshState" class="text-xs opacity-80"></span>
            </button>
            <button id="refreshBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">
              <i class="fa fa-refresh" aria-hidden="true"></i>
              <span data-i18n="refresh">Обновить</span>
            </button>
          </div>
        </div>
      </div>

      <div class="mb-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
        <div data-dd="status"></div>
        <div data-dd="limit"></div>
        <label class="relative block">
          <span class="sr-only">Search</span>
          <i class="fa fa-search pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 opacity-70"></i>
          <input id="searchInput" type="text" class="w-full rounded-xl border px-10 py-2 text-sm outline-none transition" placeholder="Поиск">
        </label>
      </div>

      <div class="mb-4 flex items-end justify-between gap-3">
        <div id="statusChips" class="flex min-w-0 flex-1 flex-nowrap items-center gap-2 overflow-x-auto"></div>
        <div class="ml-auto flex shrink-0 justify-end">
          <button id="taskSettingsOpenBtn" type="button" class="hidden inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">
            <i class="fa fa-sliders" aria-hidden="true"></i>
            <span data-i18n="taskSettingsOpen">Настройка задач</span>
          </button>
        </div>
      </div>

      <div id="tableWrap" class="overflow-x-auto rounded-2xl border">
        <table class="min-w-full text-sm">
          <thead id="thead" class="sticky top-0 z-10">
            <tr>
              <th class="px-3 py-3 text-left font-semibold" data-i18n="colCreated">Создано</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colStatus">Статус</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colAction">Действие</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colLab">Лаборатория</th>
              <th class="px-3 py-3 text-left font-semibold" data-i18n="colNode">Нода</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colRequestedBy">Кем</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colWorker">Воркер</th>
              <th class="px-3 py-3 text-center font-semibold" data-i18n="colOps">Операции</th>
              <th class="px-3 py-3 text-left font-semibold" data-i18n="colError">Ошибка</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden py-8 text-center text-sm opacity-80" data-i18n="empty">Задач не найдено.</div>
      <div id="paginationWrap" class="mt-4 flex items-center justify-between gap-3 text-sm">
        <div id="paginationInfo" class="opacity-80">-</div>
        <div class="flex items-center gap-2">
          <button id="pagePrevBtn" type="button" class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-sm font-semibold transition duration-200 cursor-pointer focus:outline-none">
            <i class="fa fa-chevron-left" aria-hidden="true"></i>
            <span data-i18n="pagePrev">Назад</span>
          </button>
          <span id="pageCurrentLabel" class="min-w-[7rem] text-center opacity-85">1 / 1</span>
          <button id="pageNextBtn" type="button" class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-sm font-semibold transition duration-200 cursor-pointer focus:outline-none">
            <span data-i18n="pageNext">Вперед</span>
            <i class="fa fa-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="taskSettingsModal" class="fixed inset-0 z-[95] hidden items-center justify-center p-4">
    <div id="taskSettingsModalBackdrop" class="absolute inset-0 bg-black/55 backdrop-blur-[1px]"></div>
    <div id="taskSettingsModalCard" class="relative w-full max-w-xl rounded-2xl border p-5 shadow-2xl">
      <div class="mb-4 flex items-center justify-between gap-3">
        <h2 class="text-lg font-black tracking-tight" data-i18n="taskSettingsTitle">Настройка задач</h2>
        <button id="taskSettingsCloseBtn" type="button" class="inline-flex items-center gap-2 rounded-lg border px-3 py-1.5 text-xs font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-times" aria-hidden="true"></i>
          <span data-i18n="close">Закрыть</span>
        </button>
      </div>
      <div class="grid gap-3 sm:grid-cols-4">
        <label>
          <span class="mb-1 block text-xs opacity-75" data-i18n="parallelLimitLabel">Семафор нод</span>
          <input id="parallelLimitInput" type="number" min="1" max="32" step="1" class="w-full rounded-xl border px-3 py-2 text-sm outline-none transition">
        </label>
        <label>
          <span class="mb-1 block text-xs opacity-75" data-i18n="workerStartSlotsLabel">Воркеры старта</span>
          <input id="workerStartSlotsInput" type="number" min="1" max="32" step="1" class="w-full rounded-xl border px-3 py-2 text-sm outline-none transition">
        </label>
        <label>
          <span class="mb-1 block text-xs opacity-75" data-i18n="workerStopSlotsLabel">Воркеры остановки</span>
          <input id="workerStopSlotsInput" type="number" min="1" max="32" step="1" class="w-full rounded-xl border px-3 py-2 text-sm outline-none transition">
        </label>
        <label>
          <span class="mb-1 block text-xs opacity-75" data-i18n="workerCheckSlotsLabel">Воркеры проверки</span>
          <input id="workerCheckSlotsInput" type="number" min="1" max="32" step="1" class="w-full rounded-xl border px-3 py-2 text-sm outline-none transition">
        </label>
      </div>
      <div class="mt-4 grid gap-2 sm:grid-cols-2">
        <label id="fastStopViosWrap" class="inline-flex items-center justify-between gap-4 rounded-2xl border px-4 py-3 cursor-pointer select-none transition-colors duration-300">
          <span data-i18n="fastStopViosLabel">Fast-stop vIOS</span>
          <span class="relative inline-flex items-center shrink-0">
            <input id="fastStopViosInput" type="checkbox" class="sr-only peer">
            <span id="fastStopViosTrack" class="h-8 w-16 rounded-full border transition-colors duration-300 peer-checked:bg-emerald-500/80 bg-slate-200 border-slate-300 dark:bg-slate-700/70 dark:border-white/20"></span>
            <span id="fastStopViosThumb" class="absolute left-1 top-1 h-6 w-6 rounded-full bg-white shadow-lg transition-transform duration-300 peer-checked:translate-x-8"></span>
          </span>
        </label>
      </div>
      <div id="workersCheckInline" class="mt-6 hidden rounded-xl border px-3 py-2 text-xs"></div>
      <div class="mt-5 flex items-center justify-end gap-2">
        <button id="workersCheckBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-heartbeat" aria-hidden="true"></i>
          <span data-i18n="workersCheck">Проверить воркеры</span>
        </button>
        <button id="workersRestartBtn" type="button" class="hidden inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-refresh" aria-hidden="true"></i>
          <span data-i18n="workersRestart">Перезапуск воркеров</span>
        </button>
        <button id="parallelLimitSaveBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-save" aria-hidden="true"></i>
          <span data-i18n="parallelLimitSave">Сохранить</span>
        </button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="fixed inset-0 z-[99] hidden items-center justify-center p-4">
    <div id="confirmModalBackdrop" class="absolute inset-0 bg-black/55 backdrop-blur-[1px]"></div>
    <div id="confirmModalCard" class="relative w-full max-w-md rounded-2xl border p-5 shadow-2xl">

      <p id="confirmModalText" class="mt-2 text-sm opacity-90">-</p>
      <div class="mt-5 flex justify-end gap-2">
        <button id="confirmModalCancelBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-3 py-1.5 text-xs font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-times" aria-hidden="true"></i>
          <span data-i18n="cancel">Отмена</span>
        </button>
        <button id="confirmModalOkBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-3 py-1.5 text-xs font-semibold transition duration-200 cursor-pointer focus:outline-none">
          <i class="fa fa-check" aria-hidden="true"></i>
          <span data-i18n="confirmAction">Подтвердить</span>
        </button>
      </div>
    </div>
  </div>

    function taskRowSignature(row) {

    function rebuildChangedRowsSnapshot(sourceRows) {
      const rowsLocal = Array.isArray(sourceRows) ? sourceRows : [];
      const nextTaskSnapshot = new Map();
      const nextGroupAccumulator = new Map();
      const nextChangedTaskIds = new Set();
      const nextChangedGroupIds = new Set();

      rowsLocal.forEach((row) => {
        const id = String(row && row.id ? row.id : '').trim();
        if (!id) return;
        const isGroupRow = !String(row && row.bulk_operation_id ? row.bulk_operation_id : '').trim()
          && Object.prototype.hasOwnProperty.call(row || {}, 'total')
          && Object.prototype.hasOwnProperty.call(row || {}, 'progress_pct');
        if (isGroupRow) {
          const groupSig = [
            String(row && row.status ? row.status : ''),
            String(row && row.attempts ? row.attempts : 0),
            String(row && row.progress_pct ? row.progress_pct : 0),
            String(row && row.queued ? row.queued : 0),
            String(row && row.running ? row.running : 0),
            String(row && row.done ? row.done : 0),
            String(row && row.failed ? row.failed : 0),
            String(row && row.skipped ? row.skipped : 0),
            String(row && row.updated_at ? row.updated_at : ''),
            String(row && row.error_text ? row.error_text : '')
          ].join('|');
          nextGroupAccumulator.set(id, [groupSig]);
          return;
        }
        const sig = taskRowSignature(row);
        nextTaskSnapshot.set(id, sig);
        if ((previousTaskSnapshot.get(id) || '') !== sig) {
          nextChangedTaskIds.add(id);
        }
        const gid = String(row && row.bulk_operation_id ? row.bulk_operation_id : '').trim();
        if (gid) {
          if (!nextGroupAccumulator.has(gid)) nextGroupAccumulator.set(gid, []);
          nextGroupAccumulator.get(gid).push(sig);
        }
      });

      const nextGroupSnapshot = new Map();
      nextGroupAccumulator.forEach((sigs, gid) => {
        const groupSig = sigs.slice().sort().join('||');
        nextGroupSnapshot.set(gid, groupSig);
        if ((previousGroupSnapshot.get(gid) || '') !== groupSig) {
          nextChangedGroupIds.add(gid);
        }
      });

      previousTaskSnapshot = nextTaskSnapshot;
      previousGroupSnapshot = nextGroupSnapshot;
      changedTaskIds = nextChangedTaskIds;
      changedGroupIds = nextChangedGroupIds;

      if (clearChangedRowsTimer) {
        clearTimeout(clearChangedRowsTimer);
      }
      clearChangedRowsTimer = window.setTimeout(() => {
        changedTaskIds = new Set();
        changedGroupIds = new Set();
        if (document.visibilityState !== 'hidden') {
          renderRows();
        }
      }, 1200);
    }

    function buildDisplayRows(sourceRows) {
      const all = Array.isArray(sourceRows) ? sourceRows : [];
      const grouped = new Map();
      const output = [];
      all.forEach((row) => {
        const isGroupRow = !String(row && row.bulk_operation_id ? row.bulk_operation_id : '').trim()
          && Object.prototype.hasOwnProperty.call(row || {}, 'total')
          && Object.prototype.hasOwnProperty.call(row || {}, 'progress_pct');
        if (isGroupRow) {
          output.push({
            type: 'group',
            groupId: String(row.id || ''),
            action: String(row.action || ''),
            status: String(row.status || ''),
            created_at: row.created_at || null,
            lab_name: row.lab_name || null,
            requested_by: row.requested_by || null,
            attempts: Number(row.attempts || 0),
            worker_name: row.worker_name || null,
            worker_host: row.worker_host || null,
            worker_slot: row.worker_slot || null,
            worker_pid: row.worker_pid || null,
            error_text: row.error_text || '',
            bulk_operation_label: row.label || '',
            nodes_count: Number(row.total || 0),
            counts: {
              pending: Number(row.queued || 0),
              running: Number(row.running || 0),
              done: Number(row.done || 0),
              failed: Number(row.failed || 0)
            },
            bulk_operation_total: Number(row.total || 0),
            bulk_operation_index_max: Number(row.total || 0),
            progress_pct: Number(row.progress_pct || 0),
            skipped: Number(row.skipped || 0)
          });
          return;
        }
        const groupId = String(row && row.bulk_operation_id ? row.bulk_operation_id : '').trim();
        if (!groupId) {
          output.push({ type: 'task', row });
          return;
        }
        if (!grouped.has(groupId)) grouped.set(groupId, []);
        grouped.get(groupId).push(row);
      });

      grouped.forEach((items, groupId) => {
        if (!Array.isArray(items) || items.length <= 1) {
          if (items && items[0]) output.push({ type: 'task', row: items[0] });
          return;
        }
        const sorted = items.slice().sort((a, b) => {
          const da = new Date(String(a.created_at || 0)).getTime();
          const db = new Date(String(b.created_at || 0)).getTime();
          return db - da;
        });
        const top = sorted[0] || {};
        output.push({
          type: 'group',
          groupId,
          action: String(top.action || ''),
          status: groupStatusFromTasks(items),
          created_at: top.created_at || null,
          lab_name: top.lab_name || null,
          requested_by: top.requested_by || null,
          attempts: Math.max(...items.map((r) => Number(r.attempts || 0))),
          worker_name: top.worker_name || null,
          worker_host: top.worker_host || null,
          worker_slot: top.worker_slot || null,
          worker_pid: top.worker_pid || null,
          error_text: (items.find((r) => String(r.error_text || '').trim() !== '') || {}).error_text || '',
          bulk_operation_label: top.bulk_operation_label || '',
          nodes_count: items.length,
          counts: {
            pending: items.filter((r) => String(r && r.status ? r.status : '').toLowerCase() === 'pending').length,
            running: items.filter((r) => String(r && r.status ? r.status : '').toLowerCase() === 'running').length,
            done: items.filter((r) => String(r && r.status ? r.status : '').toLowerCase() === 'done').length,
            failed: items.filter((r) => String(r && r.status ? r.status : '').toLowerCase() === 'failed').length
          },
          bulk_operation_total: Math.max(
            0,
            ...items.map((r) => Number(r && r.bulk_operation_total ? r.bulk_operation_total : 0))
          ),
          bulk_operation_index_max: Math.max(
            0,
            ...items.map((r) => Number(r && r.bulk_operation_index ? r.bulk_operation_index : 0))
          )
        });
      });

      output.sort((a, b) => {
        const ad = new Date(String(a.type === 'group' ? a.created_at : (a.row && a.row.created_at) || 0)).getTime();
        const bd = new Date(String(b.type === 'group' ? b.created_at : (b.row && b.row.created_at) || 0)).getTime();
        return bd - ad;
      });
      return output;
    }

    function groupProgressMetrics(item) {
      const counts = (item && typeof item.counts === 'object' && item.counts) ? item.counts : {};
      const doneCount = Number(counts.done || item.done || 0);
      const failedCount = Number(counts.failed || item.failed || 0);
      const skippedCount = Number(item && item.skipped ? item.skipped : 0);
      const explicitTotal = Number(item && item.bulk_operation_total ? item.bulk_operation_total : 0);
      const maxBulkIndex = Number(item && item.bulk_operation_index_max ? item.bulk_operation_index_max : 0);
      const observedTotal = Number(item && item.nodes_count ? item.nodes_count : Number(item && item.total ? item.total : 0));
      const total = Math.max(1, explicitTotal, maxBulkIndex, observedTotal);
      const completed = Math.min(total, Math.max(0, doneCount + failedCount + skippedCount));
      const explicitPct = Number(item && item.progress_pct ? item.progress_pct : 0);
      return {
        total,
        completed,
        percent: Math.max(0, Math.min(100, Number.isFinite(explicitPct) && explicitPct > 0 ? explicitPct : Math.round((completed / total) * 100)))
      };
    }

      btn.type = 'button';
      const panel = document.createElement('div');
      root.innerHTML = '';
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-4 py-2 text-left text-sm font-semibold text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-2 text-left text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        panel.className = `v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${esc(tr(labelKey))}</span></span><i class="fa fa-chevron-down text-xs ${isLight ? 'text-slate-500' : 'text-slate-400'}"></i>`;

        panel.innerHTML = '';
        const current = location.pathname;
        items.forEach((it) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = !!it.href && current === it.href;
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(it.key)}<span>${esc(tr(it.key))}</span></span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', () => {
            closeAllDropdownPanels();
            if (it.href) {
              location.href = it.href;
              return;
            }
            toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) panel.classList.add('hidden');
      });
      repaint();
      return repaint;
    }

    function renderTaskSettingsControls() {

      const openBtn = byId('taskSettingsOpenBtn');
      const clearHistoryBtn = byId('clearHistoryBtn');
      const workersRestartBtn = byId('workersRestartBtn');
      if (!input || !workerStartInput || !workerStopInput || !workerCheckInput || !saveBtn) return;
      if (openBtn) {
        openBtn.classList.toggle('hidden', !canManageTaskSettings);
        openBtn.disabled = !canManageTaskSettings;
      }
      input.value = String(parallelLimitValue);
      workerStartInput.value = String(startWorkerSlotsValue);
      workerStopInput.value = String(stopWorkerSlotsValue);
      workerCheckInput.value = String(checkWorkerSlotsValue);
      if (fastStopViosInput) fastStopViosInput.checked = !!fastStopViosValue;
      input.disabled = !canManageTaskSettings;
      workerStartInput.disabled = !canManageTaskSettings;
      workerStopInput.disabled = !canManageTaskSettings;
      workerCheckInput.disabled = !canManageTaskSettings;
      if (fastStopViosInput) fastStopViosInput.disabled = !canManageTaskSettings;
      saveBtn.disabled = !canManageTaskSettings;
      if (clearHistoryBtn) {
        clearHistoryBtn.classList.toggle('hidden', !canManageTaskSettings);
        clearHistoryBtn.disabled = !canManageTaskSettings;
      }
      if (workersRestartBtn) {
        workersRestartBtn.classList.toggle('hidden', !canManageTaskSettings);
        workersRestartBtn.disabled = !canManageTaskSettings;
      }
    }

    function renderWorkersCheckInline(message, tone = 'info') {
      const el = byId('workersCheckInline');
      if (!el) return;
      if (workersInlineTimer) {
        window.clearTimeout(workersInlineTimer);
        workersInlineTimer = 0;
      }
      const text = String(message || '').trim();
      if (!text) {
        el.classList.add('hidden');
        el.textContent = '';
        return;
      }
      const isLight = theme === 'light';
      const toneValue = String(tone || 'info').toLowerCase();
      let cls = isLight
        ? 'border-slate-200 bg-slate-50 text-slate-700'
        : 'border-white/20 bg-slate-900/60 text-slate-200';
      if (toneValue === 'success') {
        cls = isLight
          ? 'border-emerald-300 bg-emerald-50 text-emerald-800'
          : 'border-emerald-400/40 bg-emerald-500/10 text-emerald-200';
      } else if (toneValue === 'error') {
        cls = isLight
          ? 'border-rose-300 bg-rose-50 text-rose-800'
          : 'border-rose-400/40 bg-rose-500/10 text-rose-200';
      }
      el.className = `mt-6 mb-4 rounded-xl border px-3 py-2 text-xs ${cls}`;
      el.textContent = text;
      el.classList.remove('hidden');
      workersInlineTimer = window.setTimeout(() => {
        el.classList.add('hidden');
        workersInlineTimer = 0;
      }, 8000);
    }

    function closeConfirmModal(result = false) {
      const modal = byId('confirmModal');
      if (modal) {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
      }
      if (typeof confirmModalResolve === 'function') {
        const resolve = confirmModalResolve;
        confirmModalResolve = null;
        resolve(!!result);
      }
    }

    function openConfirmModal(message) {
      return new Promise((resolve) => {
        confirmModalResolve = resolve;
        const textEl = byId('confirmModalText');
        if (textEl) textEl.textContent = String(message || '').trim() || tr('confirmTitle');
        const modal = byId('confirmModal');
        if (modal) {
          modal.classList.remove('hidden');
          modal.classList.add('flex');
        } else {
          resolve(false);
        }
      });
    }

    async function checkTaskWorkersStatus(showToast = true, showInline = true) {
      const res = await jget(api.taskWorkersStatus);
      const data = res && res.data ? res.data : {};
      const activeIds = Array.isArray(data.active_worker_ids) ? data.active_worker_ids : [];
      const activeSlots = Array.isArray(data.active_worker_slots) ? data.active_worker_slots : [];
      const active = activeIds.length
        ? activeIds.join(',')
        : (activeSlots.length ? activeSlots.join(',') : '-');
      const checkSlots = Number(data.check_worker_slots || data.worker_slots || 0);
      const line = tr('workersCheckResult')
        .replace('{start_slots}', String(Number(data.start_worker_slots || 0)))
        .replace('{stop_slots}', String(Number(data.stop_worker_slots || 0)))
        .replace('{check_slots}', String(checkSlots))
        .replace('{semaphore}', String(Number(data.power_parallel_limit || 0)))
        .replace('{pending}', String(Number(data.pending_tasks || 0)))
        .replace('{running}', String(Number(data.running_tasks || 0)))
        .replace('{active}', active);
      if (showInline) {
        renderWorkersCheckInline(`${tr('workersCheckPrefix')}: ${line}`, 'success');
      }
      if (showToast) {
        toast(line, 'success');
      }
      return data;
    }

    async function loadTaskSettings(showToastOnError = false) {
      try {
        const res = await jget(api.taskSettings);
        const data = res && res.data ? res.data : {};
        canManageTaskSettings = !!data.can_manage;
        parallelLimitValue = Math.max(1, Number(data.power_parallel_limit || 2));
        const fallbackSlots = Math.max(1, Number(data.worker_slots || parallelLimitValue || 2));
        startWorkerSlotsValue = Math.max(1, Number(data.start_worker_slots || fallbackSlots));
        stopWorkerSlotsValue = Math.max(1, Number(data.stop_worker_slots || fallbackSlots));
        checkWorkerSlotsValue = Math.max(1, Number(data.check_worker_slots || fallbackSlots));
        fastStopViosValue = (data.fast_stop_vios === undefined) ? true : !!data.fast_stop_vios;
        const input = byId('parallelLimitInput');
        const workerStartInput = byId('workerStartSlotsInput');
        const workerStopInput = byId('workerStopSlotsInput');
        const workerCheckInput = byId('workerCheckSlotsInput');
        if (input) {
          input.min = String(Number(data.min_limit || 1));
          input.max = String(Number(data.max_limit || 32));
        }
        if (workerStartInput) {
          workerStartInput.min = String(Number(data.min_limit || 1));
          workerStartInput.max = String(Number(data.max_limit || 32));
        }
        if (workerStopInput) {
          workerStopInput.min = String(Number(data.min_limit || 1));
          workerStopInput.max = String(Number(data.max_limit || 32));
        }
        if (workerCheckInput) {
          workerCheckInput.min = String(Number(data.min_limit || 1));
          workerCheckInput.max = String(Number(data.max_limit || 32));
        }
        renderTaskSettingsControls();
      } catch (e) {
        canManageTaskSettings = false;
        renderTaskSettingsControls();
        if (showToastOnError) {
          toast((e && e.message) ? e.message : tr('errLoad'));
        }
      }
    }

    async function saveTaskSettings() {
      const input = byId('parallelLimitInput');
      const workerStartInput = byId('workerStartSlotsInput');
      const workerStopInput = byId('workerStopSlotsInput');
      const workerCheckInput = byId('workerCheckSlotsInput');
      const fastStopViosInput = byId('fastStopViosInput');
      if (!input || !workerStartInput || !workerStopInput || !workerCheckInput) return;
      const requested = Math.max(1, Number(input.value || parallelLimitValue || 2));
      const requestedStartWorkers = Math.max(1, Number(workerStartInput.value || startWorkerSlotsValue || 2));
      const requestedStopWorkers = Math.max(1, Number(workerStopInput.value || stopWorkerSlotsValue || 2));
      const requestedCheckWorkers = Math.max(1, Number(workerCheckInput.value || checkWorkerSlotsValue || 2));
      const requestedFastStopVios = !!(fastStopViosInput ? fastStopViosInput.checked : fastStopViosValue);
      const res = await jget(api.taskSettings, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          power_parallel_limit: requested,
          start_worker_slots: requestedStartWorkers,
          stop_worker_slots: requestedStopWorkers,
          check_worker_slots: requestedCheckWorkers,
          fast_stop_vios: requestedFastStopVios
        })
      });
      const data = res && res.data ? res.data : {};
      parallelLimitValue = Math.max(1, Number(data.power_parallel_limit || requested));
      startWorkerSlotsValue = Math.max(1, Number(data.start_worker_slots || requestedStartWorkers));
      stopWorkerSlotsValue = Math.max(1, Number(data.stop_worker_slots || requestedStopWorkers));
      checkWorkerSlotsValue = Math.max(1, Number(data.check_worker_slots || requestedCheckWorkers));
      fastStopViosValue = (data.fast_stop_vios === undefined) ? requestedFastStopVios : !!data.fast_stop_vios;
      renderTaskSettingsControls();
      toast(tr('parallelLimitSaved'), 'success');
    }

    async function loadTasks(showToastOnError = true) {
      const params = new URLSearchParams();
      params.set('limit', String(serverFetchLimit));
      params.set('page', '1');
      if (statusFilter !== 'all') {
        params.set('status', statusFilter);
      }
      try {
        let loaded = false;
        let groupedRows = [];
        try {
          const groupsRes = await jget(`${api.taskGroups}?${params.toString()}`);
          const groupsData = groupsRes && groupsRes.data ? groupsRes.data : {};
          groupedRows = Array.isArray(groupsData)
            ? groupsData
            : (Array.isArray(groupsData.items) ? groupsData.items : []);
          loaded = true;
        } catch (_) {}

        const res = await jget(`${api.tasks}?${params.toString()}`);
        const data = res && res.data ? res.data : {};
        const taskRows = Array.isArray(data)
          ? data
          : (Array.isArray(data.items) ? data.items : []);

        if (loaded) {
          const singleRows = taskRows.filter((row) => {
            const gid = String(row && row.bulk_operation_id ? row.bulk_operation_id : '').trim();
            return gid === '';
          });
          rows = groupedRows.concat(singleRows);
        } else {
          rows = taskRows;
        }
        byId('lastUpdateValue').textContent = formatDateTime(new Date().toISOString());
        rebuildChangedRowsSnapshot(rows);
        renderRows();
      } catch (e) {
        if (showToastOnError) {
          toast((e && e.message) ? e.message : tr('errLoad'));
        }
      }
    }

        }
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
        setTimeout(() => { location.href = '/login'; }, 900);
      }
    })();
  </script>
</body>
</html>
