<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VM Console | EVE</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="stylesheet" href="/assets/css/main.output.css">
  <link rel="stylesheet" href="/assets/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/assets/v2-scrollbar.css">
  <link rel="stylesheet" href="/assets/vendor/xterm/xterm.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #fff !important; }
    body { overscroll-behavior: none; }
    .console-shell { height: 100dvh; min-height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    .console-terminal-wrap { flex: 1 1 auto; min-height: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
    .console-terminal { width: 100%; height: 100%; min-height: 0; border-radius: 0; overflow: hidden; background: #fff; }
    .console-terminal .xterm,
    .console-terminal .xterm-viewport,
    .console-terminal .xterm-screen,
    .console-terminal .xterm-screen canvas,
    .console-terminal .xterm-rows {
      background: #fff !important;
    }
    .console-terminal .xterm-viewport { overflow-y: hidden !important; }
  </style>
</head>
<body class="min-h-screen bg-white text-slate-900 transition-colors duration-300">
  <div id="app" class="console-shell min-h-screen bg-white transition-colors duration-300">
    <div id="toastRoot" class="fixed right-4 bottom-4 z-[80] flex w-[min(92vw,420px)] flex-col items-end gap-2 sm:right-6 sm:bottom-6"></div>

    <header id="topBar" class="border-b px-3 py-2">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <i class="fa fa-terminal"></i>
            <h1 class="truncate text-sm font-semibold" data-i18n="title">Консоль VM</h1>
          </div>
          <div class="mt-0.5 flex items-center gap-2 text-xs opacity-85">
            <span id="statusDot" class="inline-block h-2 w-2 rounded-full bg-slate-400"></span>
            <span id="statusText"></span>
            <span id="transferStatus" class="ml-2"></span>
          </div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button id="btnUpload" type="button" class="rounded-lg border border-blue-500 bg-blue-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-blue-500">
            <i class="fa fa-upload mr-1"></i><span data-i18n="upload">Загрузить</span>
          </button>
          <button id="btnDownload" type="button" class="rounded-lg border border-amber-500 bg-amber-500 px-3 py-1.5 text-xs font-semibold text-white hover:bg-amber-400">
            <i class="fa fa-download mr-1"></i><span data-i18n="download">Скачать</span>
          </button>
          <button id="btnReconnect" type="button" class="rounded-lg border px-3 py-1.5 text-xs font-semibold">
            <i class="fa fa-refresh mr-1"></i><span data-i18n="reconnect">Переподключить</span>
          </button>
          <button id="btnMain" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold hover:bg-slate-50">
            <i class="fa fa-home mr-1"></i><span data-i18n="toMain">В главное</span>
          </button>
          <button id="btnClose" type="button" class="rounded-lg border px-3 py-1.5 text-xs font-semibold">
            <i class="fa fa-times mr-1"></i><span data-i18n="close">Закрыть</span>
          </button>
          <input id="uploadFileInput" type="file" class="hidden">
        </div>
      </div>
    </header>

    <section class="console-terminal-wrap">
      <div id="terminal" class="console-terminal"></div>
    </section>
  </div>
  <div id="downloadModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/55 p-4">
    <div id="downloadModalCard" class="w-full max-w-2xl rounded-2xl border bg-white p-4 shadow-2xl">
      <div class="mb-3 flex items-center justify-between gap-3">
        <div>
          <div class="text-sm font-semibold" data-i18n="downloadChooseTitle">Выберите файл для скачивания</div>
          <div id="downloadModalDir" class="text-xs text-slate-500">-</div>
        </div>
        <button id="downloadModalClose" type="button" class="rounded-lg border border-slate-300 bg-white px-2.5 py-1.5 text-xs font-semibold hover:bg-slate-50">
          <i class="fa fa-times mr-1"></i><span data-i18n="close">Закрыть</span>
        </button>
      </div>
      <div id="downloadModalBody" class="max-h-[58vh] overflow-auto rounded-xl border border-slate-200">
        <div id="downloadModalEmpty" class="hidden px-4 py-6 text-sm text-slate-500" data-i18n="downloadNoFiles">В текущей папке нет файлов.</div>
        <div id="downloadModalList" class="divide-y divide-slate-200"></div>
      </div>
    </div>
  </div>
  <iframe id="downloadFrame" class="hidden" title="download-frame"></iframe>

  <script src="/assets/vendor/xterm/xterm.js"></script>
  <script src="/assets/v2-heartbeat.js"></script>
  <script src="/assets/v2-toast.js"></script>
  <script>
    const i18n = {
      ru: {
        title: 'Консоль VM',
        reconnect: 'Переподключить',
        toMain: 'В главное',
        close: 'Закрыть',
        upload: 'Загрузить',
        download: 'Скачать',
        statusConnecting: 'Подключение...',
        statusConnected: 'Подключено',
        statusClosed: 'Сессия завершена',
        statusError: 'Ошибка',
        errAuth: 'Требуется авторизация.',
        errOpen: 'Не удалось открыть консоль VM.',
        errRead: 'Ошибка чтения консоли.',
        errPath: 'Укажите абсолютный путь файла.',
        errCwd: 'Не удалось определить текущую папку в консоли.',
        uploadDone: 'Файл загружен',
        downloadStarted: 'Скачивание запущено',
        transferUploading: 'Загрузка',
        transferIdle: 'Передача не выполняется',
        downloadChooseTitle: 'Выберите файл для скачивания',
        downloadNoFiles: 'В текущей папке нет файлов.',
        fileChooseError: 'Не удалось получить список файлов текущей папки.',
      },
      en: {
        title: 'VM Console',
        reconnect: 'Reconnect',
        toMain: 'To Main',
        close: 'Close',
        upload: 'Upload',
        download: 'Download',
        statusConnecting: 'Connecting...',
        statusConnected: 'Connected',
        statusClosed: 'Session closed',
        statusError: 'Error',
        errAuth: 'Authorization is required.',
        errOpen: 'Failed to open VM console.',
        errRead: 'Failed to read console stream.',
        errPath: 'Provide an absolute file path.',
        errCwd: 'Failed to detect current console directory.',
        uploadDone: 'File uploaded',
        downloadStarted: 'Download started',
        transferUploading: 'Uploading',
        transferIdle: 'No transfer in progress',
        downloadChooseTitle: 'Choose file to download',
        downloadNoFiles: 'No files in current directory.',
        fileChooseError: 'Failed to load file list from current directory.',
      }
    };

    const api = {
      auth: '/api/auth',
      ping: '/api/auth/ping',
      open: '/api/system/host-console/session',
      read: (sid, offset) => `/api/console/sessions/${encodeURIComponent(sid)}/read?offset=${offset}&wait_ms=900&max_bytes=65536`,
      write: (sid) => `/api/console/sessions/${encodeURIComponent(sid)}/write`,
      close: (sid) => `/api/console/sessions/${encodeURIComponent(sid)}`,
      uploadInit: '/api/system/host-console/uploads/init',
      uploadChunk: (id, offset) => `/api/system/host-console/uploads/${encodeURIComponent(id)}?offset=${offset}`,
      uploadComplete: (id) => `/api/system/host-console/uploads/${encodeURIComponent(id)}/complete`,
      download: (path) => `/api/system/host-console/download?path=${encodeURIComponent(path)}`,
      listFiles: (path) => `/api/system/host-console/files?path=${encodeURIComponent(path)}&limit=500`
    };

    let me = null;
    let lang = localStorage.getItem('eve_v2_lang') || 'ru';
    let theme = localStorage.getItem('eve_v2_theme') || 'dark';

    let term = null;
    let sessionId = '';
    let readOffset = 0;
    let readLoopToken = 0;
    let writeBusy = false;
    let writeQueue = '';
    let closing = false;
    let receivedAnyOutput = false;
    let termResizeObserver = null;
    const utf8Decoder = (typeof TextDecoder !== 'undefined') ? new TextDecoder('utf-8') : null;
    const utf8Encoder = (typeof TextEncoder !== 'undefined') ? new TextEncoder() : null;
    let cwdProbeBuffer = '';
    let currentCwd = '';
    const cwdProbeWaiters = new Map();
    let downloadModalOpen = false;

    const toaster = window.createV2ToastManager ? window.createV2ToastManager({
      rootId: 'toastRoot',
      getTheme: () => theme,
      getLabel: () => 'Notifications',
      durationMs: 5000
    }) : null;

    function tr(key) {
      return (i18n[lang] || i18n.ru)[key] || key;
    }

    function toast(message, kind = 'error') {
      if (toaster) toaster.toast(message, kind);
    }

    async function jget(url, opts = {}) {
      const res = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts
      });
      const ct = (res.headers.get('content-type') || '').toLowerCase();
      const isJson = ct.includes('application/json');
      const body = isJson ? await res.json().catch(() => null) : null;
      if (!res.ok) {
        const msg = body && body.message ? body.message : `HTTP ${res.status}`;
        throw new Error(msg);
      }
      return body;
    }

    function statusSet(kind, text) {
      const dot = document.getElementById('statusDot');
      const label = document.getElementById('statusText');
      if (label) label.textContent = text;
      if (!dot) return;
      dot.className = 'inline-block h-2 w-2 rounded-full';
      if (kind === 'ok') dot.classList.add('bg-emerald-400');
      else if (kind === 'warn') dot.classList.add('bg-amber-400');
      else if (kind === 'error') dot.classList.add('bg-rose-400');
      else dot.classList.add('bg-slate-400');
    }

    function setTransferStatus(text) {
      const el = document.getElementById('transferStatus');
      if (el) el.textContent = String(text || tr('transferIdle'));
    }

    function toBinaryBase64(str) {
      let out = '';
      for (let i = 0; i < str.length; i += 1) {
        out += String.fromCharCode(str.charCodeAt(i) & 0xff);
      }
      return btoa(out);
    }

    function utf8ToBase64(str) {
      if (!utf8Encoder) return toBinaryBase64(str);
      const bytes = utf8Encoder.encode(String(str || ''));
      let bin = '';
      for (let i = 0; i < bytes.length; i += 1) {
        bin += String.fromCharCode(bytes[i]);
      }
      return btoa(bin);
    }

    function decodeChunkBase64Utf8(chunkBase64) {
      const bin = atob(String(chunkBase64 || ''));
      if (!utf8Decoder) return bin;
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i += 1) {
        bytes[i] = bin.charCodeAt(i) & 0xff;
      }
      return utf8Decoder.decode(bytes, { stream: true });
    }

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key) el.textContent = tr(key);
      });
      setTransferStatus('');
    }

    function formatSize(bytes) {
      const b = Number(bytes || 0);
      if (!Number.isFinite(b) || b < 1024) return `${Math.max(0, Math.floor(b || 0))} B`;
      const units = ['KB', 'MB', 'GB', 'TB'];
      let value = b / 1024;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[idx]}`;
    }

    function closeDownloadModal() {
      const modal = document.getElementById('downloadModal');
      if (!modal) return;
      downloadModalOpen = false;
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function triggerDownload(path) {
      const target = String(path || '').trim();
      if (!target.startsWith('/')) {
        toast(tr('errPath'), 'error');
        return;
      }
      const frame = document.getElementById('downloadFrame');
      const url = `${api.download(target)}&ts=${Date.now()}`;
      if (frame) {
        frame.setAttribute('src', url);
      } else {
        const a = document.createElement('a');
        a.href = url;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
      toast(tr('downloadStarted'), 'success');
    }

    function openDownloadModal(directory, files) {
      const modal = document.getElementById('downloadModal');
      const dirEl = document.getElementById('downloadModalDir');
      const listEl = document.getElementById('downloadModalList');
      const emptyEl = document.getElementById('downloadModalEmpty');
      if (!modal || !dirEl || !listEl || !emptyEl) return;
      dirEl.textContent = String(directory || '/');
      listEl.innerHTML = '';
      const rows = Array.isArray(files) ? files : [];
      if (!rows.length) {
        emptyEl.classList.remove('hidden');
      } else {
        emptyEl.classList.add('hidden');
        rows.forEach((row) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'flex w-full items-center justify-between px-3 py-2 text-left text-sm hover:bg-slate-50';
          const name = String(row && row.name ? row.name : '');
          const path = String(row && row.path ? row.path : '');
          const size = formatSize(row && typeof row.size !== 'undefined' ? row.size : 0);
          btn.innerHTML = `<span class=\"truncate pr-3\">${name}</span><span class=\"shrink-0 text-xs text-slate-500\">${size}</span>`;
          btn.addEventListener('click', () => {
            closeDownloadModal();
            triggerDownload(path);
          });
          listEl.appendChild(btn);
        });
      }
      downloadModalOpen = true;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function applyTheme() {
      const body = document.body;
      const app = document.getElementById('app');
      const topBar = document.getElementById('topBar');
      const terminal = document.getElementById('terminal');
      const btnUpload = document.getElementById('btnUpload');
      const btnDownload = document.getElementById('btnDownload');
      const btnReconnect = document.getElementById('btnReconnect');
      const btnMain = document.getElementById('btnMain');
      const btnClose = document.getElementById('btnClose');
      const downloadModalClose = document.getElementById('downloadModalClose');
      const btnBase = 'inline-flex items-center gap-2 rounded-xl border px-3 py-1.5 text-xs font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';

      if (theme === 'light') {
        body.className = 'min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300';
        app.className = 'console-shell min-h-screen transition-colors duration-300 bg-white';
        topBar.className = 'border-b border-slate-300 bg-white/95 px-3 py-2';
        terminal.className = 'console-terminal bg-white';
        if (btnUpload) btnUpload.className = `${btnBase} border-blue-300 bg-gradient-to-r from-blue-500 to-sky-500 text-white hover:from-blue-600 hover:to-sky-600`;
        if (btnDownload) btnDownload.className = `${btnBase} border-amber-300 bg-gradient-to-r from-amber-500 to-orange-500 text-white hover:from-amber-600 hover:to-orange-600`;
        btnReconnect.className = `${btnBase} border-slate-300 bg-white text-slate-800 hover:bg-slate-50`;
        if (btnMain) btnMain.className = `${btnBase} border-slate-300 bg-white text-slate-800 hover:bg-slate-50`;
        btnClose.className = `${btnBase} border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100`;
        if (downloadModalClose) downloadModalClose.className = `${btnBase} border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100`;
      } else {
        body.className = 'min-h-screen bg-white text-slate-900 transition-colors duration-300';
        app.className = 'console-shell min-h-screen transition-colors duration-300 bg-white';
        topBar.className = 'border-b border-white/20 bg-slate-900/80 px-3 py-2';
        terminal.className = 'console-terminal bg-white';
        if (btnUpload) btnUpload.className = `${btnBase} border-cyan-400/40 bg-gradient-to-r from-cyan-500/85 to-blue-500/85 text-white hover:brightness-110`;
        if (btnDownload) btnDownload.className = `${btnBase} border-amber-400/40 bg-gradient-to-r from-amber-500/85 to-orange-500/85 text-white hover:brightness-110`;
        btnReconnect.className = `${btnBase} border-white/20 bg-slate-900/50 text-slate-100 hover:bg-white/10`;
        if (btnMain) btnMain.className = `${btnBase} border-white/20 bg-slate-900/50 text-slate-100 hover:bg-white/10`;
        btnClose.className = `${btnBase} border-rose-400/40 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20`;
        if (downloadModalClose) downloadModalClose.className = `${btnBase} border-rose-400/40 bg-rose-500/10 text-rose-200 hover:bg-rose-500/20`;
      }

      if (term) {
        term.options.theme = { background: '#ffffff', foreground: '#0f172a', cursor: '#0f172a', selectionBackground: '#bfdbfe' };
      }
    }

    function initTerminal() {
      const host = document.getElementById('terminal');
      host.innerHTML = '';
      if (termResizeObserver) {
        try { termResizeObserver.disconnect(); } catch (_) {}
        termResizeObserver = null;
      }
      term = new Terminal({
        cursorBlink: true,
        convertEol: false,
        scrollback: 5000,
        fontSize: 14,
        fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
        theme: { background: '#ffffff', foreground: '#0f172a', cursor: '#0f172a', selectionBackground: '#bfdbfe' }
      });
      term.open(host);
      term.focus();
      fitTerminalToViewport();
      term.onData((data) => {
        if (!sessionId || !data) return;
        writeQueue += data;
        void flushWriteQueue();
      });
      termResizeObserver = new ResizeObserver(() => {
        fitTerminalToViewport();
      });
      termResizeObserver.observe(host);
      window.addEventListener('resize', fitTerminalToViewport);
    }

    function fitTerminalToViewport() {
      if (!term) return;
      const host = document.getElementById('terminal');
      if (!host) return;
      const dims = term && term._core && term._core._renderService && term._core._renderService.dimensions
        ? term._core._renderService.dimensions
        : null;
      const cellW = dims && dims.css && Number(dims.css.cell.width) > 0 ? Number(dims.css.cell.width) : 9;
      const cellH = dims && dims.css && Number(dims.css.cell.height) > 0 ? Number(dims.css.cell.height) : 18;
      const cols = Math.max(20, Math.floor(host.clientWidth / cellW));
      const rows = Math.max(8, Math.floor(host.clientHeight / cellH));
      try {
        term.resize(cols, rows);
      } catch (_) {
        // Ignore transient xterm resize errors during early init.
      }
    }

    function stripAnsi(text) {
      return String(text || '').replace(/\x1b\[[0-9;?]*[ -/]*[@-~]/g, '');
    }

    function processCwdProbeChunk(raw) {
      const clean = stripAnsi(String(raw || '')).replace(/\r/g, '');
      if (!clean) return;
      cwdProbeBuffer += clean;
      if (cwdProbeBuffer.length > 32768) {
        cwdProbeBuffer = cwdProbeBuffer.slice(-32768);
      }
      for (const [token, resolver] of cwdProbeWaiters.entries()) {
        const escaped = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const rx = new RegExp(`${escaped}([^\\n\\r]{1,2048})__`, 'g');
        let matched = false;
        let m;
        while ((m = rx.exec(cwdProbeBuffer)) !== null) {
          matched = true;
          const candidate = String(m[1] || '').trim();
          if (!candidate.startsWith('/')) {
            continue;
          }
          currentCwd = candidate;
          resolver.resolve(candidate);
          cwdProbeWaiters.delete(token);
          const endIdx = m.index + m[0].length;
          cwdProbeBuffer = cwdProbeBuffer.slice(endIdx);
          break;
        }
        if (matched && !cwdProbeWaiters.has(token)) {
          break;
        }
      }
    }

    async function requestCurrentRemoteDir() {
      if (!sessionId) throw new Error(tr('errOpen'));
      const token = `__EVEPWD_${Date.now()}_${Math.floor(Math.random() * 100000)}__`;
      const promise = new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          cwdProbeWaiters.delete(token);
          reject(new Error(tr('errCwd')));
        }, 6000);
        cwdProbeWaiters.set(token, {
          resolve: (value) => { clearTimeout(timer); resolve(value); },
          reject: (err) => { clearTimeout(timer); reject(err); }
        });
      });
      writeQueue += `printf '${token}%s__\\n' \"$PWD\"\r`;
      void flushWriteQueue();
      return promise;
    }

    async function flushWriteQueue() {
      if (writeBusy || !sessionId || !writeQueue) return;
      writeBusy = true;
      const payload = writeQueue;
      writeQueue = '';
      try {
        await jget(api.write(sessionId), {
          method: 'POST',
          body: JSON.stringify({ data_base64: utf8ToBase64(payload) })
        });
      } catch (e) {
        writeQueue = payload + writeQueue;
      } finally {
        writeBusy = false;
        if (writeQueue) setTimeout(() => { void flushWriteQueue(); }, 20);
      }
    }

    async function readLoop(token) {
      while (!closing && token === readLoopToken && sessionId) {
        try {
          const res = await jget(api.read(sessionId, readOffset));
          const data = (res && res.data) ? res.data : {};
          if (typeof data.next_offset === 'number') readOffset = data.next_offset;
          if (data.chunk_base64) {
            const raw = decodeChunkBase64Utf8(String(data.chunk_base64));
            if (raw !== '') {
              receivedAnyOutput = true;
            }
            processCwdProbeChunk(raw);
            term.write(raw);
          }
          const status = String(data.status || '').toLowerCase();
          if (status === 'running' || status === 'starting') {
            statusSet('ok', tr('statusConnected'));
          } else if (status === 'closing' || status === 'closed') {
            statusSet('warn', tr('statusClosed'));
            break;
          } else if (status === 'error') {
            statusSet('error', tr('statusError'));
            break;
          }
        } catch (e) {
          statusSet('error', tr('statusError'));
          toast((e && e.message) ? e.message : tr('errRead'), 'error');
          break;
        }
      }
    }

    async function closeSession(reason = 'client_closed') {
      if (!sessionId) return;
      const sid = sessionId;
      sessionId = '';
      receivedAnyOutput = false;
      try {
        await jget(api.close(sid), {
          method: 'DELETE',
          body: JSON.stringify({ reason })
        });
      } catch (e) {
        // Ignore close errors.
      }
    }

    function schedulePromptKick(localToken, delayMs) {
      setTimeout(() => {
        if (closing) return;
        if (!sessionId) return;
        if (localToken !== readLoopToken) return;
        if (receivedAnyOutput) return;
        writeQueue += '\r';
        void flushWriteQueue();
      }, delayMs);
    }

    async function connectSession() {
      closing = false;
      readLoopToken += 1;
      readOffset = 0;
      await closeSession('replaced_by_new_session');
      statusSet('warn', tr('statusConnecting'));
      try {
        const openRes = await jget(api.open, { method: 'POST', body: '{}' });
        const data = (openRes && openRes.data) ? openRes.data : {};
        sessionId = String(data.session_id || '').trim();
        if (!sessionId) throw new Error(tr('errOpen'));
        const myToken = readLoopToken;
        receivedAnyOutput = false;
        statusSet('ok', tr('statusConnected'));
        term.focus();
        schedulePromptKick(myToken, 700);
        schedulePromptKick(myToken, 1800);
        void readLoop(myToken);
      } catch (e) {
        statusSet('error', tr('statusError'));
        toast((e && e.message) ? e.message : tr('errOpen'), 'error');
      }
    }

    async function uploadFileToPath(file, destinationPath) {
      const totalBytes = file.size;
      const initRes = await jget(api.uploadInit, {
        method: 'POST',
        body: JSON.stringify({ destination_path: destinationPath, total_bytes: totalBytes, overwrite: true })
      });
      const payload = (initRes && initRes.data) ? initRes.data : {};
      const uploadId = String(payload.upload_id || '').trim();
      if (!uploadId) throw new Error('Upload init failed');

      const chunkSize = 8 * 1024 * 1024;
      let offset = 0;
      while (offset < totalBytes) {
        const chunk = file.slice(offset, offset + chunkSize);
        const res = await fetch(api.uploadChunk(uploadId, offset), {
          method: 'PATCH',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/octet-stream' },
          body: chunk
        });
        if (!res.ok) {
          const body = await res.json().catch(() => null);
          throw new Error(body && body.message ? body.message : `HTTP ${res.status}`);
        }
        offset += chunk.size;
        const pct = totalBytes > 0 ? Math.min(100, Math.round((offset / totalBytes) * 100)) : 100;
        setTransferStatus(`${tr('transferUploading')}: ${pct}% (${offset}/${totalBytes})`);
      }

      await jget(api.uploadComplete(uploadId), { method: 'POST', body: '{}' });
      setTransferStatus(tr('transferIdle'));
    }

    function ensureAbsolutePath(path) {
      const p = String(path || '').trim();
      return p.startsWith('/') ? p : '';
    }

    async function bindActions() {
      document.getElementById('btnReconnect').addEventListener('click', async () => {
        await connectSession();
      });

      document.getElementById('btnClose').addEventListener('click', async () => {
        closing = true;
        await closeSession('client_closed');
        window.close();
        if (!window.closed) location.href = '/main';
      });
      const btnMain = document.getElementById('btnMain');
      if (btnMain) {
        btnMain.addEventListener('click', async () => {
          closing = true;
          await closeSession('client_closed');
          location.href = '/main';
        });
      }

      const fileInput = document.getElementById('uploadFileInput');
      document.getElementById('btnUpload').addEventListener('click', () => {
        fileInput.value = '';
        fileInput.click();
      });

      fileInput.addEventListener('change', async () => {
        const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
        if (!file) return;

        try {
          let cwd = '';
          try {
            cwd = await requestCurrentRemoteDir();
          } catch (_) {
            cwd = (currentCwd && currentCwd.startsWith('/')) ? currentCwd : '';
            if (!cwd) throw new Error(tr('errCwd'));
          }
          const safeName = String(file.name || 'upload.bin').replace(/\//g, '_');
          const destPath = `${cwd.replace(/\/+$/, '')}/${safeName}`;
          await uploadFileToPath(file, destPath);
          toast(`${tr('uploadDone')}: ${destPath}`, 'success');
        } catch (e) {
          setTransferStatus(tr('transferIdle'));
          toast((e && e.message) ? e.message : 'Upload failed', 'error');
        }
      });

      document.getElementById('btnDownload').addEventListener('click', () => {
        void (async () => {
          try {
            let cwd = '';
            try {
              cwd = await requestCurrentRemoteDir();
            } catch (_) {
              cwd = (currentCwd && currentCwd.startsWith('/')) ? currentCwd : '';
              if (!cwd) throw new Error(tr('errCwd'));
            }
            const res = await jget(api.listFiles(cwd));
            const data = (res && res.data) ? res.data : {};
            openDownloadModal(String(data.directory || cwd), Array.isArray(data.files) ? data.files : []);
          } catch (e) {
            toast((e && e.message) ? e.message : tr('fileChooseError'), 'error');
          }
        })();
      });

      const downloadModalClose = document.getElementById('downloadModalClose');
      if (downloadModalClose) downloadModalClose.addEventListener('click', closeDownloadModal);
      const downloadModal = document.getElementById('downloadModal');
      if (downloadModal) {
        downloadModal.addEventListener('click', (e) => {
          if (e.target === downloadModal) closeDownloadModal();
        });
      }

      window.addEventListener('beforeunload', () => {
        closing = true;
      });
    }

    async function init() {
      try {
        const auth = await jget(api.auth);
        me = auth.data || null;
        lang = (me && me.lang) || lang;
        theme = (me && me.theme) || theme;
        localStorage.setItem('eve_v2_lang', lang);
        localStorage.setItem('eve_v2_theme', theme);
      } catch (e) {
        location.href = '/login';
        return;
      }

      applyI18n();
      initTerminal();
      applyTheme();
      await bindActions();
      await connectSession();

      if (window.startV2Heartbeat) {
        window.startV2Heartbeat({
          pingUrl: api.ping,
          intervalMs: 30000,
          onUnauthorized: () => { location.href = '/login'; }
        });
      }
    }

    init();
  </script>
</body>
</html>
