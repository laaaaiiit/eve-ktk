    function tr(k){ return (i18n[lang] || i18n.ru)[k] || k; }
    function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function hasPerm(code){ return !!(me && Array.isArray(me.permissions) && me.permissions.includes(code)); }

    function closeAllDropdownPanels(){
      document.querySelectorAll('.v2-dd-panel').forEach(el => el.classList.add('hidden'));

    async function jget(url, opts={}){
      const r = await fetch(url, Object.assign({ credentials: 'include' }, opts));
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        const msg = String(d && d.message ? d.message : '').trim();
        const normalized = msg.toLowerCase();
        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
          throw new Error(tr('errForbiddenAction'));
        }
        if (
          r.status === 409 &&
          normalized.includes('at least one active user must keep role management')
        ) {
          throw new Error(tr('errRolesManageLockout'));
        }
        throw new Error(msg || ('HTTP ' + r.status));
      }
      return d;
    }

    function btnClass(variant = 'neutral', size = 'sm'){
      const sizeMap = { xs: 'px-3 py-1 text-xs', sm: 'px-4 py-2 text-sm' };
      const base = `rounded-xl ${sizeMap[size] || sizeMap.sm} font-semibold cursor-pointer transition duration-200 hover:-translate-y-0.5 active:translate-y-0 focus:outline-none`;
      if (variant === 'primary') return `${base} text-white shadow-lg bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700`;
      if (variant === 'danger') return `${base} text-white shadow-lg bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700`;
      return theme === 'light'
        ? `${base} border border-slate-300 bg-white text-slate-700 hover:bg-slate-50`
        : `${base} border border-white/20 bg-slate-900/50 text-slate-100 hover:bg-white/10`;
    }

    function dropdownUi(kind = 'input') {
      const isNav = kind === 'nav';
      const pad = isNav ? 'px-4 py-2' : 'px-3 py-2';
      const weight = isNav ? 'font-semibold' : 'font-normal';
      const btnBase = `w-full rounded-xl ${pad} text-left text-sm ${weight} flex items-center justify-between cursor-pointer transition duration-200 hover:-translate-y-0.5 active:translate-y-0 focus:outline-none`;
      const itemBase = `w-full rounded-lg px-3 py-2 text-left text-sm cursor-pointer flex items-center justify-between`;
      return theme === 'light'
        ? {
            btn: `${btnBase} border border-slate-300 bg-white text-slate-900 hover:bg-slate-50`,
            panel: 'absolute z-50 mt-2 hidden w-full rounded-xl border border-slate-200 bg-white p-1 shadow-2xl',
            item: `${itemBase} text-slate-900 hover:bg-slate-100`,
            chevron: 'text-slate-500'
          }
        : {
            btn: `${btnBase} border border-white/15 bg-slate-900/70 text-slate-100 hover:bg-white/10`,
            panel: 'absolute z-50 mt-2 hidden w-full rounded-xl border border-white/15 bg-slate-900/95 p-1 shadow-2xl',
            item: `${itemBase} text-slate-100 hover:bg-white/10`,
            chevron: 'text-slate-400'
          };
    }

    function navIcon(key){
      const map = {
        navManagement: '<i class="fa fa-cogs" aria-hidden="true"></i>',
        navSystem: '<i class="fa fa-desktop" aria-hidden="true"></i>',
        navLabs: '<i class="fa fa-flask" aria-hidden="true"></i>',

        navClouds: '<i class="fa fa-cloud" aria-hidden="true"></i>',
        navRoles: '<i class="fa fa-id-badge" aria-hidden="true"></i>',
        navSysStatus: '<i class="fa fa-heartbeat" aria-hidden="true"></i>',
        navTaskQueue:'<i class="fa fa-tasks" aria-hidden="true"></i>',
        navSysConsole:'<i class="fa fa-terminal" aria-hidden="true"></i>',
        navSysLogs: '<i class="fa fa-file-text-o" aria-hidden="true"></i>',
        navSysAudit: '<i class="fa fa-history" aria-hidden="true"></i>'
      };
      return map[key] || '<i class="fa fa-circle-o" aria-hidden="true"></i>';
    }

    function makeDropdown(root, options, getValue, setValue, getLabel) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const list = document.createElement('div');

      function refreshTheme(){
        const c = dropdownUi('input');
        btn.className = c.btn;
        list.className = c.panel;
        list.classList.add('v2-dd-panel');
      }

      function renderButtonLabel() {
        const active = options.find(o => String(o.value) === String(getValue()));
        const prefix = getLabel ? `${getLabel()}: ` : '';
        const c = dropdownUi('input');
        btn.innerHTML = `<span>${prefix}${active ? active.label : ''}</span><i class="fa fa-chevron-down text-xs ${c.chevron}"></i>`;
      }

      function renderOptions() {
        const c = dropdownUi('input');
        list.innerHTML = '';
        options.forEach(opt => {
          const isActive = String(opt.value) === String(getValue());
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `${c.item} ${isActive ? (theme==='light' ? 'bg-emerald-50' : 'bg-emerald-500/10') : ''}`;
          item.innerHTML = `<span>${opt.label}</span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', async () => {
            closeAllDropdownPanels();
            await setValue(opt.value);
            renderButtonLabel();
            renderOptions();
          });
          list.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const wasHidden = list.classList.contains('hidden');
        closeAllDropdownPanels();
        if (wasHidden) list.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => { if (!root.contains(e.target)) list.classList.add('hidden'); });

      root.appendChild(btn);
      root.appendChild(list);
      refreshTheme();
      renderButtonLabel();
      renderOptions();

      return () => { refreshTheme(); renderButtonLabel(); renderOptions(); };
    }

    function makeNavDropdown(root, labelKey, items){
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');

      function repaint(){
        const c = dropdownUi('nav');
        btn.className = c.btn;
        panel.className = c.panel;
        panel.classList.add('v2-dd-panel');
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${tr(labelKey)}</span></span><i class="fa fa-chevron-down text-xs ${c.chevron}"></i>`;
        panel.innerHTML = '';

        items.forEach(it => {
          const isActive = !!it.href && it.href === location.pathname;
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `${c.item} ${isActive ? (theme==='light' ? 'bg-emerald-50' : 'bg-emerald-500/10') : ''}`;
          item.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(it.key)}<span>${tr(it.key)}</span></span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', () => {
            panel.classList.add('hidden');
            if (it.href) {
              location.href = it.href;
              return;
            }
            toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', () => {
        const wasHidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (wasHidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => { if (!root.contains(e.target)) panel.classList.add('hidden'); });
      root.appendChild(btn);
      root.appendChild(panel);
      repaint();
      return repaint;
    }

    const toaster = window.createV2ToastManager ? window.createV2ToastManager({
      rootId: 'toastRoot',
      getTheme: () => theme,
      getLabel: () => tr('toastsLabel'),
      durationMs: 5000
    }) : null;

    function renderToasts(){ if (toaster) toaster.render(); }
    function toast(message, kind = 'error'){ if (toaster) toaster.toast(message, kind); }

    function normalizeI18nToken(raw){
      return String(raw || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function permissionTitle(permission){
      const code = String(permission && permission.code ? permission.code : '');
      const key = `perm_${normalizeI18nToken(code)}`;
      const localized = tr(key);
      if (localized !== key) return localized;
      const fallbackTitle = String(permission && permission.title ? permission.title : '').trim();
      if (fallbackTitle) return fallbackTitle;
      if (code) return code;
      return tr('permUnknown');
    }

    function categoryLabel(category){
      const normalized = normalizeI18nToken(category || 'general');
      const key = `category_${normalized}`;
      const localized = tr(key);
      if (localized !== key) return localized;
      return normalized
        .split('_')
        .filter(Boolean)
        .map((chunk) => chunk.charAt(0).toUpperCase() + chunk.slice(1))
        .join(' / ') || tr('category_general');
    }

    function groupedPermissions(){
      const groups = {};
      permissions.forEach(p => {
        const cat = String(p.category || 'general');
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(p);
      });
      return Object.keys(groups).sort().map(cat => ({ category: cat, items: groups[cat] }));
    }

    function mountPermissionCheckboxes(){
      if (!window.mountV2Checkbox) return;
      document.querySelectorAll('[data-perm-row]').forEach((row) => {
        const input = row.querySelector('.perm-chk');
        const host = row.querySelector('.perm-chk-host');
        if (!input || !host) return;
        const sync = () => {
          window.mountV2Checkbox(host, {
            checked: !!input.checked,
            size: 'sm',
            ariaLabel: String(input.value || 'permission'),
            getTheme: () => theme,
            onChange: (next) => {
              input.checked = !!next;
              sync();
            }
          });
        };
        sync();
        row.addEventListener('click', (e) => {
          if (e.target.closest('.perm-chk-host')) return;
          input.checked = !input.checked;
          sync();
        });
        row.addEventListener('keydown', (e) => {
          if (e.key !== ' ' && e.key !== 'Enter') return;
          if (e.target.closest('.perm-chk-host button')) return;
          e.preventDefault();
          input.checked = !input.checked;
          sync();
        });
      });
    }

    function renderPermissionPicker(selectedIds = []){
      const selected = new Set((selectedIds || []).map(v => String(v)));
      const root = document.getElementById('permGroups');
      const groups = groupedPermissions();
      root.innerHTML = groups.map(group => {
        const cards = group.items.map(p => {
          const checked = selected.has(String(p.id)) ? 'checked' : '';
          return `<div tabindex="0" data-perm-row="1" class="group flex items-start gap-2 rounded-xl border px-3 py-2 cursor-pointer transition ${theme === 'light' ? 'border-slate-200 bg-slate-50 hover:border-slate-300 hover:bg-white' : 'border-white/10 bg-white/5 hover:border-white/20 hover:bg-white/10'}">
            <input type="checkbox" class="perm-chk sr-only" value="${esc(p.id)}" ${checked}>
            <span class="perm-chk-host mt-0.5 inline-flex shrink-0"></span>
            <span class="min-w-0">
              <span class="block text-sm font-semibold">${esc(permissionTitle(p))}</span>
              <span class="block text-[11px] opacity-70">${esc(p.code || '')}</span>
            </span>
          </div>`;
        }).join('');
        return `<section class="rounded-2xl border p-3 ${theme === 'light' ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/50'}">
          <h4 class="mb-2 text-sm font-bold">${esc(categoryLabel(group.category))}</h4>
          <div class="space-y-2">${cards}</div>
        </section>`;
      }).join('');
      mountPermissionCheckboxes();
    }

    function collectSelectedPermissionIds(){
      return Array.from(document.querySelectorAll('.perm-chk:checked')).map(el => String(el.value));
    }

    function currentPermissionSelection(){
      const uiInputs = Array.from(document.querySelectorAll('.perm-chk'));
      if (uiInputs.length > 0) {
        return uiInputs.filter((el) => !!el.checked).map((el) => String(el.value));
      }
      if (editingRoleId) return rolePermIds[editingRoleId] || [];
      return [];
    }

    function renderStats(){
      const bindings = Object.values(rolePermIds).reduce((sum, ids) => sum + (Array.isArray(ids) ? ids.length : 0), 0);
      document.getElementById('statRolesValue').textContent = String(roles.length);
      document.getElementById('statPermsValue').textContent = String(permissions.length);
      document.getElementById('statBindingsValue').textContent = String(bindings);
    }

    function render(){
      const q = document.getElementById('search').value.trim().toLowerCase();
      const rows = roles.filter(r => String(r.name || '').toLowerCase().includes(q));
      const tbody = document.getElementById('tbody');
      const rowBase = theme === 'light' ? 'hover:bg-slate-50/60 text-slate-900' : 'hover:bg-white/5 text-slate-100';
      const dividerClass = theme === 'light' ? 'divide-slate-100' : 'divide-white/10';
      tbody.className = `divide-y ${dividerClass}`;
      tbody.innerHTML = rows.map(row => {
        const id = String(row.id || '');
        const protectedRole = ['admin', 'user'].includes(String(row.name || '').toLowerCase());
        const permsCount = Array.isArray(rolePermIds[id]) ? rolePermIds[id].length : Number(row.permissions_count || 0);
        return `<tr class="${rowBase}">
          <td class="px-4 py-3 text-center font-semibold">${esc(row.name)}</td>
          <td class="px-4 py-3 text-center">${Number(row.users_count || 0)}</td>
          <td class="px-4 py-3 text-center">${permsCount}</td>
          <td class="px-4 py-3">
            <div class="flex justify-center gap-2">
              <button class="${btnClass('neutral', 'xs')}" data-edit="${id}">${tr('edit')}</button>
              ${protectedRole ? '' : `<button class="${btnClass('danger', 'xs')}" data-del="${id}">${tr('del')}</button>`}
            </div>
          </td>
        </tr>`;
      }).join('');
      document.getElementById('empty').classList.toggle('hidden', rows.length > 0);
      renderStats();
    }

    async function loadAll(){
      const [rPerms, rRoles] = await Promise.all([jget(api.permissions), jget(api.roles)]);
      permissions = Array.isArray(rPerms.data) ? rPerms.data : [];
      roles = Array.isArray(rRoles.data) ? rRoles.data : [];
      rolePermIds = {};
      await Promise.all(roles.map(async (role) => {
        const roleId = String(role.id || '');
        if (roleId === '') return;
        const res = await jget(api.rolePermissions(roleId));
        rolePermIds[roleId] = Array.isArray(res.data && res.data.permission_ids) ? res.data.permission_ids : [];
      }));
      renderPermissionPicker(currentPermissionSelection());
      render();
    }

    async function persistPrefs(){
      await jget(api.prefs, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang, theme })
      });
    }

    function openEdit(role){
      editingRoleId = role ? String(role.id || '') : null;
      document.getElementById('dlgTitle').textContent = role ? tr('dlgEdit') : tr('dlgCreate');
      document.getElementById('dlgSub').textContent = tr('dlgSub');
      document.getElementById('f_name').value = role ? String(role.name || '') : '';
      const selected = editingRoleId ? (rolePermIds[editingRoleId] || []) : [];
      renderPermissionPicker(selected);
      styleFormInputs();
      const dlg = document.getElementById('editDlg');
      dlg.style.inset = '0';
      dlg.style.margin = 'auto';
      dlg.showModal();
    }

    function styleFormInputs(){
      const name = document.getElementById('f_name');
      const cancel = document.getElementById('cancelBtn');
      cancel.className = btnClass('neutral', 'sm');
      if (theme === 'light') {
        name.className = 'w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none ring-sky-300 focus:ring-2';
      } else {
        name.className = 'w-full rounded-2xl border border-white/15 bg-slate-950/60 px-4 py-3 text-slate-100 outline-none ring-sky-300/40 focus:ring-2';
      }
    }

    function applyI18n(){
      localizeThemeOptions();
      document.getElementById('pageTitle').textContent = tr('pageTitle');
      document.getElementById('pageSub').textContent = tr('pageSub');
      document.getElementById('search').placeholder = tr('search');
      document.getElementById('newBtn').textContent = tr('add');
      document.getElementById('empty').textContent = tr('empty');
      document.querySelector('#thead tr').children[0].textContent = tr('roleCol');
      document.querySelector('#thead tr').children[1].textContent = tr('usersCol');
      document.querySelector('#thead tr').children[2].textContent = tr('permsCol');
      document.querySelector('#thead tr').children[3].textContent = tr('actionsCol');
      document.getElementById('dlgSub').textContent = tr('dlgSub');
      document.getElementById('roleNameLabel').textContent = tr('roleName');
      document.getElementById('permTitle').textContent = tr('permissions');
      document.getElementById('selectAllBtn').textContent = tr('selectAll');
      document.getElementById('clearAllBtn').textContent = tr('clearAll');
      document.getElementById('cancelBtn').textContent = tr('cancel');
      document.getElementById('saveBtn').textContent = tr('save');
      document.getElementById('logoutBtn').textContent = tr('logout');
      document.getElementById('statRolesLabel').textContent = tr('statRolesLabel');
      document.getElementById('statPermsLabel').textContent = tr('statPermsLabel');
      document.getElementById('statBindingsLabel').textContent = tr('statBindingsLabel');
      document.getElementById('statRolesHint').textContent = tr('statRolesHint');
      document.getElementById('statPermsHint').textContent = tr('statPermsHint');
      document.getElementById('statBindingsHint').textContent = tr('statBindingsHint');
      document.getElementById('navHome').innerHTML = `<i class="fa fa-home" aria-hidden="true"></i><span>${tr('navHome')}</span>`;
      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      renderPermissionPicker(currentPermissionSelection());
      render();
      renderToasts();
    }

    function applyTheme(){
      const body = document.body;
      const app = document.getElementById('app');
      const topbar = document.getElementById('topbar');
      const pageCard = document.getElementById('pageCard');
      const panel = document.getElementById('panel');
      const dialog = document.getElementById('editDlg').firstElementChild;
      const editScrollable = document.getElementById('editScrollable');
      const permSection = document.getElementById('permSection');
      const footer = document.getElementById('editFooter');
      const selectAllBtn = document.getElementById('selectAllBtn');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const search = document.getElementById('search');
      const saveBtn = document.getElementById('saveBtn');
      const newBtn = document.getElementById('newBtn');
      const navHome = document.getElementById('navHome');
      const profileBtn = document.getElementById('profileBtn');
      const profileName = document.getElementById('profileName');
      const profileRole = document.getElementById('profileRole');
      const logoutBtn = document.getElementById('logoutBtn');
      const statCards = [document.getElementById('statRoles'), document.getElementById('statPerms'), document.getElementById('statBindings')];

      if (theme === 'light') {
        body.dataset.theme = 'light';
        body.className = 'min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300';
        app.className = 'min-h-screen transition-colors duration-300';
        topbar.className = 'relative z-40 w-full border-b border-slate-200 bg-white/90 px-4 py-4 shadow-[0_20px_60px_rgba(15,23,42,0.12)] backdrop-blur-xl transition-colors duration-300';
        if (pageCard) pageCard.className = 'rounded-3xl border border-slate-200 bg-white/95 p-5 shadow-2xl transition-colors duration-300';
        panel.className = 'relative overflow-hidden rounded-2xl border border-slate-200 bg-white transition-colors duration-300';
        statCards.forEach(el => el.className = 'rounded-2xl border border-slate-200 bg-white p-5');
        search.className = 'w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none focus:ring-2 focus:ring-sky-300 sm:w-96';
        dialog.className = 'flex max-h-[92vh] w-[min(980px,96vw)] flex-col overflow-hidden rounded-3xl p-6 bg-white text-slate-900';
        editScrollable.className = 'mt-4 min-h-0 flex-1 space-y-4 overflow-y-auto pr-1';
        permSection.className = 'rounded-2xl border border-slate-200 bg-white p-4';
        footer.className = 'mt-5 flex justify-end gap-2 border-t border-slate-200 pt-4';
        profileBtn.className = 'rounded-2xl border border-slate-300 bg-white px-4 py-2 text-left transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
        profileName.className = 'text-sm font-semibold text-slate-900';
        profileRole.className = 'text-xs text-slate-500';
      } else {
        body.dataset.theme = 'dark';
        body.className = 'min-h-screen bg-slate-950 text-slate-100 transition-colors duration-300';
        app.className = 'min-h-screen transition-colors duration-300';
        topbar.className = 'relative z-40 w-full border-b border-white/20 bg-slate-800/85 px-4 py-4 shadow-[0_20px_60px_rgba(2,6,23,0.6)] backdrop-blur-xl transition-colors duration-300';
        if (pageCard) pageCard.className = 'rounded-3xl border border-white/20 bg-slate-900/65 p-5 shadow-2xl transition-colors duration-300';
        panel.className = 'relative overflow-hidden rounded-2xl border border-white/15 bg-slate-950/35 transition-colors duration-300';
        statCards.forEach(el => el.className = 'rounded-2xl border border-white/15 bg-slate-950/35 p-5');
        search.className = 'w-full rounded-xl border border-white/15 bg-slate-950/50 px-3 py-2 text-sm text-slate-100 outline-none focus:ring-2 focus:ring-sky-300/50 sm:w-96';
        dialog.className = 'flex max-h-[92vh] w-[min(980px,96vw)] flex-col overflow-hidden rounded-3xl p-6 bg-slate-900 text-slate-100 border border-white/10';
        editScrollable.className = 'mt-4 min-h-0 flex-1 space-y-4 overflow-y-auto pr-1';
        permSection.className = 'rounded-2xl border border-white/15 bg-slate-900/45 p-4';
        footer.className = 'mt-5 flex justify-end gap-2 border-t border-white/15 pt-4';
        profileBtn.className = 'rounded-2xl border border-white/20 bg-slate-900/50 px-4 py-2 text-left transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
        profileName.className = 'text-sm font-semibold text-slate-100';
        profileRole.className = 'text-xs text-slate-400';
      }

      logoutBtn.className = btnClass('neutral', 'sm');
      saveBtn.className = btnClass('primary', 'sm');
      newBtn.className = btnClass('primary', 'sm');
      selectAllBtn.className = btnClass('primary', 'sm');
      clearAllBtn.className = btnClass('primary', 'sm');
      navHome.className = `${btnClass('neutral', 'sm')} inline-flex items-center gap-2`;
      styleFormInputs();
      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      renderPermissionPicker(currentPermissionSelection());
      render();
      renderToasts();
    }

    function renderProfileCard(){
      if (!me) return;
      document.getElementById('profileName').textContent = me.username || 'user';
      document.getElementById('profileRole').textContent = `${tr('profileRole')}: ${me.role || '-'}`;
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('newBtn').addEventListener('click', () => openEdit(null));
    document.getElementById('cancelBtn').addEventListener('click', () => document.getElementById('editDlg').close());
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await jget(api.logout, { method: 'POST' });
        location.href = '/login';
      } catch (e) {
        toast(e.message || tr('errAuth'));
      }
    });

    document.getElementById('profileBtn').addEventListener('click', () => {
      if (typeof window.openV2ProfileSettingsModal === 'function') {
        window.openV2ProfileSettingsModal();
      }
    });

    document.getElementById('selectAllBtn').addEventListener('click', () => {
      renderPermissionPicker(permissions.map(p => String(p.id || '')));
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      renderPermissionPicker([]);
    });

    document.getElementById('tbody').addEventListener('click', async (e) => {
      const editId = e.target.getAttribute('data-edit');
      const delId = e.target.getAttribute('data-del');
      try {
        if (editId) {
          const row = roles.find(r => String(r.id) === String(editId));
          if (row) openEdit(row);
        }
        if (delId) {
          const row = roles.find(r => String(r.id) === String(delId));
          if (!row) return;
          if (!confirm(tr('confirmDelete') + (row.name || '') + '?')) return;
          await jget(`${api.roles}/${encodeURIComponent(String(delId))}`, { method: 'DELETE' });
          await loadAll();
          toast(tr('roleDeleted'), 'success');
        }
      } catch (e1) {
        toast(e1.message || tr('opFailed'));
      }
    });

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('f_name').value.trim();
      if (!name) {
        toast(tr('req'));
        return;
      }
      const permissionIds = collectSelectedPermissionIds();
      try {
        let roleId = editingRoleId;
        if (roleId) {
          await jget(`${api.roles}/${encodeURIComponent(roleId)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
          });
        } else {
          const created = await jget(api.roles, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
          });
          roleId = String((created.data || {}).id || '');
        }
        await jget(api.rolePermissions(roleId), {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ permission_ids: permissionIds })
        });
        document.getElementById('editDlg').close();
        await loadAll();
        toast(editingRoleId ? tr('roleUpdated') : tr('roleCreated'), 'success');
      } catch (e1) {
        toast(e1.message || tr('opFailed'));
      }
    });

    (async () => {
      try {
        const auth = await jget(api.auth);
        me = auth.data || null;
        if (!me || !hasPerm('page.management.roles.view') || !hasPerm('roles.manage')) {
          throw new Error(tr('errForbidden'));
        }

        lang = me.lang || lang;
        theme = me.theme || theme;
        localStorage.setItem('eve_v2_lang', lang);
        localStorage.setItem('eve_v2_theme', theme);
        renderProfileCard();

        refreshLangDd = makeDropdown(
          document.querySelector('[data-dd="lang"]'),
          langOptions,
          () => lang,
          async (v) => { lang = v; localStorage.setItem('eve_v2_lang', v); applyI18n(); render(); await persistPrefs(); },
          null
        );

        refreshThemeDd = makeDropdown(
          document.querySelector('[data-dd="theme"]'),
          themeOptions,
          () => theme,
          async (v) => { theme = v; localStorage.setItem('eve_v2_theme', v); applyTheme(); render(); await persistPrefs(); },
          null
        );

        refreshNavManagement = makeNavDropdown(
          document.getElementById('navManagement'),
          'navManagement',
          [
            { key: 'navLabs', href: '/labmgmt' },
            { key: 'navUsers', href: '/usermgmt' },
            { key: 'navClouds', href: '/cloudmgmt' },
            { key: 'navRoles', href: '/roles' }
          ]
        );

        refreshNavSystem = makeNavDropdown(
          document.getElementById('navSystem'),
          'navSystem',
          [
            { key: 'navSysStatus', href: '/system-status' },
            { key: 'navTaskQueue', href: '/taskqueue' },
            { key: 'navSysConsole', href: '/system-console' },
            { key: 'navSysLogs', href: '/system-logs' },
            { key: 'navSysAudit', href: '/system-audit' }
          ]
        );

        applyI18n();
        applyTheme();
        await loadAll();

        if (window.startV2Heartbeat) {
          window.startV2Heartbeat({
            pingUrl: api.ping,
            intervalMs: 30000,
            onUnauthorized: () => { location.href = '/login'; }
          });
        }
      } catch (e) {
        toast(e.message || tr('errAuth'));
        setTimeout(() => { location.href = '/main'; }, 900);
      }
    })();
  </script>
</body>
</html>
