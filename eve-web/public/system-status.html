  <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6">

        <div>
          <h1 class="text-2xl font-black tracking-tight" data-i18n="title">Статус системы</h1>

        </div>
        <div class="flex items-center gap-3">
          <div class="text-xs opacity-75">
            <span data-i18n="lastUpdate">Последнее обновление</span>:
            <span id="lastUpdateValue">-</span>
          </div>
          <button id="autoRefreshBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">

            <span data-i18n="autoRefresh">Автообновление</span>
            <span id="autoRefreshState" class="text-xs opacity-80"></span>

          <button id="refreshBtn" type="button" class="inline-flex items-center gap-2 rounded-xl border px-4 py-2 text-sm font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none">
            <i class="fa fa-refresh" aria-hidden="true"></i>

          </button>
        </div>
      </div>

      <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardCpu">CPU</p>
          <p id="cardLoadValue" class="mt-2 text-2xl font-bold">-</p>
          <p id="cardCpuMetaValue" class="mt-1 text-xs opacity-75">-</p>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardMemory">Память</p>
          <p id="cardMemoryValue" class="mt-2 text-2xl font-bold">-</p>
          <p id="cardMemoryMetaValue" class="mt-1 text-xs opacity-75">-</p>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardNodesByType">Ноды по типам</p>
          <div class="mt-2 grid grid-cols-2 gap-x-3 gap-y-1 text-xs">
            <div class="flex items-center justify-between gap-2">
              <span data-i18n="cardTypeIos">IOS</span>
              <span id="cardTypeIos" class="text-sm font-bold">0</span>
            </div>
            <div class="flex items-center justify-between gap-2">
              <span data-i18n="cardTypeVpc">VPC</span>
              <span id="cardTypeVpc" class="text-sm font-bold">0</span>
            </div>
            <div class="flex items-center justify-between gap-2">
              <span data-i18n="cardTypeVm">VM</span>
              <span id="cardTypeVm" class="text-sm font-bold">0</span>
            </div>
          </div>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardQueue">Очередь</p>
          <p id="cardQueueValue" class="mt-2 text-2xl font-bold">-</p>
        </article>
      </div>

      <div class="mt-5 grid gap-4 lg:grid-cols-2">
        <section class="rounded-2xl border p-4">
          <h2 class="mb-3 text-sm font-bold uppercase opacity-80" data-i18n="hostSection">Хост</h2>
          <dl id="hostInfo" class="grid grid-cols-[180px_1fr] gap-x-3 gap-y-2 text-sm"></dl>
        </section>
        <section class="rounded-2xl border p-4">
          <h2 class="mb-3 text-sm font-bold uppercase opacity-80" data-i18n="serviceSection">Сервисы</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">

                <tr>
                  <th class="px-2 py-2 text-left" data-i18n="svcName">Сервис</th>
                  <th class="px-2 py-2 text-left" data-i18n="svcState">Состояние</th>
                  <th class="px-2 py-2 text-right" data-i18n="svcProc">Процессы</th>
                </tr>
              </thead>
              <tbody id="servicesBody"></tbody>
            </table>
          </div>
        </section>
      </div>

        <section class="rounded-2xl border p-4">
          <h2 class="mb-3 text-sm font-bold uppercase opacity-80" data-i18n="appSection">Приложение</h2>

        </section>

    let me = null;
    let lang = localStorage.getItem('eve_v2_lang') || 'ru';
    let theme = localStorage.getItem('eve_v2_theme') || 'dark';
    let statusData = null;
    let pollTimer = 0;
    const autoRefreshIntervalMs = 8000;
    let autoRefreshEnabled = localStorage.getItem('eve_v2_system_status_auto_refresh') !== '0';
    let refreshLangDd = () => {};
    let refreshThemeDd = () => {};
    let refreshNavManagement = () => {};
    let refreshNavSystem = () => {};

    const langOptions = [
      { value: 'en', label: 'English' },
      { value: 'ru', label: 'Русский' }
    ];
    const themeOptions = [
      { value: 'dark', label: 'Dark' },
      { value: 'light', label: 'Light' }
    ];

    function tr(k){ return (i18n[lang] || i18n.ru)[k] || k; }
    function hasPerm(code){ return !!(me && Array.isArray(me.permissions) && me.permissions.includes(code)); }
    function esc(v){
      return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }
    function byId(id){ return document.getElementById(id); }

    async function jget(url, opts = {}) {
      const r = await fetch(url, Object.assign({ credentials: 'include' }, opts));
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        const msg = String(d && d.message ? d.message : '');
        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
          throw new Error(tr('errForbiddenAction'));
        }
        throw new Error(msg || ('HTTP ' + r.status));
      }
      return d;
    }

    function formatDate(value) {
      if (!value) return tr('unknown');
      const dt = new Date(String(value));
      if (Number.isNaN(dt.getTime())) return String(value);
      return dt.toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US');
    }

    function formatUptime(seconds) {
      const s = Number(seconds || 0);
      if (!Number.isFinite(s) || s <= 0) return tr('unknown');
      const days = Math.floor(s / 86400);
      const hours = Math.floor((s % 86400) / 3600);
      const mins = Math.floor((s % 3600) / 60);
      if (days > 0) return `${days}d ${hours}h ${mins}m`;
      return `${hours}h ${mins}m`;
    }

    function formatGiBFromMb(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n < 0) return tr('unknown');
      return `${(n / 1024).toFixed(2)} GiB`;
    }

    function formatPrimaryDisk(disks) {
      const list = Array.isArray(disks) ? disks : [];
      if (list.length < 1) return tr('unknown');
      const primary = list.find((d) => String((d && d.path) || '') === '/') || list[0] || {};
      const path = String(primary.path || '/');
      const total = primary.total_gb ?? tr('unknown');
      const free = primary.free_gb ?? tr('unknown');
      const used = primary.used_percent ?? tr('unknown');
      if (lang === 'ru') {
        return `${path}: свободно ${free} GB из ${total} GB (${used}%)`;
      }
      return `${path}: ${free} GB free of ${total} GB (${used}%)`;
    }

    function renderAutoRefreshState() {
      const icon = byId('autoRefreshIcon');
      const state = byId('autoRefreshState');
      const btn = byId('autoRefreshBtn');
      if (icon) icon.className = autoRefreshEnabled ? 'fa fa-pause' : 'fa fa-play';
      if (state) state.textContent = autoRefreshEnabled ? tr('autoRefreshOn') : tr('autoRefreshOff');
      if (btn) btn.setAttribute('aria-pressed', autoRefreshEnabled ? 'true' : 'false');
    }

    function localizeThemeOptions(){
      themeOptions[0].label = tr('themeDark');
      themeOptions[1].label = tr('themeLight');
    }

    function closeAllDropdownPanels() {
      document.querySelectorAll('.v2-dd-panel').forEach((el) => el.classList.add('hidden'));
    }

    function makeDropdown(root, options, getValue, setValue, getLabel) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const list = document.createElement('div');

      function refreshTheme(){
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-left text-sm text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-3 py-2 text-left text-sm text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        list.className = `absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;
        list.classList.add('v2-dd-panel');
      }

      function renderButtonLabel(){
        const active = options.find(o => String(o.value) === String(getValue()));
        const prefix = getLabel ? `${getLabel()}: ` : '';
        const chevron = theme === 'light' ? 'text-slate-500' : 'text-slate-400';
        btn.innerHTML = `<span>${esc(prefix)}${active ? esc(active.label) : ''}</span><i class="fa fa-chevron-down text-xs ${chevron}"></i>`;
      }

      function renderOptions(){
        const isLight = theme === 'light';
        list.innerHTML = '';
        options.forEach(opt => {
          const isActive = String(opt.value) === String(getValue());
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span>${esc(opt.label)}</span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', async () => {
            closeAllDropdownPanels();
            await setValue(opt.value);
            renderButtonLabel();
            renderOptions();
          });
          list.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = list.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) list.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) list.classList.add('hidden');
      });

      root.appendChild(btn);
      root.appendChild(list);
      refreshTheme();
      renderButtonLabel();
      renderOptions();
      return () => { refreshTheme(); renderButtonLabel(); renderOptions(); };
    }

    function navIcon(key) {
      const map = {
        navManagement: '<i class="fa fa-cogs" aria-hidden="true"></i>',
        navSystem: '<i class="fa fa-desktop" aria-hidden="true"></i>',
        navLabs: '<i class="fa fa-flask" aria-hidden="true"></i>',
        navUsers: '<i class="fa fa-users" aria-hidden="true"></i>',
        navClouds: '<i class="fa fa-cloud" aria-hidden="true"></i>',
        navRoles: '<i class="fa fa-id-badge" aria-hidden="true"></i>',
        navSysStatus: '<i class="fa fa-heartbeat" aria-hidden="true"></i>',
        navTaskQueue:'<i class="fa fa-tasks" aria-hidden="true"></i>',
        navSysConsole:'<i class="fa fa-terminal" aria-hidden="true"></i>',
        navSysLogs: '<i class="fa fa-file-text-o" aria-hidden="true"></i>',
        navSysAudit:'<i class="fa fa-history" aria-hidden="true"></i>'
      };
      return map[key] || '<i class="fa fa-circle-o" aria-hidden="true"></i>';
    }

    function makeNavDropdown(root, labelKey, items) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const isLight = theme === 'light';
        const cBtn = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-4 py-2 text-left text-sm font-semibold text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-2 text-left text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        const cPanel = isLight
          ? 'absolute z-50 mt-2 hidden w-full rounded-xl border border-slate-200 bg-white p-1 shadow-2xl'
          : 'absolute z-50 mt-2 hidden w-full rounded-xl border border-white/15 bg-slate-900/95 p-1 shadow-2xl';
        const cChevron = isLight ? 'text-slate-500' : 'text-slate-400';
        btn.className = cBtn;
        panel.className = cPanel;
        panel.classList.add('v2-dd-panel');
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${tr(labelKey)}</span></span><i class="fa fa-chevron-down text-xs ${cChevron}"></i>`;

        panel.innerHTML = '';
        const current = location.pathname;
        items.forEach((it) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = !!it.href && current === it.href;
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(it.key)}<span>${tr(it.key)}</span></span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', () => {
            panel.classList.add('hidden');
            if (it.href) {
              location.href = it.href;
              return;
            }
            toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', () => { const wasHidden = panel.classList.contains('hidden'); closeAllDropdownPanels(); if (wasHidden) panel.classList.remove('hidden'); });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) panel.classList.add('hidden');
      });
      repaint();
      return repaint;
    }

    async function persistPrefs() {
      await jget(api.prefs, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang, theme })
      });
    }

    function renderProfileCard() {
      byId('profileName').textContent = me && me.username ? me.username : 'user';
      byId('profileRole').textContent = `${tr('profileRole')}: ${me && me.role ? me.role : tr('unknown')}`;
    }

    function applyI18n() {
      localizeThemeOptions();
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key) el.textContent = tr(key);
      });
      const home = byId('navHome');
      if (home) home.querySelector('span').textContent = tr('navHome');
      const logoutBtn = byId('logoutBtn');
      if (logoutBtn) logoutBtn.textContent = tr('logout');
      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      renderAutoRefreshState();
      renderStatus();
    }

    function applyTheme() {
      const light = theme === 'light';
      document.body.className = light
        ? 'min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300'
        : 'min-h-screen bg-slate-950 text-slate-100 transition-colors duration-300';
      const topbar = byId('topbar');
      if (topbar) {
        topbar.className = light
          ? 'relative z-40 w-full border-b border-slate-200 bg-white/90 px-4 py-4 shadow-[0_20px_60px_rgba(15,23,42,0.12)] backdrop-blur-xl transition-colors duration-300'
          : 'relative z-40 w-full border-b border-white/20 bg-slate-800/85 px-4 py-4 shadow-[0_20px_60px_rgba(2,6,23,0.6)] backdrop-blur-xl transition-colors duration-300';
      }
      const pageCard = byId('pageCard');
      pageCard.className = light
        ? 'rounded-3xl border border-slate-200 bg-white/95 p-5 shadow-2xl transition-colors duration-300'
        : 'rounded-3xl border border-white/20 bg-slate-900/65 p-5 shadow-2xl transition-colors duration-300';

      byId('refreshBtn').className = light
        ? 'inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
        : 'inline-flex items-center gap-2 rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      byId('autoRefreshBtn').className = light
        ? 'inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
        : 'inline-flex items-center gap-2 rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';

      const profileBtn = byId('profileBtn');
      if (profileBtn) {
        profileBtn.className = light
          ? 'rounded-2xl border border-slate-300 bg-white px-4 py-2 text-left transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'rounded-2xl border border-white/20 bg-slate-900/50 px-4 py-2 text-left transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }
      const logoutBtn = byId('logoutBtn');
      if (logoutBtn) {
        logoutBtn.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 shadow-sm transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }
      const navHome = byId('navHome');
      if (navHome) {
        navHome.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2';
      }
      document.querySelectorAll('#pageCard article.rounded-2xl.border, #pageCard section.rounded-2xl.border').forEach((el) => {
        el.className = light
          ? 'rounded-2xl border border-slate-200 bg-white p-4'
          : 'rounded-2xl border border-white/15 bg-slate-950/35 p-4';
      });
      const servicesHead = byId('servicesHead');
      if (servicesHead) servicesHead.className = light ? 'bg-slate-50' : 'bg-slate-900/70';

      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      renderAutoRefreshState();
      renderStatus();
    }

    function renderStatus() {
      const d = statusData || {};
      const server = d.server || {};
      const app = d.app || {};
      const services = d.services || {};
      const meta = d.meta || {};

      const load = server.load || {};
      const cpu = server.cpu || {};
      const mem = server.memory || {};

      byId('cardLoadValue').textContent = (cpu.usage_percent !== null && cpu.usage_percent !== undefined)
        ? `${Number(cpu.usage_percent).toFixed(1)}%`
        : tr('unknown');
      const cpuCount = (cpu.count !== null && cpu.count !== undefined) ? String(cpu.count) : tr('unknown');
      const cpuGhz = (cpu.ghz !== null && cpu.ghz !== undefined) ? Number(cpu.ghz).toFixed(2) : tr('unknown');
      byId('cardCpuMetaValue').textContent = tr('cardCpuMetaFmt')
        .replace('{count}', cpuCount)
        .replace('{ghz}', cpuGhz);
      byId('cardMemoryValue').textContent = (mem.used_percent !== null && mem.used_percent !== undefined)
        ? `${mem.used_percent}%`
        : tr('unknown');
      byId('cardMemoryMetaValue').textContent = tr('cardMemMetaFmt')
        .replace('{total}', formatGiBFromMb(mem.total_mb))
        .replace('{used}', formatGiBFromMb(mem.used_mb));
      const nodeTypeTotals = (app && app.node_type_totals && typeof app.node_type_totals === 'object')
        ? app.node_type_totals
        : {};
      byId('cardTypeIos').textContent = String(Number(nodeTypeTotals.ios || 0));
      byId('cardTypeVpc').textContent = String(Number(nodeTypeTotals.vpc || 0));
      byId('cardTypeVm').textContent = String(Number(nodeTypeTotals.vm || 0));
      byId('cardQueueValue').textContent = `${Number(app.tasks_pending || 0)} / ${Number(app.tasks_running || 0)}`;

      const hostRows = [
        [tr('hostName'), server.hostname || tr('unknown')],
        [tr('hostOs'), server.os || tr('unknown')],
        [tr('hostPhp'), server.php_version || tr('unknown')],
        [tr('hostUptime'), formatUptime(server.uptime_seconds)],
        [tr('hostTimeLocal'), formatDate(server.time_local)],
        [tr('hostTimeUtc'), formatDate(server.time_utc)],
        [tr('hostLoad5'), `${load.load_5m ?? tr('unknown')} / ${load.load_15m ?? tr('unknown')}`],
        [tr('hostDbMs'), `${meta.db_query_ms ?? tr('unknown')}`],
        [tr('hostDisk'), formatPrimaryDisk(server.disks)]
      ];
      byId('hostInfo').innerHTML = hostRows.map((r) =>
        `<dt class="opacity-75">${esc(r[0])}</dt><dd class="font-medium">${esc(r[1])}</dd>`
      ).join('');

      const light = theme === 'light';
      const svcRows = [
        ['apache2', services.apache2 || {}],
        ['postgresql', services.postgresql || {}]
      ];
      byId('servicesBody').innerHTML = svcRows.map((row) => {
        const running = !!row[1].running;
        const badgeCls = running
          ? (light ? 'border-emerald-300 bg-emerald-50 text-emerald-700' : 'border-emerald-400/40 bg-emerald-500/10 text-emerald-200')
          : (light ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-rose-400/40 bg-rose-500/10 text-rose-200');
        const trCls = light ? 'border-t border-slate-200' : 'border-t border-white/10';
        return `<tr class="${trCls}">
          <td class="px-2 py-2">${esc(row[0])}</td>
          <td class="px-2 py-2"><span class="inline-flex rounded-xl border px-2 py-1 text-xs font-semibold ${badgeCls}">${esc(running ? tr('ok') : tr('fail'))}</span></td>
          <td class="px-2 py-2 text-right">${Number(row[1].process_count || 0)}</td>
        </tr>`;
      }).join('');

      const appGroups = [
        {
          title: 'appGroupTopology',
          items: [
            ['appLabs', app.labs_visible],
            ['appNodesTotal', app.nodes_total],
            ['appNodesRun', app.nodes_running],
            ['appNodesStarting', app.nodes_starting],
            ['appNodesStopping', app.nodes_stopping],
            ['appNodesError', app.nodes_error]
          ]
        },
        {
          title: 'appGroupTasks',
          items: [
            ['appTasksPending', app.tasks_pending],
            ['appTasksRunning', app.tasks_running],
            ['appTasksDone24h', app.tasks_done_24h],
            ['appTasksFailed24h', app.tasks_failed_24h],
            ['appTasksLabCheckPending', app.tasks_lab_check_pending],
            ['appTasksLabCheckRunning', app.tasks_lab_check_running],
            ['appTasksLabCheckDone24h', app.tasks_lab_check_done_24h],
            ['appTasksLabCheckFailed24h', app.tasks_lab_check_failed_24h]
          ]
        },
        {
          title: 'appGroupAccess',
          items: [
            ['appSessionsAlive', app.sessions_alive],
            ['appSessionsActive', app.sessions_active_now],
            ['appUsersOnline', app.users_online],
            ['appUsersTotal', app.users_total],
            ['appUsersBlocked', app.users_blocked]
          ]
        }
      ];

      byId('appCounters').innerHTML = appGroups.map((group) => {
        const groupCls = light
          ? 'rounded-xl border border-slate-200 bg-slate-50/60 p-3'
          : 'rounded-xl border border-white/15 bg-slate-900/40 p-3';
        const itemCls = light
          ? 'rounded-lg border border-slate-200 bg-white px-3 py-2 flex items-center justify-between gap-2'
          : 'rounded-lg border border-white/10 bg-slate-950/35 px-3 py-2 flex items-center justify-between gap-2';
        const valueCls = light
          ? 'inline-flex min-w-[3rem] items-center justify-center rounded-md border border-slate-200 bg-slate-50 px-2 py-0.5 text-base font-bold tabular-nums'
          : 'inline-flex min-w-[3rem] items-center justify-center rounded-md border border-white/15 bg-slate-900/70 px-2 py-0.5 text-base font-bold tabular-nums';
        const itemsHtml = group.items.map((it) => {
          const val = (it[1] === null || it[1] === undefined) ? tr('unknown') : String(it[1]);
          return `<div class="${itemCls}">
            <p class="min-w-0 flex-1 text-xs leading-tight opacity-75 break-words">${esc(tr(it[0]))}</p>
            <p class="shrink-0 ${valueCls}">${esc(val)}</p>
          </div>`;
        }).join('');
        return `<div class="${groupCls}">
          <h3 class="mb-2 text-xs font-bold uppercase tracking-wide opacity-80">${esc(tr(group.title))}</h3>
          <div class="grid grid-cols-1 gap-2 sm:grid-cols-2 text-sm">${itemsHtml}</div>
        </div>`;
      }).join('');
    }

    async function loadStatus(showToastOnError = true) {
      try {
        const res = await jget(api.status);
        statusData = (res && res.data) ? res.data : {};
        byId('lastUpdateValue').textContent = formatDate(new Date().toISOString());
        renderStatus();
      } catch (e) {
        if (showToastOnError) {
          toast((e && e.message) ? e.message : tr('errLoad'));
        }
      }
    }

    byId('refreshBtn').addEventListener('click', async () => {
      await loadStatus(true);
      toast(tr('refresh'), 'success');
    });
    byId('autoRefreshBtn').addEventListener('click', () => {
      autoRefreshEnabled = !autoRefreshEnabled;
      localStorage.setItem('eve_v2_system_status_auto_refresh', autoRefreshEnabled ? '1' : '0');
      renderAutoRefreshState();
    });
    byId('logoutBtn').addEventListener('click', async () => {
      try {
        await jget(api.logout, { method: 'POST' });
        location.href = '/login';
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
      }
    });
    byId('profileBtn').addEventListener('click', () => {
      if (typeof window.openV2ProfileSettingsModal === 'function') {
        window.openV2ProfileSettingsModal();
      }
    });

    (async () => {
      try {
        const auth = await jget(api.auth);
        me = auth.data || null;
        lang = (me && me.lang) || lang;
        theme = (me && me.theme) || theme;
        localStorage.setItem('eve_v2_lang', lang);
        localStorage.setItem('eve_v2_theme', theme);

        refreshLangDd = makeDropdown(
          document.querySelector('[data-dd="lang"]'),
          langOptions,
          () => lang,
          async (v) => {
            lang = v;
            localStorage.setItem('eve_v2_lang', v);
            applyI18n();
            await persistPrefs();
          },
          null
        );
        refreshThemeDd = makeDropdown(
          document.querySelector('[data-dd="theme"]'),
          themeOptions,
          () => theme,
          async (v) => {
            theme = v;
            localStorage.setItem('eve_v2_theme', v);
            applyTheme();
            await persistPrefs();
          },
          null
        );
        refreshNavManagement = makeNavDropdown(
          document.getElementById('navManagement'),
          'navManagement',
          [
            { key: 'navLabs', href: '/labmgmt' },
            { key: 'navUsers', href: '/usermgmt' },
            { key: 'navClouds', href: '/cloudmgmt' },
            { key: 'navRoles', href: '/roles' }
          ]
        );
        refreshNavSystem = makeNavDropdown(
          document.getElementById('navSystem'),
          'navSystem',
          [
            { key: 'navSysStatus', href: '/system-status' },
            { key: 'navTaskQueue', href: '/taskqueue' },
            { key: 'navSysConsole', href: '/system-console' },
            { key: 'navSysLogs', href: '/system-logs' },
            { key: 'navSysAudit', href: '/system-audit' }
          ]
        );

        renderProfileCard();
        applyI18n();
        applyTheme();
        await loadStatus(false);

        if (pollTimer) window.clearInterval(pollTimer);
        pollTimer = window.setInterval(async () => {
          if (!autoRefreshEnabled) return;
          if (document.visibilityState === 'hidden') return;
          await loadStatus(false);
        }, autoRefreshIntervalMs);

        if (window.startV2Heartbeat) {
          window.startV2Heartbeat({
            pingUrl: api.ping,
            intervalMs: 30000,
            onUnauthorized: () => { location.href = '/login'; }
          });
        }
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
        setTimeout(() => { location.href = '/login'; }, 900);
      }
    })();
  </script>
</body>
</html>
