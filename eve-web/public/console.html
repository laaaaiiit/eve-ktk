<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Console | EVE</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="stylesheet" href="/assets/css/main.output.css">
  <link rel="stylesheet" href="/assets/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/assets/v2-scrollbar.css">
  <link rel="stylesheet" href="/assets/vendor/xterm/xterm.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { overscroll-behavior: none; }
    body.theme-light {
      --console-shell-bg: #ffffff;
      --console-wrap-bg: #ffffff;
      --console-term-bg: #ffffff;
      --console-vnc-bg: #ffffff;
      background: #f1f5f9 !important;
      color: #0f172a;
    }
    body.theme-dark {
      --console-shell-bg: #020617;
      --console-wrap-bg: #020617;
      --console-term-bg: #020617;
      --console-vnc-bg: #020617;
      background: #020617 !important;
      color: #e2e8f0;
    }
    .console-shell { height: 100dvh; min-height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
    .console-terminal-wrap { flex: 1 1 auto; min-height: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; gap: 0; background: var(--console-wrap-bg, #fff); }
    .console-terminal { width: 100%; height: 100%; min-height: 0; border-radius: 0; overflow: hidden; background: var(--console-term-bg, #fff); }
    .console-terminal .xterm { height: 100%; }
    .console-terminal .xterm,
    .console-terminal .xterm-viewport,
    .console-terminal .xterm-screen,
    .console-terminal .xterm-screen canvas,
    .console-terminal .xterm-rows {
      background: var(--console-term-bg, #fff) !important;
    }
    .console-terminal .xterm-viewport { overflow-y: hidden !important; }
    .console-vnc { width: 100%; height: 100%; min-height: 0; border-radius: 0; overflow: hidden; border: 0; background: var(--console-vnc-bg, #fff); }
    .console-hidden { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-white text-slate-900 transition-colors duration-300">
  <div id="app" class="console-shell min-h-screen bg-white transition-colors duration-300">
    <div id="toastRoot" class="fixed right-4 bottom-4 z-[80] flex w-[min(92vw,420px)] flex-col items-end gap-2 sm:right-6 sm:bottom-6"></div>

    <header id="topBar" class="border-b px-3 py-2">
      <div class="flex flex-wrap items-center justify-between gap-2">
        <div class="min-w-0">
          <div class="flex items-center gap-2">
            <i class="fa fa-terminal"></i>
            <h1 id="titleNode" class="truncate text-sm font-semibold">Console</h1>
          </div>
          <div class="mt-0.5 flex items-center gap-2 text-xs opacity-85">
            <span id="titleLab" class="truncate"></span>
            <span id="statusDot" class="inline-block h-2 w-2 rounded-full bg-slate-400"></span>
            <span id="statusText"></span>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button id="btnReconnect" type="button" class="rounded-lg border px-3 py-1.5 text-xs font-semibold">
            <i class="fa fa-refresh mr-1"></i><span data-i18n="reconnect">Переподключить</span>
          </button>
          <button id="btnClose" type="button" class="rounded-lg border px-3 py-1.5 text-xs font-semibold">
            <i class="fa fa-times mr-1"></i><span data-i18n="close">Закрыть</span>
          </button>
        </div>
      </div>
    </header>

    <section class="console-terminal-wrap">
      <div id="sessionAlert" class="hidden rounded-xl border px-3 py-2 text-sm">
        <div class="flex items-start gap-2">
          <i id="sessionAlertIcon" class="fa fa-exclamation-triangle mt-0.5"></i>
          <div class="min-w-0">
            <div id="sessionAlertTitle" class="font-semibold">-</div>
            <div id="sessionAlertDetail" class="mt-0.5 text-xs opacity-90"></div>
          </div>
        </div>
      </div>
      <div id="terminalWrap" class="flex-1 min-h-0">
        <div id="terminal" class="console-terminal"></div>
      </div>
      <iframe id="vncFrame" class="console-vnc console-hidden flex-1 min-h-0" title="VNC Console" referrerpolicy="no-referrer"></iframe>
    </section>
  </div>

  <script src="/assets/vendor/xterm/xterm.js"></script>
  <script src="/assets/v2-heartbeat.js"></script>
  <script src="/assets/v2-toast.js"></script>
  <script>
    const i18n = {
      ru: {
        reconnect: 'Переподключить',
        close: 'Закрыть',
        statusConnecting: 'Подключение...',
        statusConnected: 'Подключено',
        statusClosed: 'Сессия завершена',
        statusError: 'Ошибка',
        alertClosedTitle: 'Консоль завершена',
        alertErrorTitle: 'Ошибка консоли',
        reasonClientClosed: 'Сессия закрыта пользователем.',
        reasonTargetClosed: 'Устройство закрыло консольное соединение.',
        reasonWorkerTerminated: 'Сервис консоли завершил процесс сессии.',
        reasonReplaced: 'Сессия перехвачена новым подключением к этой ноде.',
        reasonConnectFailed: 'Не удалось подключиться к консольному порту ноды.',
        reasonInvalidPort: 'Некорректный консольный порт ноды.',
        reasonReadFailed: 'Потеряно чтение данных из консоли.',
        reasonSessionClosedWrite: 'Сессия уже закрыта, ввод недоступен.',
        errParams: 'Некорректные параметры lab_id/node_id.',
        errAuth: 'Требуется авторизация.',
        errOpen: 'Не удалось открыть консоль.',
        errRead: 'Ошибка чтения консоли.',
        popupClosed: 'Окно будет закрыто.',
      },
      en: {
        reconnect: 'Reconnect',
        close: 'Close',
        statusConnecting: 'Connecting...',
        statusConnected: 'Connected',
        statusClosed: 'Session closed',
        statusError: 'Error',
        alertClosedTitle: 'Console session closed',
        alertErrorTitle: 'Console error',
        reasonClientClosed: 'Session was closed by user.',
        reasonTargetClosed: 'Device closed the console connection.',
        reasonWorkerTerminated: 'Console worker terminated the session process.',
        reasonReplaced: 'Session was replaced by a newer connection to this node.',
        reasonConnectFailed: 'Failed to connect to node console port.',
        reasonInvalidPort: 'Invalid node console port.',
        reasonReadFailed: 'Console stream read was interrupted.',
        reasonSessionClosedWrite: 'Session is already closed. Input is unavailable.',
        errParams: 'Invalid lab_id/node_id parameters.',
        errAuth: 'Authorization is required.',
        errOpen: 'Failed to open console.',
        errRead: 'Failed to read console stream.',
        popupClosed: 'Window will be closed.',
      }
    };

    const api = {
      auth: '/api/auth',
      ping: '/api/auth/ping',
      open: (labId, nodeId) => `/api/labs/${encodeURIComponent(labId)}/nodes/${encodeURIComponent(nodeId)}/console/session`,
      read: (sid, offset) => `/api/console/sessions/${encodeURIComponent(sid)}/read?offset=${offset}&wait_ms=350&max_bytes=65536`,
      write: (sid) => `/api/console/sessions/${encodeURIComponent(sid)}/write`,
      close: (sid) => `/api/console/sessions/${encodeURIComponent(sid)}`
    };

    let me = null;
    let lang = localStorage.getItem('eve_v2_lang') || 'ru';
    let theme = localStorage.getItem('eve_v2_theme') || 'dark';
    let labId = '';
    let nodeId = '';

    let term = null;
    let sessionId = '';
    let readOffset = 0;
    let readLoopToken = 0;
    let writeBusy = false;
    let writeQueue = '';
    let closing = false;
    let closeIssued = false;
    let fitObserver = null;
    let currentConsole = 'telnet';
    let vncFrameUrl = '';
    let vncLastHiddenAt = 0;
    let vncLastResumeAt = 0;

    const toaster = window.createV2ToastManager ? window.createV2ToastManager({
      rootId: 'toastRoot',
      getTheme: () => theme,
      getLabel: () => 'Notifications',
      durationMs: 5000
    }) : null;

    function tr(key) {
      return (i18n[lang] || i18n.ru)[key] || key;
    }

    function toast(message, kind = 'error') {
      if (toaster) toaster.toast(message, kind);
    }

    function mapClosedReason(reason) {
      const key = String(reason || '').trim().toLowerCase();
      if (!key) return '';
      if (key === 'client_closed') return tr('reasonClientClosed');
      if (key === 'target_closed') return tr('reasonTargetClosed');
      if (key === 'worker_terminated') return tr('reasonWorkerTerminated');
      if (key === 'replaced_by_new_session') return tr('reasonReplaced');
      if (key === 'connect_failed') return tr('reasonConnectFailed');
      if (key === 'invalid_target_port') return tr('reasonInvalidPort');
      return key.replaceAll('_', ' ');
    }

    function clearSessionAlert() {
      const root = document.getElementById('sessionAlert');
      if (!root) return;
      root.classList.add('hidden');
    }

    function showSessionAlert(kind, title, detail = '') {
      const root = document.getElementById('sessionAlert');
      const icon = document.getElementById('sessionAlertIcon');
      const titleEl = document.getElementById('sessionAlertTitle');
      const detailEl = document.getElementById('sessionAlertDetail');
      if (!root || !icon || !titleEl || !detailEl) return;
      const mode = String(kind || '').toLowerCase();
      const isError = mode === 'error';
      const palette = isError
        ? (theme === 'light'
          ? { box: 'border-rose-400/70 bg-rose-500/15 text-rose-900', icon: 'fa-times-circle text-rose-700' }
          : { box: 'border-rose-300/85 bg-rose-500/35 text-rose-50 shadow-lg shadow-rose-500/30', icon: 'fa-times-circle text-rose-100' })
        : (theme === 'light'
          ? { box: 'border-amber-400/70 bg-amber-500/20 text-amber-900', icon: 'fa-exclamation-triangle text-amber-700' }
          : { box: 'border-amber-300/85 bg-amber-500/35 text-amber-50 shadow-lg shadow-amber-500/30', icon: 'fa-exclamation-triangle text-amber-100' });
      root.className = `rounded-xl border px-3 py-2 text-sm ${palette.box}`;
      root.classList.remove('hidden');
      icon.className = `fa mt-0.5 ${palette.icon}`;
      titleEl.textContent = String(title || '');
      detailEl.textContent = String(detail || '');
      detailEl.classList.toggle('hidden', !String(detail || '').trim());
    }

    function renderFatalError(message) {
      const text = String(message || tr('errOpen') || 'Console init failed');
      statusSet('error', tr('statusError'));
      showSessionAlert('error', tr('alertErrorTitle'), text);
      const host = document.getElementById('terminal');
      if (host) {
        host.innerHTML = '';
        const box = document.createElement('div');
        box.className = theme === 'light'
          ? 'm-2 rounded-lg border border-rose-500/40 bg-rose-500/10 px-3 py-2 text-sm text-rose-800'
          : 'm-2 rounded-lg border border-rose-300/80 bg-rose-500/35 px-3 py-2 text-sm text-rose-50 shadow-lg shadow-rose-500/30';
        box.textContent = text;
        host.appendChild(box);
      }
      toast(text, 'error');
      if (window.console && typeof window.console.error === 'function') {
        window.console.error('[console.html]', text);
      }
    }

    function statusSet(kind, text) {
      const dot = document.getElementById('statusDot');
      const label = document.getElementById('statusText');
      if (label) label.textContent = text;
      if (!dot) return;
      dot.className = 'inline-block h-2 w-2 rounded-full';
      if (kind === 'ok') {
        dot.classList.add('bg-emerald-400');
      } else if (kind === 'warn') {
        dot.classList.add('bg-amber-400');
      } else if (kind === 'error') {
        dot.classList.add('bg-rose-400');
      } else {
        dot.classList.add('bg-slate-400');
      }
    }

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key) el.textContent = tr(key);
      });
    }

    function applyTheme() {
      const body = document.body;
      const app = document.getElementById('app');
      const topBar = document.getElementById('topBar');
      const terminal = document.getElementById('terminal');
      const vncFrame = document.getElementById('vncFrame');
      const btnReconnect = document.getElementById('btnReconnect');
      const btnClose = document.getElementById('btnClose');

      if (theme === 'light') {
        body.className = 'theme-light min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300';
        app.className = 'console-shell min-h-screen transition-colors duration-300 bg-white text-slate-900';
        topBar.className = 'border-b border-slate-300 bg-white/95 px-3 py-2';
        terminal.className = 'console-terminal bg-white';
        vncFrame.className = 'console-vnc bg-white' + (currentConsole === 'vnc' ? '' : ' console-hidden');
        btnReconnect.className = 'rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold hover:bg-slate-50';
        btnClose.className = 'rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold hover:bg-slate-50';
      } else {
        body.className = 'theme-dark min-h-screen bg-slate-950 text-slate-100 transition-colors duration-300';
        app.className = 'console-shell min-h-screen transition-colors duration-300 bg-slate-950 text-slate-100';
        topBar.className = 'border-b border-white/20 bg-slate-900/80 px-3 py-2';
        terminal.className = 'console-terminal bg-slate-950';
        vncFrame.className = 'console-vnc bg-slate-950' + (currentConsole === 'vnc' ? '' : ' console-hidden');
        btnReconnect.className = 'rounded-lg border border-white/20 bg-slate-800/80 px-3 py-1.5 text-xs font-semibold hover:bg-slate-700';
        btnClose.className = 'rounded-lg border border-white/20 bg-slate-800/80 px-3 py-1.5 text-xs font-semibold hover:bg-slate-700';
      }

      if (term) {
        term.options.theme = (theme === 'light')
          ? { background: '#ffffff', foreground: '#0f172a', cursor: '#0f172a', selectionBackground: '#bfdbfe' }
          : { background: '#020617', foreground: '#e2e8f0', cursor: '#f8fafc', selectionBackground: '#1e3a8a' };
      }
    }

    function parseParams() {
      const params = new URLSearchParams(window.location.search);
      labId = String(params.get('lab_id') || '').trim();
      nodeId = String(params.get('node_id') || '').trim();
      const idRe = /^[a-f0-9-]{36}$/i;
      return idRe.test(labId) && idRe.test(nodeId);
    }

    function setConsoleMode(mode) {
      const normalized = String(mode || 'telnet').toLowerCase();
      currentConsole = normalized === 'vnc' ? 'vnc' : 'telnet';
      const terminalWrap = document.getElementById('terminalWrap');
      const vncFrame = document.getElementById('vncFrame');
      if (currentConsole === 'vnc') {
        terminalWrap.classList.add('console-hidden');
        vncFrame.classList.remove('console-hidden');
      } else {
        vncFrame.classList.add('console-hidden');
        terminalWrap.classList.remove('console-hidden');
      }
      applyTheme();
    }

    function buildNoVncFrameUrl(vncPath) {
      const rawPath = String(vncPath || '').trim();
      if (!rawPath) return '';
      const normalizedPath = rawPath.startsWith('/') ? rawPath.slice(1) : rawPath;
      const params = new URLSearchParams();
      params.set('path', normalizedPath);
      params.set('scale', 'true');
      params.set('autoconnect', 'true');
      params.set('view_only', 'false');
      params.set('show_dot', 'true');
      return `/assets/vendor/novnc/vnc_lite.html?${params.toString()}`;
    }

    function withResumeNonce(url, nonce) {
      const source = String(url || '').trim();
      if (!source) return '';
      try {
        const parsed = new URL(source, window.location.origin);
        parsed.searchParams.set('_resume', String(nonce));
        return parsed.pathname + parsed.search;
      } catch (_) {
        const sep = source.indexOf('?') >= 0 ? '&' : '?';
        return `${source}${sep}_resume=${encodeURIComponent(String(nonce))}`;
      }
    }

    function refreshVncFrameOnResume(force = false) {
      if (currentConsole !== 'vnc') return;
      if (!vncFrameUrl) return;
      const vncFrame = document.getElementById('vncFrame');
      if (!vncFrame) return;
      const now = Date.now();
      if (!force && (now - vncLastResumeAt) < 2500) return;
      vncLastResumeAt = now;
      statusSet('warn', tr('statusConnecting'));
      vncFrame.src = withResumeNonce(vncFrameUrl, now);
    }

    function toBinaryBase64(str) {
      let out = '';
      for (let i = 0; i < str.length; i += 1) {
        out += String.fromCharCode(str.charCodeAt(i) & 0xff);
      }
      return btoa(out);
    }

    async function jfetch(url, opts = {}) {
      const response = await fetch(url, Object.assign({ credentials: 'include' }, opts));
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const err = new Error(data.message || ('HTTP ' + response.status));
        err.httpStatus = response.status;
        throw err;
      }
      return data;
    }

    async function enqueueWrite(data) {
      if (currentConsole === 'vnc') return;
      if (!sessionId || closing || !data) return;
      writeQueue += data;
      if (writeBusy) return;
      writeBusy = true;
      while (!closing && sessionId && writeQueue.length > 0) {
        const chunk = writeQueue.slice(0, 4096);
        writeQueue = writeQueue.slice(4096);
        try {
          await jfetch(api.write(sessionId), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data_base64: toBinaryBase64(chunk) })
          });
        } catch (err) {
          writeQueue = chunk + writeQueue;
          if (err && err.httpStatus === 409) {
            closing = true;
            statusSet('warn', tr('statusClosed'));
            showSessionAlert('warn', tr('alertClosedTitle'), tr('reasonSessionClosedWrite'));
            break;
          }
          await new Promise((resolve) => setTimeout(resolve, 180));
        }
      }
      writeBusy = false;
    }

    function createTerminal() {
      if (currentConsole === 'vnc') return;
      if (!window.Terminal) {
        throw new Error('xterm library is unavailable');
      }
      if (term) {
        try { term.dispose(); } catch (_) {}
      }
      term = new window.Terminal({
        cursorBlink: true,
        convertEol: false,
        scrollback: 6000,
        fontFamily: 'Consolas, "Liberation Mono", Menlo, monospace',
        fontSize: 14,
        lineHeight: 1.2,
      });
      const terminalHost = document.getElementById('terminal');
      term.open(terminalHost);
      term.focus();
      fitTerminalToContainer();
      if (fitObserver) {
        try { fitObserver.disconnect(); } catch (_) {}
        fitObserver = null;
      }
      if (window.ResizeObserver && terminalHost) {
        fitObserver = new ResizeObserver(() => fitTerminalToContainer());
        fitObserver.observe(terminalHost);
      }
      applyTheme();
      term.onData((data) => {
        enqueueWrite(data);
      });
      if (typeof term.attachCustomKeyEventHandler === 'function') {
        term.attachCustomKeyEventHandler((ev) => {
          if (!ev || ev.type !== 'keydown') return true;
          const isBreakCombo = !!ev.ctrlKey
            && !!ev.shiftKey
            && !ev.altKey
            && !ev.metaKey
            && (ev.code === 'Digit6' || ev.key === '^' || ev.key === '6');
          if (!isBreakCombo) return true;
          enqueueWrite('\x1e');
          return false;
        });
      }
      window.requestAnimationFrame(() => {
        fitTerminalToContainer();
        window.requestAnimationFrame(() => fitTerminalToContainer());
      });
    }

    function getTerminalCellSize() {
      try {
        const core = term && term._core ? term._core : null;
        const dims = core && core._renderService && core._renderService.dimensions ? core._renderService.dimensions : null;
        const cell = dims && dims.css && dims.css.cell ? dims.css.cell : null;
        const width = cell && Number(cell.width) > 0 ? Number(cell.width) : 8.4;
        const height = cell && Number(cell.height) > 0 ? Number(cell.height) : 17;
        return { width, height };
      } catch (_) {
        return { width: 8.4, height: 17 };
      }
    }

    function fitTerminalToContainer() {
      if (currentConsole === 'vnc') return;
      if (!term) return;
      const host = document.getElementById('terminal');
      if (!host) return;
      const width = Math.max(0, host.clientWidth);
      const height = Math.max(0, host.clientHeight);
      if (width < 20 || height < 20) return;
      const cell = getTerminalCellSize();
      const cols = Math.max(20, Math.floor(width / Math.max(1, cell.width)));
      const rows = Math.max(5, Math.floor(height / Math.max(1, cell.height)));
      if (term.cols !== cols || term.rows !== rows) {
        term.resize(cols, rows);
      }
    }

    async function closeSessionFireAndForget() {
      if (!sessionId || closeIssued) return;
      closeIssued = true;
      const sid = sessionId;
      try {
        await fetch(api.close(sid), { method: 'DELETE', credentials: 'include', keepalive: true });
      } catch (_) {}
    }

    async function readLoop(localToken) {
      if (currentConsole === 'vnc') return;
      while (!closing && sessionId && localToken === readLoopToken) {
        try {
          const res = await jfetch(api.read(sessionId, readOffset));
          const data = res && res.data ? res.data : {};
          const chunk = String(data.chunk_base64 || '');
          if (chunk && term) {
            term.write(atob(chunk));
          }
          readOffset = Number(data.next_offset || readOffset);
          const status = String(data.status || 'running').toLowerCase();
          const closedReason = mapClosedReason(String(data.closed_reason || ''));
          if (status === 'running' || status === 'starting' || status === 'closing') {
            statusSet('ok', tr('statusConnected'));
          }
          if (status === 'closed' || status === 'error') {
            closing = true;
            statusSet(status === 'error' ? 'error' : 'warn', status === 'error' ? tr('statusError') : tr('statusClosed'));
            if (status === 'error') {
              showSessionAlert('error', tr('alertErrorTitle'), closedReason || tr('reasonReadFailed'));
            } else {
              showSessionAlert('warn', tr('alertClosedTitle'), closedReason);
            }
            break;
          }
        } catch (err) {
          if (err && err.httpStatus === 401) {
            location.href = '/login';
            return;
          }
          statusSet('error', tr('statusError'));
          showSessionAlert('error', tr('alertErrorTitle'), (err && err.message) ? String(err.message) : tr('reasonReadFailed'));
          await new Promise((resolve) => setTimeout(resolve, 350));
        }
      }
    }

    async function startConsole() {
      closing = false;
      closeIssued = false;
      readOffset = 0;
      writeQueue = '';
      statusSet('warn', tr('statusConnecting'));
      clearSessionAlert();

      const openRes = await jfetch(api.open(labId, nodeId), { method: 'POST' });
      const opened = openRes && openRes.data ? openRes.data : {};
      sessionId = String(opened.session_id || '');
      if (!sessionId) {
        throw new Error(tr('errOpen'));
      }

      const nodeName = String(opened.node_name || 'Node');
      const consoleTypeRaw = String(opened.console || 'telnet').toLowerCase();
      const consoleType = consoleTypeRaw.toUpperCase();
      setConsoleMode(consoleTypeRaw);
      document.getElementById('titleNode').textContent = `${nodeName} [${consoleType}]`;
      document.getElementById('titleLab').textContent = `LAB: ${labId}`;
      document.title = `${nodeName} | Console`;

      if (consoleTypeRaw === 'vnc') {
        const vncPath = String(opened.vnc_path || '').trim();
        const frameUrl = buildNoVncFrameUrl(vncPath);
        if (!frameUrl) {
          throw new Error(tr('errOpen'));
        }
        const vncFrame = document.getElementById('vncFrame');
        vncFrameUrl = frameUrl;
        vncLastResumeAt = Date.now();
        vncFrame.src = withResumeNonce(vncFrameUrl, vncLastResumeAt);
        statusSet('warn', tr('statusConnecting'));
        clearSessionAlert();
        return;
      }

      const vncFrame = document.getElementById('vncFrame');
      vncFrame.src = 'about:blank';
      vncFrameUrl = '';
      vncLastResumeAt = 0;
      if (!term) {
        createTerminal();
      }
      readLoopToken += 1;
      const token = readLoopToken;
      statusSet('ok', tr('statusConnected'));
      clearSessionAlert();
      readLoop(token);
    }

    async function reconnectConsole() {
      closing = true;
      await closeSessionFireAndForget();
      sessionId = '';
      readOffset = 0;
      writeQueue = '';
      closing = false;
      closeIssued = false;
      const vncFrame = document.getElementById('vncFrame');
      vncFrame.src = 'about:blank';
      vncFrameUrl = '';
      vncLastResumeAt = 0;
      if (currentConsole !== 'vnc') {
        createTerminal();
      }
      try {
        await startConsole();
      } catch (err) {
        const msg = (err && err.message) ? err.message : tr('errOpen');
        toast(msg);
        statusSet('error', tr('statusError'));
        showSessionAlert('error', tr('alertErrorTitle'), msg);
      }
    }

    document.getElementById('btnReconnect').addEventListener('click', () => {
      reconnectConsole();
    });

    document.getElementById('btnClose').addEventListener('click', async () => {
      await closeSessionFireAndForget();
      try {
        window.close();
      } catch (_) {}
      toast(tr('popupClosed'), 'success');
    });

    window.addEventListener('pagehide', () => {
      closeSessionFireAndForget();
    });

    window.addEventListener('beforeunload', () => {
      closeSessionFireAndForget();
    });
    window.addEventListener('resize', () => {
      fitTerminalToContainer();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        vncLastHiddenAt = Date.now();
        return;
      }
      if (currentConsole !== 'vnc') return;
      const hiddenFor = vncLastHiddenAt > 0 ? (Date.now() - vncLastHiddenAt) : 0;
      if (hiddenFor >= 1200) {
        refreshVncFrameOnResume();
      }
    });
    window.addEventListener('focus', () => {
      if (currentConsole !== 'vnc') return;
      if (document.visibilityState === 'hidden') return;
      const hiddenFor = vncLastHiddenAt > 0 ? (Date.now() - vncLastHiddenAt) : 0;
      if (hiddenFor >= 1200) {
        refreshVncFrameOnResume();
      }
    });
    window.addEventListener('pageshow', (event) => {
      if (currentConsole !== 'vnc') return;
      if (event && event.persisted) {
        refreshVncFrameOnResume(true);
      }
    });
    window.addEventListener('storage', (event) => {
      if (!event) return;
      if (event.key === 'eve_v2_theme' && typeof event.newValue === 'string') {
        const nextTheme = String(event.newValue).toLowerCase() === 'light' ? 'light' : 'dark';
        if (nextTheme !== theme) {
          theme = nextTheme;
          applyTheme();
        }
      }
      if (event.key === 'eve_v2_lang' && typeof event.newValue === 'string') {
        const nextLang = String(event.newValue).toLowerCase() === 'en' ? 'en' : 'ru';
        if (nextLang !== lang) {
          lang = nextLang;
          applyI18n();
        }
      }
    });
    const vncFrameEl = document.getElementById('vncFrame');
      if (vncFrameEl) {
        vncFrameEl.addEventListener('load', () => {
          if (currentConsole === 'vnc') {
            statusSet('ok', tr('statusConnected'));
            clearSessionAlert();
          }
        });
      }

    (async () => {
      if (!parseParams()) {
        toast(tr('errParams'));
        statusSet('error', tr('statusError'));
        return;
      }

      try {
        const auth = await jfetch(api.auth);
        me = auth && auth.data ? auth.data : null;
      } catch (_) {
        toast(tr('errAuth'));
        location.href = '/login';
        return;
      }

      lang = (me && me.lang) ? String(me.lang) : lang;
      theme = (me && me.theme) ? String(me.theme) : theme;
      localStorage.setItem('eve_v2_lang', lang);
      localStorage.setItem('eve_v2_theme', theme);

      applyI18n();
      setConsoleMode('telnet');
      try {
        createTerminal();
      } catch (err) {
        const message = (err && err.message) ? err.message : tr('errOpen');
        renderFatalError(message);
        return;
      }
      applyTheme();

      try {
        await startConsole();
      } catch (err) {
        const message = (err && err.message) ? err.message : tr('errOpen');
        toast(message);
        statusSet('error', tr('statusError'));
        showSessionAlert('error', tr('alertErrorTitle'), message);
      }

      if (window.startV2Heartbeat) {
        window.startV2Heartbeat({
          pingUrl: api.ping,
          onUnauthorized: () => {
            location.href = '/login';
          }
        });
      }
    })();

    window.addEventListener('error', (event) => {
      const msg = event && event.message ? event.message : tr('errOpen');
      renderFatalError(msg);
    });
    window.addEventListener('unhandledrejection', (event) => {
      const reason = event && event.reason ? event.reason : null;
      const msg = reason && reason.message ? reason.message : tr('errOpen');
      renderFatalError(msg);
    });
  </script>
</body>
</html>
