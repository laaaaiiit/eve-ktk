    function byId(id){ return document.getElementById(id); }
    function hasPerm(code){ return !!(me && Array.isArray(me.permissions) && me.permissions.includes(code)); }
    function esc(v){
      return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }

    async function jget(url, opts = {}) {
      const r = await fetch(url, Object.assign({ credentials: 'include' }, opts));
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        const msg = String(d && d.message ? d.message : '');
        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
          throw new Error(tr('errForbiddenAction'));
        }
        throw new Error(msg || ('HTTP ' + r.status));
      }
      return d;
    }

    function closeAllDropdownPanels() {
      document.querySelectorAll('.v2-dd-panel').forEach((el) => el.classList.add('hidden'));
    }

    function makeDropdown(root, options, getValue, setValue, getLabel) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');
      panel.className = 'v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl';
      root.innerHTML = '';
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const optionList = (typeof options === 'function') ? options() : options;
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-left text-sm text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-3 py-2 text-left text-sm text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        panel.className = `v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;

        const val = String(getValue());
        const active = optionList.find((o) => String(o.value) === val) || optionList[0] || { value: '', label: '' };
        const activeLabel = active.label ? active.label : tr(active.labelKey || '');
        const prefix = getLabel ? `${getLabel()}: ` : '';
        btn.innerHTML = `<span>${esc(prefix)}${esc(activeLabel)}</span><i class="fa fa-chevron-down text-xs ${isLight ? 'text-slate-500' : 'text-slate-400'}"></i>`;

        panel.innerHTML = '';
        optionList.forEach((opt) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = String(opt.value) === val;
          const label = opt.label ? opt.label : tr(opt.labelKey || '');
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span>${esc(label)}</span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', async () => {
            closeAllDropdownPanels();
            await setValue(String(opt.value));
            repaint();
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) panel.classList.remove('hidden');

    function makeNavDropdown(root, labelKey, items) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');
      root.innerHTML = '';
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-4 py-2 text-left text-sm font-semibold text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-2 text-left text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        panel.className = `v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${esc(tr(labelKey))}</span></span><i class="fa fa-chevron-down text-xs ${isLight ? 'text-slate-500' : 'text-slate-400'}"></i>`;

        panel.innerHTML = '';
        const current = location.pathname;
        items.forEach((it) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = !!it.href && current === it.href;
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(it.key)}<span>${esc(tr(it.key))}</span></span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', () => {
            closeAllDropdownPanels();
            if (it.href) {
              location.href = it.href;
              return;
            }
            toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) panel.classList.add('hidden');
      });
      repaint();
      return repaint;
    }

    function renderAutoRefreshState() {
      const icon = byId('autoRefreshIcon');
      const state = byId('autoRefreshState');
      const btn = byId('autoRefreshBtn');
      if (icon) icon.className = autoRefreshEnabled ? 'fa fa-pause' : 'fa fa-play';
      if (state) state.textContent = autoRefreshEnabled ? tr('autoRefreshOn') : tr('autoRefreshOff');
      if (btn) btn.setAttribute('aria-pressed', autoRefreshEnabled ? 'true' : 'false');
    }

    function formatDate(value) {
      if (!value) return tr('unknown');
      const dt = new Date(String(value));
      if (Number.isNaN(dt.getTime())) return String(value);
      return dt.toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US');
    }

    function formatAuditDateTime(rec) {
      if (rec && rec.timestamp_iso) {
        const dt = new Date(String(rec.timestamp_iso));
        if (!Number.isNaN(dt.getTime())) {
          return {
            date: dt.toLocaleDateString(lang === 'ru' ? 'ru-RU' : 'en-US'),
            time: dt.toLocaleTimeString(lang === 'ru' ? 'ru-RU' : 'en-US')
          };
        }
      }
      const raw = String(rec && rec.timestamp_raw ? rec.timestamp_raw : '').trim();
      const m = raw.match(/^(\d{2}:\d{2}:\d{2})\s+(\d{2}\/\d{2}\/\d{2})/);
      if (m) {
        return { date: m[2], time: m[1] };
      }
      return { date: raw || tr('unknown'), time: '' };
    }

    function actionLabel(value) {
      const key = String(value || '').toLowerCase();
      if (!key) return tr('unknown');
      const localized = tr(`action_${key}`);
      if (localized !== `action_${key}`) return localized;
      const hit = actionOptions.find((it) => String(it.value || '').toLowerCase() === key);
      return hit && hit.label ? String(hit.label) : key;
    }

    function eventLabel(value) {
      const key = String(value || '').toLowerCase();
      if (!key) return '';
      const localized = tr(`event_${key}`);
      return localized !== `event_${key}` ? localized : key;
    }

    function eventCode(value) {
      const raw = String(value || '').trim();
      return raw !== '' ? raw : '-';
    }

    function objectTypeLabel(value) {
      const key = String(value || '').toLowerCase();
      if (!key) return tr('object_system');
      const localized = tr(`object_${key}`);
      return localized !== `object_${key}` ? localized : key;
    }

    function formatObject(row) {
      const type = String(row && row.object_type ? row.object_type : '').toLowerCase() || 'system';
      const nodeName = String(row && row.node_name ? row.node_name : '').trim();
      const labName = String(row && row.lab_name ? row.lab_name : '').trim();
      const cloudName = String(row && row.cloud_name ? row.cloud_name : '').trim();
      const folderName = String(row && row.folder_name ? row.folder_name : '').trim();
      const objectName = String(row && row.object_name ? row.object_name : '').trim();
      const objectId = String(row && row.object_id ? row.object_id : '').trim();
      const taskId = String(row && row.task_id ? row.task_id : '').trim();

      let title = objectName || tr('unknown');
      if (type === 'node') {
        title = nodeName || objectName || tr('object_node');
      } else if (type === 'lab') {
        title = labName || objectName || tr('object_lab');
      } else if (type === 'cloud') {
        title = cloudName || objectName || tr('object_cloud');
      } else if (type === 'folder') {
        title = folderName || objectName || tr('object_folder');
      } else if (type === 'console_session') {
        title = nodeName || objectName || tr('object_console_session');
      } else if (type === 'task') {
        title = nodeName || labName || objectName || tr('object_task');
      } else if (objectName) {
        title = objectName;
      } else if (row && row.path) {
        title = String(row.path);
      }

      const details = [objectTypeLabel(type)];
      if (labName && type !== 'lab') {
        details.push(`${tr('objectInLab')}: ${labName}`);
      }
      if (objectId && (!title || title === tr('unknown'))) {
        details.push(`${tr('objectId')}: ${objectId}`);
      }
      return { title, subtitle: details.join(' • ') };
    }

    function summarizeRequest(row) {
      const method = String(row && row.method ? row.method : '').trim().toUpperCase();
      let path = String(row && row.path ? row.path : '').trim();
      if (!method && !path) return '';

      const pairs = [
        [String(row && row.lab_id ? row.lab_id : '').trim(), String(row && row.lab_name ? row.lab_name : tr('object_lab')).trim()],
        [String(row && row.node_id ? row.node_id : '').trim(), String(row && row.node_name ? row.node_name : tr('object_node')).trim()],
        [String(row && row.cloud_id ? row.cloud_id : '').trim(), String(row && row.cloud_name ? row.cloud_name : tr('object_cloud')).trim()],
        [String(row && row.folder_id ? row.folder_id : '').trim(), String(row && row.folder_name ? row.folder_name : tr('object_folder')).trim()],
        [String(row && row.session_id ? row.session_id : '').trim(), tr('object_console_session')],
        [String(row && row.task_id ? row.task_id : '').trim(), tr('object_task')]
      ];
      pairs.forEach(([id, label]) => {
        if (!id || !label) return;
        path = path.split(id).join(label);
      });

      // Hide remaining raw UUIDs from UI-oriented view.
      path = path.replace(/[a-f0-9]{8}-[a-f0-9]{4}-[1-5][a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}/gi, '{id}');
      return [method, path].filter(Boolean).join(' ');
    }

    function sourceLabel(value) {
      const key = String(value || '').toLowerCase();
      if (!key) return tr('unknown');
      const hit = sourceOptions.find((it) => String(it.value || '').toLowerCase() === key);
      return hit && hit.label ? String(hit.label) : key;
    }

    function buildAuditQuery() {
      const qs = new URLSearchParams();
      qs.set('source', sourceFilter);
      qs.set('lines', String(linesFilter));
      qs.set('status', statusFilter);
      qs.set('action', actionFilter);
      qs.set('method', methodFilter);
      qs.set('event', eventFilter);

      const user = String(byId('userInput').value || '').trim();
      const ip = String(byId('ipInput').value || '').trim();
      const search = String(byId('searchInput').value || '').trim();
      const dateFrom = String(byId('dateFromInput').value || '').trim();
      const dateTo = String(byId('dateToInput').value || '').trim();

      if (user) qs.set('user', user);
      if (ip) qs.set('ip', ip);
      if (search) qs.set('search', search);
      if (dateFrom) qs.set('date_from', dateFrom);
      if (dateTo) qs.set('date_to', dateTo);
      return qs;
    }

    function renderRows(records) {
      const tbody = byId('auditRows');
      if (!Array.isArray(records) || records.length < 1) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-3 py-5 text-center opacity-75">${esc(tr('empty'))}</td></tr>`;
        return;
      }

      tbody.innerHTML = records.map((row) => {
        const dateTime = formatAuditDateTime(row);
        const status = String(row.status || 'OK').toUpperCase() === 'ERROR' ? 'ERROR' : 'OK';
        const statusClass = status === 'ERROR'
          ? (theme === 'light' ? 'text-rose-700' : 'text-rose-300')
          : (theme === 'light' ? 'text-emerald-700' : 'text-emerald-300');
        const dateClass = theme === 'light' ? 'text-slate-900' : 'text-slate-100';
        const timeClass = theme === 'light' ? 'text-slate-500' : 'text-slate-400';
        const userText = row.user ? String(row.user) : tr('unknown');
        const roleText = row.role ? String(row.role) : '';
        const code = row.code !== null && row.code !== undefined && row.code !== '' ? String(row.code) : '';
        const duration = row.duration_ms !== null && row.duration_ms !== undefined && row.duration_ms !== '' ? `${String(row.duration_ms)}ms` : '';
        const objectInfo = formatObject(row);
        const detailBits = [];
        if (duration) detailBits.push(`${tr('duration')}: ${duration}`);
        if (code) detailBits.push(`${tr('httpCode')}: ${code}`);
        const eventText = eventLabel(row.event || '');
        const eventCodeText = eventCode(row.event || '');
        const requestText = summarizeRequest(row);

        return `<tr class="border-t ${theme === 'light' ? 'border-slate-200 hover:bg-slate-50/70' : 'border-white/10 hover:bg-white/5'}">
          <td class="px-3 py-2 align-top whitespace-nowrap">
            <div class="${dateClass} font-semibold">${esc(dateTime.date)}</div>
            <div class="${timeClass}">${esc(dateTime.time)}</div>
          </td>
          <td class="px-3 py-2 align-top">
            <div class="font-semibold">${esc(userText)}</div>
            <div class="opacity-70">${esc(roleText)}</div>
          </td>
          <td class="px-3 py-2 align-top">
            <div class="font-semibold">${esc(actionLabel(row.action || ''))}</div>
            <div class="opacity-70"><code class="text-[11px]">${esc(eventCodeText)}</code></div>
          </td>
          <td class="px-3 py-2 align-top">
            <div class="font-semibold">${esc(objectInfo.title)}</div>
            <div class="opacity-70 break-all">${esc(objectInfo.subtitle)}</div>
          </td>
          <td class="px-3 py-2 align-top">
            <div>${esc(sourceLabel(row.source || ''))}</div>
            <div class="opacity-70">${esc(row.ip || tr('unknown'))}</div>
          </td>
          <td class="px-3 py-2 align-top font-semibold ${statusClass}">${esc(status)}</td>
          <td class="px-3 py-2 align-top break-all">
            <div>${esc(detailBits.join(' | '))}</div>
            <div class="opacity-70">${esc(eventText)}</div>
            <div class="opacity-60">${esc(requestText)}</div>
          </td>
        </tr>`;
      }).join('');
    }

    async function loadAudit(showToastOnError = true) {
      try {
        const qs = buildAuditQuery();
        const res = await jget(`${api.audit}?${qs.toString()}`);
        const data = res && res.data ? res.data : {};

        const sourceLabelById = {
          all: tr('sourceAll'),
          user_activity: tr('sourceUserActivity'),
          security: tr('sourceSecurity'),
          access_http: tr('sourceAccess')
        };
        sourceOptions = Array.isArray(data.sources) ? data.sources.map((s) => ({
          value: String(s.id || ''),
          label: sourceLabelById[String(s.id || '')] || String(s.label || s.id || '')
        })) : [];
        actionOptions = Array.isArray(data.actions) ? data.actions.map((a) => ({
          value: String(a.id || '').toLowerCase(),
          label: tr(`action_${String(a.id || '').toLowerCase()}`) !== `action_${String(a.id || '').toLowerCase()}`
            ? tr(`action_${String(a.id || '').toLowerCase()}`)
            : String(a.label || a.id || '')
        })) : [];
        eventOptions = Array.isArray(data.events) ? data.events.map((v) => {
          const key = String(v || '').toLowerCase();
          const localized = tr(`event_${key}`);
          return { value: key, label: localized !== `event_${key}` ? localized : key };
        }) : [];
        methodOptions = Array.isArray(data.methods) ? data.methods.map((v) => ({ value: String(v).toUpperCase(), label: String(v).toUpperCase() })) : [];

        const content = data.content || {};
        const records = Array.isArray(content.records) ? content.records : [];

        renderRows(records);
        byId('metaShown').textContent = String(content.record_count || records.length || 0);
        byId('metaFiltered').textContent = String(content.records_filtered || records.length || 0);
        byId('metaScanned').textContent = String(content.records_total || 0);
        byId('lastUpdateValue').textContent = formatDate(new Date().toISOString());

        refreshSourceDd();
        refreshActionDd();
        refreshEventDd();
        refreshMethodDd();
      } catch (e) {
        if (showToastOnError) toast((e && e.message) ? e.message : tr('errLoad'));
      }
    }

    async function exportAuditCsv() {
      try {
        const qs = buildAuditQuery();
        const response = await fetch(`${api.export}?${qs.toString()}`, { credentials: 'include' });
        if (!response.ok) {
          let message = tr('errExport');
          try {
            const data = await response.json();
            if (data && data.message) message = String(data.message);
          } catch (_e) {}
          throw new Error(message);
        }

        const blob = await response.blob();
        const cd = String(response.headers.get('content-disposition') || '');
        const nameMatch = cd.match(/filename="?([^";]+)"?/i);
        const filename = nameMatch && nameMatch[1] ? nameMatch[1] : `system-audit-${Date.now()}.csv`;

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        toast(tr('exportReady'), 'success');
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errExport'));
      }
    }

        logoutBtn.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 shadow-sm transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }
      const navHome = byId('navHome');
      if (navHome) {
        navHome.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2';
      }

      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      refreshSourceDd();
      refreshLinesDd();
      refreshStatusDd();
      refreshActionDd();
      refreshMethodDd();
      refreshEventDd();
      renderAutoRefreshState();
    }

    function bindInputs() {
      ['userInput', 'ipInput', 'searchInput', 'dateFromInput', 'dateToInput'].forEach((id) => {
        const el = byId(id);
        if (!el) return;
        el.addEventListener('keydown', async (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            await loadAudit(true);
          }
        });
        el.addEventListener('change', async () => {
          await loadAudit(false);
        });
      });

      byId('refreshBtn').addEventListener('click', async () => {
        await loadAudit(true);
        toast(tr('refresh'), 'success');
      });
      byId('exportBtn').addEventListener('click', exportAuditCsv);
      byId('clearFiltersBtn').addEventListener('click', async () => {
        sourceFilter = 'all';
        linesFilter = '100';
        statusFilter = 'all';
        actionFilter = 'all';
        methodFilter = 'all';
        eventFilter = 'all';
        byId('userInput').value = '';
        byId('ipInput').value = '';
        byId('searchInput').value = '';
        byId('dateFromInput').value = '';
        byId('dateToInput').value = '';
        refreshSourceDd();
        refreshLinesDd();
        refreshStatusDd();
        refreshActionDd();
        refreshMethodDd();
        refreshEventDd();
        await loadAudit(false);
        toast(tr('filtersCleared'), 'success');
      });
      byId('autoRefreshBtn').addEventListener('click', () => {
        autoRefreshEnabled = !autoRefreshEnabled;
        localStorage.setItem('eve_v2_system_audit_auto_refresh', autoRefreshEnabled ? '1' : '0');
        renderAutoRefreshState();
      });
      byId('logoutBtn').addEventListener('click', async () => {
        try {
          await jget(api.logout, { method: 'POST' });
          location.href = '/login';
        } catch (e) {
          toast((e && e.message) ? e.message : tr('errAuth'));
        }
      });
      byId('profileBtn').addEventListener('click', () => {
        if (typeof window.openV2ProfileSettingsModal === 'function') {
          window.openV2ProfileSettingsModal();
        }
      });
    }

    (async () => {
      try {
        const auth = await jget(api.auth);
        me = auth.data || null;
        if (!me || !hasPerm('page.system.audit.view')) {
          toast(tr('errForbiddenAction'));
          setTimeout(() => { location.href = '/main'; }, 900);
          return;
        }

        lang = (me && me.lang) || lang;
        theme = (me && me.theme) || theme;
        localStorage.setItem('eve_v2_lang', lang);
        localStorage.setItem('eve_v2_theme', theme);

        refreshLangDd = makeDropdown(
          document.querySelector('[data-dd="lang"]'),
          [
            { value: 'ru', label: 'Русский' },
            { value: 'en', label: 'English' }
          ],
          () => lang,
          async (v) => {
            lang = v;
            localStorage.setItem('eve_v2_lang', v);
            applyI18n();
            await persistPrefs();
          },
          null
        );

        refreshThemeDd = makeDropdown(
          document.querySelector('[data-dd="theme"]'),
          [
            { value: 'dark', label: 'Dark' },
            { value: 'light', label: 'Light' }
          ],
          () => theme,
          async (v) => {
            theme = v;
            localStorage.setItem('eve_v2_theme', v);
            applyTheme();
            await persistPrefs();
          },
          null
        );

        refreshNavManagement = makeNavDropdown(
          document.getElementById('navManagement'),
          'navManagement',
          [
            { key: 'navLabs', href: '/labmgmt' },
            { key: 'navUsers', href: '/usermgmt' },
            { key: 'navClouds', href: '/cloudmgmt' },
            { key: 'navRoles', href: '/roles' }
          ]
        );

        refreshNavSystem = makeNavDropdown(
          document.getElementById('navSystem'),
          'navSystem',
          [
            { key: 'navSysStatus', href: '/system-status' },
            { key: 'navTaskQueue', href: '/taskqueue' },
            { key: 'navSysConsole', href: '/system-console' },
            { key: 'navSysLogs', href: '/system-logs' },
            { key: 'navSysAudit', href: '/system-audit' }
          ]
        );

        refreshSourceDd = makeDropdown(
          document.querySelector('[data-dd="source"]'),
          () => {
            const base = [
              { value: 'all', label: tr('sourceAll') },
              { value: 'user_activity', label: tr('sourceUserActivity') },
              { value: 'security', label: tr('sourceSecurity') },
              { value: 'access_http', label: tr('sourceAccess') }
            ];
            return sourceOptions.length > 0 ? sourceOptions : base;
          },
          () => sourceFilter,
          async (v) => {
            sourceFilter = v;
            await loadAudit(false);
          },
          () => tr('source')
        );

        refreshLinesDd = makeDropdown(
          document.querySelector('[data-dd="lines"]'),
          lineOptions,
          () => linesFilter,
          async (v) => {
            linesFilter = v;
            await loadAudit(false);
          },
          () => tr('lines')
        );

        refreshStatusDd = makeDropdown(
          document.querySelector('[data-dd="status"]'),
          () => [
            { value: 'all', label: tr('any') },
            { value: 'ok', label: tr('statusOk') },
            { value: 'error', label: tr('statusError') }
          ],
          () => statusFilter,
          async (v) => {
            statusFilter = v;
            await loadAudit(false);
          },
          () => tr('status')
        );

        refreshActionDd = makeDropdown(
          document.querySelector('[data-dd="action"]'),
          () => [{ value: 'all', label: tr('any') }].concat(actionOptions.length ? actionOptions : []),
          () => actionFilter,
          async (v) => {
            actionFilter = v;
            await loadAudit(false);
          },
          () => tr('action')
        );

        refreshMethodDd = makeDropdown(
          document.querySelector('[data-dd="method"]'),
          () => {
            const opts = [{ value: 'all', label: tr('any') }];
            (methodOptions.length ? methodOptions : [{ value: 'GET', label: 'GET' }, { value: 'POST', label: 'POST' }, { value: 'PUT', label: 'PUT' }, { value: 'DELETE', label: 'DELETE' }])
              .forEach((m) => opts.push({ value: String(m.value || m).toLowerCase(), label: String(m.label || m.value || m).toUpperCase() }));
            return opts;
          },
          () => methodFilter,
          async (v) => {
            methodFilter = v;
            await loadAudit(false);
          },
          () => tr('method')
        );

        refreshEventDd = makeDropdown(
          document.querySelector('[data-dd="event"]'),
          () => [{ value: 'all', label: tr('any') }].concat((eventOptions.length ? eventOptions : []).map((e) => ({ value: String(e.value || e).toLowerCase(), label: String(e.label || e.value || e) }))),
          () => eventFilter,
          async (v) => {
            eventFilter = v;
            await loadAudit(false);
          },
          () => tr('event')
        );

        bindInputs();
        applyI18n();
        applyTheme();
        await loadAudit(false);

        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(async () => {
          if (!autoRefreshEnabled) return;
          if (document.visibilityState === 'hidden') return;
          await loadAudit(false);
        }, autoRefreshIntervalMs);

        if (window.startV2Heartbeat) {
          window.startV2Heartbeat({
            pingUrl: api.ping,
            intervalMs: 30000,
            onUnauthorized: () => { location.href = '/login'; }
          });
        }
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
        setTimeout(() => { location.href = '/login'; }, 900);
      }
    })();
  </script>
</body>
</html>
