<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EVE | Лаборатории</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="stylesheet" href="/assets/css/main.output.css">
  <link rel="stylesheet" href="/assets/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="/assets/v2-scrollbar.css">
</head>
<body class="min-h-screen">
  <div id="toastRoot" class="fixed right-4 bottom-4 z-[80] flex w-[min(92vw,420px)] flex-col items-end gap-2 sm:right-6 sm:bottom-6"></div>
  <div id="topbarHost"></div>

  <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6">
    <section id="pageCard" class="rounded-3xl border p-5 shadow-2xl transition-colors duration-300">
      <div class="mb-5 flex flex-wrap items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-black tracking-tight" data-i18n="title">Управление лабораториями</h1>
          <p class="mt-1 text-sm opacity-85" data-i18n="subTitle">Все пользователи, лаборатории и ноды из БД с групповыми действиями.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button id="btnStartAll" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition">
            <i class="fa fa-play-circle" aria-hidden="true"></i>
            <span data-i18n="startAll">Запустить всё</span>
          </button>
          <button id="btnStopAll" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition">
            <i class="fa fa-stop-circle" aria-hidden="true"></i>
            <span data-i18n="stopAll">Остановить всё</span>
          </button>
          <button id="btnWipeAll" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition">
            <i class="fa fa-eraser" aria-hidden="true"></i>
            <span data-i18n="wipeAll">Сбросить всё</span>
          </button>
          <button id="refreshBtn" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition">
            <i class="fa fa-refresh" aria-hidden="true"></i>
            <span data-i18n="refresh">Обновить</span>
          </button>
        </div>
      </div>

      <div class="mb-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardUsers">Пользователи</p>
          <p id="cardUsers" class="mt-2 text-2xl font-bold">0</p>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardLabs">Лаборатории</p>
          <p id="cardLabs" class="mt-2 text-2xl font-bold">0</p>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardNodes">Ноды</p>
          <p id="cardNodes" class="mt-2 text-2xl font-bold">0</p>
        </article>
        <article class="rounded-2xl border p-4">
          <p class="text-xs uppercase opacity-70" data-i18n="cardRunning">Включено</p>
          <p id="cardRunning" class="mt-2 text-2xl font-bold">0</p>
        </article>
      </div>

      <div class="mb-4 grid gap-3 md:grid-cols-2 xl:grid-cols-4">
        <div>
          <label for="fltSearch" class="mb-1 block text-xs font-semibold uppercase opacity-70" data-i18n="fltSearchLabel">Поиск</label>
          <input id="fltSearch" type="text" class="w-full rounded-xl border px-3 py-2 text-sm outline-none transition" placeholder="Поиск">
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold uppercase opacity-70" data-i18n="fltOwnerLabel">Пользователь</label>
          <div id="fltOwnerWrap"></div>
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold uppercase opacity-70" data-i18n="fltStateLabel">Статус</label>
          <div id="fltStateWrap"></div>
        </div>
        <div>
          <label class="mb-1 block text-xs font-semibold uppercase opacity-70" data-i18n="fltTypeLabel">Тип</label>
          <div id="fltTypeWrap"></div>
        </div>
      </div>

      <div class="overflow-x-auto rounded-2xl border">
        <table class="min-w-full text-sm">
          <thead id="tableHead" class="text-left">
            <tr>
              <th class="px-3 py-2">
                <button type="button" data-sort="name" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colName">Имя</span><span data-sort-mark="name">↕</span>
                </button>
              </th>
              <th class="px-3 py-2">
                <button type="button" data-sort="type" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colType">Тип</span><span data-sort-mark="type">↕</span>
                </button>
              </th>
              <th class="px-3 py-2 text-right">
                <button type="button" data-sort="nodes" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colNodes">Нод</span><span data-sort-mark="nodes">↕</span>
                </button>
              </th>
              <th class="px-3 py-2 text-right">
                <button type="button" data-sort="running" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colRunning">Включено</span><span data-sort-mark="running">↕</span>
                </button>
              </th>
              <th class="px-3 py-2 text-right">
                <button type="button" data-sort="tasks" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colTasks">Задач</span><span data-sort-mark="tasks">↕</span>
                </button>
              </th>
              <th class="px-3 py-2">
                <button type="button" data-sort="updated" class="inline-flex items-center gap-1 font-semibold">
                  <span data-i18n="colUpdated">Изменено</span><span data-sort-mark="updated">↕</span>
                </button>
              </th>
              <th class="px-3 py-2 text-right" data-i18n="colActions">Действия</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y"></tbody>
        </table>
      </div>
      <p id="empty" class="mt-3 hidden text-sm opacity-80" data-i18n="empty">Данных нет.</p>
    </section>
  </main>

  <div id="confirmBackdrop" class="fixed inset-0 z-[90] hidden items-center justify-center bg-black/55 p-4">
    <div id="confirmCard" class="w-full max-w-lg rounded-2xl border p-5 shadow-2xl">
      <h3 id="confirmTitle" class="text-lg font-bold">Подтверждение</h3>
      <p id="confirmText" class="mt-2 text-sm opacity-85"></p>
      <div class="mt-5 flex items-center justify-end gap-2">
        <button id="confirmCancel" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition"></button>
        <button id="confirmOk" type="button" class="rounded-xl border px-4 py-2 text-sm font-semibold transition"></button>
      </div>
    </div>
  </div>

    let me = null;
    let lang = localStorage.getItem('eve_v2_lang') || 'ru';
    let theme = localStorage.getItem('eve_v2_theme') || 'dark';
    let overview = { users: [], labs: [] };
    const expandedUsers = new Set();
    const expandedLabs = new Set();
    const labNodesCache = new Map();
    const filters = { search: '', owner: 'all', state: 'all', type: 'all' };
    const sortState = { key: 'name', dir: 'asc' };
    let busy = false;
    let repaintOwnerFilter = () => {};
    let repaintStateFilter = () => {};
    let repaintTypeFilter = () => {};

    const toaster = window.createV2ToastManager ? window.createV2ToastManager({
      rootId: 'toastRoot',
      getTheme: () => theme,
      getLabel: () => tr('toastsLabel'),
      durationMs: 5000
    }) : null;

    function tr(k){ return (i18n[lang] || i18n.ru)[k] || k; }
    function esc(s){ return String(s ?? '').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#039;'}[c])); }
    function hasPerm(code){ return !!(me && Array.isArray(me.permissions) && me.permissions.includes(code)); }
    function toast(msg, kind='error'){ if (toaster) toaster.toast(msg, kind); }
    function repTpl(s, m){ return String(s || '').replace(/\{([a-zA-Z0-9_]+)\}/g, (_, k) => String(m[k] ?? '')); }

    async function jget(url, opts={}){
      const r = await fetch(url, Object.assign({ credentials: 'include' }, opts));
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        const msg = String(d && d.message ? d.message : '');
        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
          throw new Error(tr('errForbiddenAction'));
        }
        throw new Error(msg || ('HTTP ' + r.status));
      }
      return d;
    }
    async function jpost(url, body){
      return jget(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
    }

    function fmtTs(value){
      if (!value) return '—';
      const d = new Date(String(value));
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US');
    }

    function navIcon(key){
      const map = {
        navManagement: '<i class="fa fa-cogs" aria-hidden="true"></i>',
        navSystem: '<i class="fa fa-desktop" aria-hidden="true"></i>',
        navLabs: '<i class="fa fa-flask" aria-hidden="true"></i>',
        navUsers: '<i class="fa fa-users" aria-hidden="true"></i>',
        navClouds: '<i class="fa fa-cloud" aria-hidden="true"></i>',
        navRoles: '<i class="fa fa-id-badge" aria-hidden="true"></i>',
        navSysStatus: '<i class="fa fa-heartbeat" aria-hidden="true"></i>',
        navTaskQueue: '<i class="fa fa-tasks" aria-hidden="true"></i>',
        navSysLogs: '<i class="fa fa-file-text-o" aria-hidden="true"></i>'
      };
      return map[key] || '<i class="fa fa-circle-o" aria-hidden="true"></i>';
    }

    function dropdownUi(kind = 'input') {
      const isNav = kind === 'nav';
      const pad = isNav ? 'px-4 py-2' : 'px-3 py-2';
      const weight = isNav ? 'font-semibold' : 'font-normal';
      const btnBase = `w-full rounded-xl ${pad} text-left text-sm ${weight} flex items-center justify-between cursor-pointer transition duration-200 hover:-translate-y-0.5 active:translate-y-0 focus:outline-none`;
      const itemBase = `w-full rounded-lg px-3 py-2 text-left text-sm cursor-pointer flex items-center justify-between`;
      return theme === 'light'
        ? { btn: `${btnBase} border border-slate-300 bg-white text-slate-900 hover:bg-slate-50`, panel: 'absolute z-50 mt-2 hidden w-full rounded-xl border border-slate-200 bg-white p-1 shadow-2xl', item: `${itemBase} text-slate-900 hover:bg-slate-100`, chevron: 'text-slate-500' }
        : { btn: `${btnBase} border border-white/15 bg-slate-900/70 text-slate-100 hover:bg-white/10`, panel: 'absolute z-50 mt-2 hidden w-full rounded-xl border border-white/15 bg-slate-900/95 p-1 shadow-2xl', item: `${itemBase} text-slate-100 hover:bg-white/10`, chevron: 'text-slate-400' };
    }

    function closeAllDropdownPanels(){ document.querySelectorAll('.v2-dd-panel').forEach(el => el.classList.add('hidden')); }

    function strNorm(v){
      return String(v || '').toLowerCase().trim();
    }

    function sortMark(key){
      if (sortState.key !== key) return '↕';
      return sortState.dir === 'asc' ? '↑' : '↓';
    }

    function parseTs(v){
      if (!v) return 0;
      const t = Date.parse(String(v));
      return Number.isNaN(t) ? 0 : t;
    }

    function btnClass(kind='neutral', size='xs'){
      const pad = size === 'xs' ? 'px-2 py-1 text-xs' : 'px-3 py-2 text-sm';
      const base = `inline-flex items-center justify-center gap-2 rounded-xl border font-semibold transition duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none ${pad}`;
      if (theme === 'light') {
        if (kind === 'success') return `${base} border-emerald-300 bg-emerald-100 text-emerald-800 hover:bg-emerald-200`;
        if (kind === 'danger') return `${base} border-rose-300 bg-rose-100 text-rose-800 hover:bg-rose-200`;
        if (kind === 'warn') return `${base} border-amber-300 bg-amber-100 text-amber-800 hover:bg-amber-200`;
        if (kind === 'accent') return `${base} border-blue-300 bg-blue-100 text-blue-800 hover:bg-blue-200`;
        return `${base} border-slate-300 bg-white text-slate-700 hover:bg-slate-100`;
      }
      if (kind === 'success') return `${base} border-emerald-400/40 bg-emerald-500/20 text-emerald-200 hover:bg-emerald-500/30`;
      if (kind === 'danger') return `${base} border-rose-400/40 bg-rose-500/20 text-rose-200 hover:bg-rose-500/30`;
      if (kind === 'warn') return `${base} border-amber-400/40 bg-amber-500/20 text-amber-200 hover:bg-amber-500/30`;
      if (kind === 'accent') return `${base} border-cyan-400/40 bg-cyan-500/20 text-cyan-100 hover:bg-cyan-500/30`;
      return `${base} border-white/20 bg-white/5 text-slate-100 hover:bg-white/10`;
    }

    function makeSelect(root, options, getValue, onChange){
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const list = document.createElement('div');

      const repaint = () => {
        const c = dropdownUi('input');
        btn.className = c.btn;
        const current = options.find(o => String(o.value) === String(getValue())) || options[0];
        btn.innerHTML = `<span>${esc(current.label)}</span><i class="fa fa-chevron-down text-xs ${c.chevron}"></i>`;
        list.className = c.panel;
        list.classList.add('v2-dd-panel');
        list.innerHTML = '';
        options.forEach(opt => {
          const isActive = String(opt.value) === String(getValue());
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `${c.item} ${isActive ? (theme==='light' ? 'bg-emerald-50' : 'bg-emerald-500/10') : ''}`;
          item.innerHTML = `<span>${esc(opt.label)}</span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', async () => {
            closeAllDropdownPanels();
            await onChange(opt.value);
            repaint();
          });
          list.appendChild(item);
        });
      };

      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const wasHidden = list.classList.contains('hidden');
        closeAllDropdownPanels();
        if (wasHidden) list.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => { if (!root.contains(e.target)) list.classList.add('hidden'); });
      root.appendChild(btn);
      root.appendChild(list);
      repaint();
      return repaint;
    }

    function makeNavDropdown(root, labelKey, items){
      root.classList.add('relative', 'min-w-0');
      root.innerHTML = '';
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');

      const repaint = () => {
        const c = dropdownUi('nav');
        btn.className = c.btn;
        panel.className = c.panel;
        panel.classList.add('v2-dd-panel');
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${tr(labelKey)}</span></span><i class="fa fa-chevron-down text-xs ${c.chevron}"></i>`;
        panel.innerHTML = '';
        items.forEach(it => {
          const isActive = !!it.href && it.href === location.pathname;
          const item = document.createElement('button');
          item.type = 'button';
          item.className = `${c.item} ${isActive ? (theme==='light' ? 'bg-emerald-50' : 'bg-emerald-500/10') : ''}`;

          item.addEventListener('click', () => {
            panel.classList.add('hidden');
            if (it.href) location.href = it.href;
            else toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      };

      btn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const wasHidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (wasHidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => { if (!root.contains(e.target)) panel.classList.add('hidden'); });
      root.appendChild(btn);
      root.appendChild(panel);
      repaint();
      return repaint;
    }

    async function loadOverview(showToastOnError = true){
      try {
        const res = await jget(api.overview);
        overview = (res && res.data) ? res.data : { users: [], labs: [] };
        render();
      } catch (e) {

      }

    async function ensureLabNodes(labId){
      const key = String(labId || '');
      if (!key) return [];
      if (labNodesCache.has(key)) return labNodesCache.get(key) || [];
      try {
        const res = await jget(api.nodes(key));
        const rows = (res && Array.isArray(res.data)) ? res.data : [];
        labNodesCache.set(key, rows);
        return rows;
      } catch (e) {
        toast((e && e.message) ? e.message : tr('nodesLoadFailed'));
        return [];
      }
    }

    function userLabs(userId){
      const uid = String(userId || '');
      const rows = Array.isArray(overview.labs) ? overview.labs : [];
      return rows.filter(l => String(l.owner_user_id || '') === uid);
    }

    function stateText(state){
      const s = String(state || '').toLowerCase();
      if (s === 'running') return tr('running');
      if (s === 'starting') return tr('starting');
      if (s === 'stopping') return tr('stopping');
      if (s === 'error') return tr('error');
      return s || '—';
    }

    function stateChip(state){
      const s = String(state || '').toLowerCase();
      const kind = s === 'running' ? 'success' : (s === 'error' ? 'danger' : (s === 'starting' || s === 'stopping' ? 'accent' : 'neutral'));
      return `<span class="${btnClass(kind, 'xs').replace('inline-flex', 'inline-flex pointer-events-none')}">${esc(stateText(s))}</span>`;
    }

    function itemTypeLabel(t){
      if (t === 'user') return tr('tUser');
      if (t === 'lab') return tr('tLab');
      return tr('tNode');
    }

    function itemState(row){
      if (!row) return '';
      if (row.type === 'node') return strNorm(row.node.power_state || '');
      if (row.type === 'lab') {
        if (Number(row.lab.tasks_pending || 0) > 0 || Number(row.lab.tasks_running || 0) > 0) return 'has_tasks';
        return Number(row.lab.nodes_running || 0) > 0 ? 'running' : 'stopped';
      }
      if (row.type === 'user') {
        return Number(row.user.nodes_running || 0) > 0 ? 'running' : 'stopped';
      }
      return '';
    }

    function itemSearchText(row){
      if (!row) return '';
      if (row.type === 'user') return `${row.user.username || ''} ${row.user.role || ''} user`;
      if (row.type === 'lab') return `${row.lab.name || ''} ${row.owner.username || ''} lab`;
      return `${row.node.name || ''} ${row.node.node_type || ''} ${row.owner.username || ''} node`;
    }

    function filterPass(row){
      const s = strNorm(filters.search);
      const ownerPass = filters.owner === 'all' || String(row.owner.id || '') === String(filters.owner || '');
      if (!ownerPass) return false;
      if (filters.type !== 'all' && filters.type !== row.type) return false;
      if (filters.state !== 'all' && itemState(row) !== filters.state) return false;
      if (s && !strNorm(itemSearchText(row)).includes(s)) return false;
      return true;
    }

    function compareRows(a, b){
      const d = sortState.dir === 'asc' ? 1 : -1;
      const k = sortState.key;
      const num = (x) => Number(x || 0);
      const tx = (x) => strNorm(x);
      let av = 0;
      let bv = 0;
      if (k === 'name') {
        av = tx(a.type === 'user' ? a.user.username : (a.type === 'lab' ? a.lab.name : a.node.name));
        bv = tx(b.type === 'user' ? b.user.username : (b.type === 'lab' ? b.lab.name : b.node.name));
      } else if (k === 'type') {
        av = tx(itemTypeLabel(a.type));
        bv = tx(itemTypeLabel(b.type));
      } else if (k === 'nodes') {
        av = a.type === 'user' ? num(a.user.nodes_total) : (a.type === 'lab' ? num(a.lab.nodes_total) : 1);
        bv = b.type === 'user' ? num(b.user.nodes_total) : (b.type === 'lab' ? num(b.lab.nodes_total) : 1);
      } else if (k === 'running') {
        av = a.type === 'user' ? num(a.user.nodes_running) : (a.type === 'lab' ? num(a.lab.nodes_running) : (strNorm(a.node.power_state) === 'running' ? 1 : 0));
        bv = b.type === 'user' ? num(b.user.nodes_running) : (b.type === 'lab' ? num(b.lab.nodes_running) : (strNorm(b.node.power_state) === 'running' ? 1 : 0));
      } else if (k === 'tasks') {
        av = a.type === 'lab' ? (num(a.lab.tasks_pending) + num(a.lab.tasks_running)) : 0;
        bv = b.type === 'lab' ? (num(b.lab.tasks_pending) + num(b.lab.tasks_running)) : 0;
      } else if (k === 'updated') {
        av = parseTs(a.type === 'user' ? a.user.updated_at : (a.type === 'lab' ? a.lab.updated_at : (a.node.updated_at || a.node.power_updated_at)));
        bv = parseTs(b.type === 'user' ? b.user.updated_at : (b.type === 'lab' ? b.lab.updated_at : (b.node.updated_at || b.node.power_updated_at)));
      }
      if (av < bv) return -1 * d;
      if (av > bv) return 1 * d;
      return 0;
    }

    function syncSortMarks(){
      document.querySelectorAll('[data-sort-mark]').forEach((el) => {
        const key = String(el.getAttribute('data-sort-mark') || '');
        el.textContent = sortMark(key);
        el.title = sortState.key === key ? (sortState.dir === 'asc' ? tr('sortAsc') : tr('sortDesc')) : '';
      });
    }

    function scopeLabel(scope, target){
      if (scope === 'all') return tr('confirmScopeAll');
      if (scope === 'user') return `${tr('confirmScopeUser')}: ${target || '-'}`;
      if (scope === 'lab') return `${tr('confirmScopeLab')}: ${target || '-'}`;
      return `${tr('confirmScopeNode')}: ${target || '-'}`;
    }

    async function askConfirm(action, scope, target){
      const backdrop = document.getElementById('confirmBackdrop');
      const title = document.getElementById('confirmTitle');
      const text = document.getElementById('confirmText');
      const btnCancel = document.getElementById('confirmCancel');
      const btnOk = document.getElementById('confirmOk');
      if (!backdrop || !title || !text || !btnCancel || !btnOk) return true;

      const aKey = action === 'start' ? 'confirmActionStart' : (action === 'stop' ? 'confirmActionStop' : 'confirmActionWipe');
      const sLabel = scopeLabel(scope, target);
      title.textContent = tr('confirmTitle');
      const msg = scope === 'all'
        ? repTpl(tr('confirmMessageAll'), { action: tr(aKey), scope: tr('confirmScopeAll') })
        : repTpl(tr('confirmMessage'), { action: tr(aKey), scope: tr(`confirmScope${scope.charAt(0).toUpperCase() + scope.slice(1)}`), target: target || '-' });
      text.textContent = msg || sLabel;
      btnCancel.textContent = tr('confirmCancel');
      btnOk.textContent = tr('confirmOk');
      btnOk.className = action === 'start' ? btnClass('success', 'sm') : btnClass('danger', 'sm');
      backdrop.classList.remove('hidden');
      backdrop.classList.add('flex');

      return await new Promise((resolve) => {
        const cleanup = () => {
          backdrop.classList.add('hidden');
          backdrop.classList.remove('flex');
          document.removeEventListener('keydown', onKey, true);
          btnCancel.removeEventListener('click', onCancel);
          btnOk.removeEventListener('click', onOk);
          backdrop.removeEventListener('click', onBg);
        };
        const onCancel = () => { cleanup(); resolve(false); };
        const onOk = () => { cleanup(); resolve(true); };
        const onBg = (e) => { if (e.target === backdrop) onCancel(); };
        const onKey = (e) => {
          if (e.key === 'Escape') { e.preventDefault(); onCancel(); return; }
          if (e.key === 'Enter') { e.preventDefault(); onOk(); }
        };
        btnCancel.addEventListener('click', onCancel);
        btnOk.addEventListener('click', onOk);
        backdrop.addEventListener('click', onBg);
        document.addEventListener('keydown', onKey, true);
        btnOk.focus();
      });
    }

    async function runAction(scopeType, scopeId, action){
      if (busy) return;
      busy = true;
      try {
        const payload = { scope_type: scopeType, action };
        if (scopeType !== 'all') payload.scope_id = scopeId;
        const res = await jpost(api.action, payload);
        const d = (res && res.data) ? res.data : {};
        toast(`${tr('actionDone')} ${repTpl(tr('actionSummary'), {
          total: Number(d.total || 0),
          done: Number(d.done || 0),
          queued: Number(d.queued || 0),
          skipped: Number(d.skipped || 0),
          failed: Number(d.failed || 0)
        })}`, Number(d.failed||0) > 0 ? 'error' : 'success');
        await loadOverview(false);
        const expandedLabIds = Array.from(expandedLabs.values());
        await Promise.all(expandedLabIds.map(async (lid) => {
          const rows = await ensureLabNodes(lid);
          if (Array.isArray(rows)) {
            const refresh = await jget(api.nodes(lid)).catch(() => null);
            if (refresh && Array.isArray(refresh.data)) labNodesCache.set(String(lid), refresh.data);
          }
        }));
        render();
      } catch (e) {
        toast((e && e.message) ? e.message : tr('actionFailed'));
      } finally {
        busy = false;
      }
    }

    function cardCount(){
      const users = Array.isArray(overview.users) ? overview.users : [];
      const labs = Array.isArray(overview.labs) ? overview.labs : [];
      const totalNodes = labs.reduce((acc, l) => acc + Number(l.nodes_total || 0), 0);
      const runNodes = labs.reduce((acc, l) => acc + Number(l.nodes_running || 0), 0);
      document.getElementById('cardUsers').textContent = String(users.length);
      document.getElementById('cardLabs').textContent = String(labs.length);
      document.getElementById('cardNodes').textContent = String(totalNodes);
      document.getElementById('cardRunning').textContent = String(runNodes);
    }

    function render(){
      cardCount();
      const tbody = document.getElementById('tbody');
      const users = Array.isArray(overview.users) ? overview.users : [];
      const rowClass = theme === 'light' ? 'text-slate-900 hover:bg-slate-50/70' : 'text-slate-100 hover:bg-white/5';
      const rows = [];
      const userRows = users.map((u) => ({ type: 'user', user: u, owner: { id: u.id, username: u.username } })).sort(compareRows);
      userRows.forEach((userRow) => {
        const u = userRow.user;
        const userId = String(u.id || '');
        const openUser = expandedUsers.has(userId);
        let labs = userLabs(userId).map((l) => ({ type: 'lab', lab: l, owner: u }));
        labs.sort(compareRows);
        const userDirectPass = filterPass(userRow);
        const filteredLabsMeta = labs.map((lr) => {
          const labId = String((lr.lab && lr.lab.id) || '');
          const nodesRaw = (labNodesCache.get(labId) || []);
          const nodes = nodesRaw.map((n) => ({ type: 'node', node: n, owner: u, lab: lr.lab })).sort(compareRows);
          const nodePassCount = nodes.filter(filterPass).length;
          const labPass = filterPass(lr);
          return { lr, nodes, nodePassCount, labPass };
        });
        const hasChildPass = filteredLabsMeta.some((x) => x.labPass || x.nodePassCount > 0);
        if (!(userDirectPass || hasChildPass)) return;
        rows.push(`
          <tr class="${rowClass}">
            <td class="px-3 py-2">
              <div class="inline-flex items-center gap-2">
                <button class="${btnClass('neutral', 'xs')}" data-toggle-user="${esc(userId)}">${openUser ? tr('collapse') : tr('expand')}</button>
                <strong>${esc(u.username || '-')}</strong>
                <span class="opacity-70">(${tr('role')}: ${esc(u.role || '-')}${u.is_blocked ? ', ' + tr('blocked') : ''})</span>
              </div>
            </td>
            <td class="px-3 py-2">${tr('tUser')}</td>
            <td class="px-3 py-2 text-right">${Number(u.nodes_total || 0)}</td>
            <td class="px-3 py-2 text-right">${Number(u.nodes_running || 0)}</td>
            <td class="px-3 py-2 text-right">—</td>
            <td class="px-3 py-2">${fmtTs(u.updated_at)}</td>
            <td class="px-3 py-2 text-right">
              <div class="inline-flex items-center gap-1">
                <button class="${btnClass('success', 'xs')}" data-action="start" data-scope="user" data-id="${esc(userId)}" data-label="${esc(u.username || '-')}">${tr('start')}</button>
                <button class="${btnClass('danger', 'xs')}" data-action="stop" data-scope="user" data-id="${esc(userId)}" data-label="${esc(u.username || '-')}">${tr('stop')}</button>
                <button class="${btnClass('warn', 'xs')}" data-action="wipe" data-scope="user" data-id="${esc(userId)}" data-label="${esc(u.username || '-')}">${tr('wipe')}</button>
              </div>
            </td>
          </tr>`);

        if (!openUser) return;
        filteredLabsMeta.forEach(({ lr, nodes, nodePassCount, labPass }) => {
          if (!(labPass || nodePassCount > 0)) return;
          const l = lr.lab;
          const labId = String(l.id || '');
          const openLab = expandedLabs.has(labId);
          const pending = Number(l.tasks_pending || 0);
          const running = Number(l.tasks_running || 0);
          rows.push(`
            <tr class="${rowClass}">
              <td class="px-3 py-2">
                <div class="ml-8 inline-flex items-center gap-2">
                  <button class="${btnClass('neutral', 'xs')}" data-toggle-lab="${esc(labId)}">${openLab ? tr('collapse') : tr('expand')}</button>
                  <span><i class="fa fa-flask"></i> <strong>${esc(l.name || '-')}</strong></span>
                  <span class="opacity-70">${l.is_shared ? tr('shared') : ''} ${l.collaborate_allowed ? tr('collab') : ''}</span>
                </div>
              </td>
              <td class="px-3 py-2">${tr('tLab')}</td>
              <td class="px-3 py-2 text-right">${Number(l.nodes_total || 0)}</td>
              <td class="px-3 py-2 text-right">${Number(l.nodes_running || 0)}</td>
              <td class="px-3 py-2 text-right">${tr('pending')}:${pending} / ${tr('running')}:${running}</td>
              <td class="px-3 py-2">${fmtTs(l.updated_at)}</td>
              <td class="px-3 py-2 text-right">
                <div class="inline-flex items-center gap-1">
                  <a class="${btnClass('accent', 'xs')}" href="/lab/${encodeURIComponent(labId)}">${tr('openLab')}</a>
                  <button class="${btnClass('success', 'xs')}" data-action="start" data-scope="lab" data-id="${esc(labId)}" data-label="${esc(l.name || '-')}">${tr('start')}</button>
                  <button class="${btnClass('danger', 'xs')}" data-action="stop" data-scope="lab" data-id="${esc(labId)}" data-label="${esc(l.name || '-')}">${tr('stop')}</button>
                  <button class="${btnClass('warn', 'xs')}" data-action="wipe" data-scope="lab" data-id="${esc(labId)}" data-label="${esc(l.name || '-')}">${tr('wipe')}</button>
                </div>
              </td>
            </tr>`);

          if (!openLab) return;
          nodes.forEach((nr) => {
            if (!filterPass(nr)) return;
            const n = nr.node;
            const nodeId = String(n.id || '');
            rows.push(`
              <tr class="${rowClass}">
                <td class="px-3 py-2">
                  <div class="ml-16 inline-flex items-center gap-2">
                    <i class="fa fa-circle-o"></i>
                    <span>${esc(n.name || '-')}</span>
                    <span class="opacity-70">(${esc((n.node_type || '').toUpperCase())})</span>
                    ${stateChip(n.power_state)}
                  </div>
                </td>
                <td class="px-3 py-2">${tr('tNode')}</td>
                <td class="px-3 py-2 text-right">1</td>
                <td class="px-3 py-2 text-right">${String(n.power_state || '') === 'running' ? '1' : '0'}</td>
                <td class="px-3 py-2 text-right">—</td>
                <td class="px-3 py-2">${fmtTs(n.updated_at || n.power_updated_at)}</td>
                <td class="px-3 py-2 text-right">
                  <div class="inline-flex items-center gap-1">
                    <button class="${btnClass('success', 'xs')}" data-action="start" data-scope="node" data-id="${esc(nodeId)}" data-label="${esc(n.name || '-')}">${tr('start')}</button>
                    <button class="${btnClass('danger', 'xs')}" data-action="stop" data-scope="node" data-id="${esc(nodeId)}" data-label="${esc(n.name || '-')}">${tr('stop')}</button>
                    <button class="${btnClass('warn', 'xs')}" data-action="wipe" data-scope="node" data-id="${esc(nodeId)}" data-label="${esc(n.name || '-')}">${tr('wipe')}</button>
                  </div>
                </td>
              </tr>`);
          });
        });
      });

      tbody.innerHTML = rows.join('');
      document.getElementById('empty').classList.toggle('hidden', rows.length > 0);
      syncSortMarks();
    }

      ], () => lang, async (v) => {
        lang = String(v);
        localStorage.setItem('eve_v2_lang', lang);
        applyI18n();
        await fetch(api.prefs, { method: 'PUT', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang, theme }) }).catch(() => {});
      });

      const themeRoot = document.querySelector('[data-dd="theme"]');
      repaintTheme = makeSelect(themeRoot, [
        { value: 'dark', label: tr('themeDark') },
        { value: 'light', label: tr('themeLight') }
      ], () => theme, async (v) => {
        theme = String(v);
        localStorage.setItem('eve_v2_theme', theme);
        applyTheme();
        render();
        await fetch(api.prefs, { method: 'PUT', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lang, theme }) }).catch(() => {});
      });

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        await jget(api.logout).catch(() => {});
        location.href = '/login';
      });

      applyI18n();
      if (window.initializeV2Heartbeat) {
        window.initializeV2Heartbeat({
          pingUrl: api.ping,
          intervalMs: 30000,
          onUnauthorized: () => { location.href = '/login'; }
        });
      }
    }

    function bindFilters(){
      repaintOwnerFilter = makeSelect(document.getElementById('fltOwnerWrap'), [{ value: 'all', label: tr('fltOwnerAll') }], () => filters.owner, async (v) => {
        filters.owner = String(v || 'all');
        render();
      });
      repaintStateFilter = makeSelect(document.getElementById('fltStateWrap'), [
        { value: 'all', label: tr('fltStateAll') },
        { value: 'running', label: tr('running') },
        { value: 'stopped', label: tr('fltStateStopped') },
        { value: 'starting', label: tr('starting') },
        { value: 'stopping', label: tr('stopping') },
        { value: 'error', label: tr('error') },
        { value: 'has_tasks', label: tr('fltStateHasTasks') }
      ], () => filters.state, async (v) => {
        filters.state = String(v || 'all');
        render();
      });
      repaintTypeFilter = makeSelect(document.getElementById('fltTypeWrap'), [
        { value: 'all', label: tr('fltTypeAll') },
        { value: 'user', label: tr('tUser') },
        { value: 'lab', label: tr('tLab') },
        { value: 'node', label: tr('tNode') }
      ], () => filters.type, async (v) => {
        filters.type = String(v || 'all');
        render();
      });
      const search = document.getElementById('fltSearch');
      if (search) {
        search.value = filters.search || '';
        search.addEventListener('input', () => {
          filters.search = String(search.value || '');
          render();
        });
      }
    }

    function refreshOwnerFilterOptions(){
      const users = Array.isArray(overview.users) ? overview.users : [];
      repaintOwnerFilter = makeSelect(document.getElementById('fltOwnerWrap'), [
        { value: 'all', label: tr('fltOwnerAll') },
        ...users.map((u) => ({ value: String(u.id || ''), label: String(u.username || '-') }))
      ], () => filters.owner, async (v) => {
        filters.owner = String(v || 'all');
        render();
      });
    }

    document.addEventListener('click', async (e) => {
      const sortBtn = e.target.closest('[data-sort]');
      if (sortBtn) {
        const key = String(sortBtn.getAttribute('data-sort') || '');
        if (!key) return;
        if (sortState.key === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
        else { sortState.key = key; sortState.dir = 'asc'; }
        render();
        return;
      }

      const userBtn = e.target.closest('[data-toggle-user]');
      if (userBtn) {
        const id = String(userBtn.getAttribute('data-toggle-user') || '');
        if (!id) return;
        if (expandedUsers.has(id)) expandedUsers.delete(id);
        else expandedUsers.add(id);
        render();
        return;
      }

      const labBtn = e.target.closest('[data-toggle-lab]');
      if (labBtn) {
        const id = String(labBtn.getAttribute('data-toggle-lab') || '');
        if (!id) return;
        if (expandedLabs.has(id)) {
          expandedLabs.delete(id);
          render();
          return;
        }
        expandedLabs.add(id);
        await ensureLabNodes(id);
        render();
        return;
      }

      const actionBtn = e.target.closest('[data-action][data-scope]');
      if (actionBtn) {
        const action = String(actionBtn.getAttribute('data-action') || '');
        const scope = String(actionBtn.getAttribute('data-scope') || '');
        const id = String(actionBtn.getAttribute('data-id') || '');
        const label = String(actionBtn.getAttribute('data-label') || '');
        const needsConfirm = action === 'wipe' || action === 'stop' || scope === 'all';
        if (needsConfirm) {
          const ok = await askConfirm(action, scope, label);
          if (!ok) return;
        }
        await runAction(scope, id, action);
      }
    });

    document.getElementById('btnStartAll').addEventListener('click', async () => {
      const ok = await askConfirm('start', 'all', '');
      if (!ok) return;
      await runAction('all', '', 'start');
    });
    document.getElementById('btnStopAll').addEventListener('click', async () => {
      const ok = await askConfirm('stop', 'all', '');
      if (!ok) return;
      await runAction('all', '', 'stop');
    });
    document.getElementById('btnWipeAll').addEventListener('click', async () => {
      const ok = await askConfirm('wipe', 'all', '');
      if (!ok) return;
      await runAction('all', '', 'wipe');
    });
    document.getElementById('refreshBtn').addEventListener('click', async () => loadOverview(true));

    (async () => {
      try {
        bindFilters();
        await initHeader();
        await loadOverview(true);
        refreshOwnerFilterOptions();
      } catch (e) {
        toast((e && e.message) ? e.message : tr('loadFailed'));
        setTimeout(() => { location.href = '/login'; }, 700);
      }
    })();
  </script>
</body>
</html>
