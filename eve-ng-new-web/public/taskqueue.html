    function hasPerm(code){ return !!(me && Array.isArray(me.permissions) && me.permissions.includes(code)); }
    function esc(v){
      return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }
    function byId(id){ return document.getElementById(id); }

	    async function jget(url, opts = {}) {
	      const r = await fetch(url, Object.assign({ credentials: 'include' }, opts));
	      const d = await r.json().catch(() => ({}));
	      if (!r.ok) {
	        const msg = String(d && d.message ? d.message : '');
	        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
	          throw new Error(tr('errForbiddenAction'));
	        }
	        throw new Error(msg || ('HTTP ' + r.status));
	      }
	      return d;
	    }

	    async function jpost(url, payload = null) {
	      const opts = {
	        method: 'POST',
	        credentials: 'include',
	        headers: {}
	      };
	      if (payload !== null) {
	        opts.headers['Content-Type'] = 'application/json';
	        opts.body = JSON.stringify(payload);
	      }
	      const r = await fetch(url, opts);
	      const d = await r.json().catch(() => ({}));
	      if (!r.ok) {
	        const msg = String(d && d.message ? d.message : '');
	        if (r.status === 403 || msg.toLowerCase() === 'forbidden') {
	          throw new Error(tr('errForbiddenAction'));
	        }
	        throw new Error(msg || ('HTTP ' + r.status));
	      }
	      return d;
	    }

    function formatDateTime(value) {
      if (!value) return tr('unknown');
      const dt = new Date(String(value));
      if (Number.isNaN(dt.getTime())) return String(value);
      return dt.toLocaleString(lang === 'ru' ? 'ru-RU' : 'en-US');
    }

    function formatDateTimeParts(value) {
      if (!value) return { date: tr('unknown'), time: tr('unknown') };
      const dt = new Date(String(value));
      if (Number.isNaN(dt.getTime())) {
        const raw = String(value);
        return { date: raw, time: '' };
      }
      const locale = lang === 'ru' ? 'ru-RU' : 'en-US';
      const date = new Intl.DateTimeFormat(locale, {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      }).format(dt);
      const time = new Intl.DateTimeFormat(locale, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      }).format(dt);
      return { date, time };
    }

    function renderAutoRefreshState() {
      const icon = byId('autoRefreshIcon');
      const state = byId('autoRefreshState');
      const btn = byId('autoRefreshBtn');
      if (icon) icon.className = autoRefreshEnabled ? 'fa fa-pause' : 'fa fa-play';
      if (state) state.textContent = autoRefreshEnabled ? tr('autoRefreshOn') : tr('autoRefreshOff');
      if (btn) btn.setAttribute('aria-pressed', autoRefreshEnabled ? 'true' : 'false');
    }

    function statusBadgeClass(status) {
      const s = String(status || '').toLowerCase();
      const light = {
        pending: 'border-amber-300 bg-amber-50 text-amber-700',
        running: 'border-sky-300 bg-sky-50 text-sky-700',
        done: 'border-emerald-300 bg-emerald-50 text-emerald-700',
        failed: 'border-rose-300 bg-rose-50 text-rose-700'
      };
      const dark = {
        pending: 'border-amber-400/40 bg-amber-500/10 text-amber-200',
        running: 'border-sky-400/40 bg-sky-500/10 text-sky-200',
        done: 'border-emerald-400/40 bg-emerald-500/10 text-emerald-200',
        failed: 'border-rose-400/40 bg-rose-500/10 text-rose-200'
      };
      const map = theme === 'light' ? light : dark;
      return map[s] || (theme === 'light'
        ? 'border-slate-300 bg-slate-50 text-slate-700'
        : 'border-white/20 bg-white/5 text-slate-200');
    }

    function statusText(status) {
      const s = String(status || '').toLowerCase();
      if (s === 'pending') return tr('statusPending');
      if (s === 'running') return tr('statusRunning');
      if (s === 'done') return tr('statusDone');
      if (s === 'failed') return tr('statusFailed');
      return s || tr('unknown');
    }

	    function actionText(action) {
	      const a = String(action || '').toLowerCase();
	      if (a === 'start') return tr('actionStart');
	      if (a === 'stop') return tr('actionStop');
	      return tr('actionUnknown');
	    }

	    function taskWorkerDisplay(row) {
	      const direct = String((row && row.worker_name) || '').trim();
	      if (direct !== '') {
	        return { main: direct, sub: '' };
	      }
	      const slot = Number((row && row.worker_slot) || 0);
	      const pid = Number((row && row.worker_pid) || 0);
	      const host = String((row && row.worker_host) || '').trim();
	      if (slot <= 0 && pid <= 0 && host === '') {
	        return { main: tr('unknown'), sub: '' };
	      }
	      const main = slot > 0 ? `worker-${slot}` : 'worker';
	      const subParts = [];
	      if (host !== '') subParts.push(host);
	      if (pid > 0) subParts.push(`pid:${pid}`);
	      return { main, sub: subParts.join(' • ') };
	    }

	    function taskActionCell(row) {
	      const status = String(row && row.status ? row.status : '').toLowerCase();
	      const canStop = status === 'pending' || status === 'running';
	      if (!canStop) return '<span class="opacity-60">-</span>';
	      const light = theme === 'light';
	      const stopKlass = light
	        ? 'inline-flex items-center gap-2 rounded-lg border border-rose-300 bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-700 transition duration-200 hover:bg-rose-100 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
	        : 'inline-flex items-center gap-2 rounded-lg border border-rose-400/40 bg-rose-500/10 px-3 py-1.5 text-xs font-semibold text-rose-200 transition duration-200 hover:bg-rose-500/20 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
	      return `<button type="button" class="${stopKlass}" data-task-op="stop" data-task-id="${esc(row.id)}"><i class="fa fa-stop-circle-o" aria-hidden="true"></i><span>${esc(tr('opStopTask'))}</span></button>`;
	    }

    function closeAllDropdownPanels() {
      document.querySelectorAll('.v2-dd-panel').forEach((el) => el.classList.add('hidden'));
    }

    function makeDropdown(root, options, getValue, setValue, getLabel) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');
      panel.className = 'v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl';
      root.innerHTML = '';
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-left text-sm text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-3 py-2 text-left text-sm text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        panel.className = `v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;
        const val = String(getValue());
        const active = options.find((o) => String(o.value) === val) || options[0] || { value: '', label: '' };
        const activeLabel = active.label ? active.label : tr(active.labelKey || '');
        const prefix = getLabel ? `${getLabel()}: ` : '';
        btn.innerHTML = `<span>${esc(prefix)}${esc(activeLabel)}</span><i class="fa fa-chevron-down text-xs ${isLight ? 'text-slate-500' : 'text-slate-400'}"></i>`;

        panel.innerHTML = '';
        options.forEach((opt) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = String(opt.value) === val;
          const label = opt.label ? opt.label : tr(opt.labelKey || '');
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span>${esc(label)}</span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', async () => {
            closeAllDropdownPanels();
            await setValue(String(opt.value));
            repaint();
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) panel.classList.add('hidden');
      });
      repaint();
      return repaint;
    }

    function navIcon(key) {
      const map = {
        navManagement: '<i class="fa fa-cogs" aria-hidden="true"></i>',
        navSystem: '<i class="fa fa-desktop" aria-hidden="true"></i>',

      return map[key] || '<i class="fa fa-circle-o" aria-hidden="true"></i>';

    function makeNavDropdown(root, labelKey, items) {
      if (!root) return () => {};
      root.classList.add('relative', 'min-w-0');
      const btn = document.createElement('button');
      btn.type = 'button';
      const panel = document.createElement('div');
      root.innerHTML = '';
      root.appendChild(btn);
      root.appendChild(panel);

      function repaint() {
        const isLight = theme === 'light';
        btn.className = isLight
          ? 'w-full rounded-xl border border-slate-300 bg-white px-4 py-2 text-left text-sm font-semibold text-slate-900 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between'
          : 'w-full rounded-xl border border-white/15 bg-slate-900/70 px-4 py-2 text-left text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none flex items-center justify-between';
        panel.className = `v2-dd-panel absolute z-50 mt-2 hidden w-full rounded-xl border p-1 shadow-2xl ${
          isLight ? 'border-slate-200 bg-white' : 'border-white/15 bg-slate-900/95'
        }`;
        btn.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(labelKey)}<span>${esc(tr(labelKey))}</span></span><i class="fa fa-chevron-down text-xs ${isLight ? 'text-slate-500' : 'text-slate-400'}"></i>`;

        panel.innerHTML = '';
        const current = location.pathname;
        items.forEach((it) => {
          const item = document.createElement('button');
          item.type = 'button';
          const isActive = !!it.href && current === it.href;
          item.className = `flex w-full items-center justify-between rounded-lg px-3 py-2 text-left text-sm cursor-pointer transition ${
            isLight ? 'text-slate-800 hover:bg-slate-100' : 'text-slate-100 hover:bg-white/10'
          } ${isActive ? (isLight ? 'bg-emerald-50 text-emerald-700' : 'bg-emerald-500/10 text-emerald-200') : ''}`;
          item.innerHTML = `<span class="inline-flex items-center gap-2">${navIcon(it.key)}<span>${esc(tr(it.key))}</span></span><span class="${isActive ? 'opacity-100' : 'opacity-0'} text-emerald-500"><i class="fa fa-check"></i></span>`;
          item.addEventListener('click', () => {
            closeAllDropdownPanels();
            if (it.href) {
              location.href = it.href;
              return;
            }
            toast(tr('navSoon'));
          });
          panel.appendChild(item);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const hidden = panel.classList.contains('hidden');
        closeAllDropdownPanels();
        if (hidden) panel.classList.remove('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!root.contains(e.target)) panel.classList.add('hidden');
      });
      repaint();
      return repaint;
    }

      await jget(api.prefs, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang, theme })
      });

    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key) el.textContent = tr(key);
      });
      byId('searchInput').placeholder = tr('search');
      const home = byId('navHome');
      if (home) home.querySelector('span').textContent = tr('navHome');
      const profileRole = byId('profileRole');
      if (profileRole) profileRole.textContent = me && me.role ? me.role : tr('unknown');
      const logoutBtn = byId('logoutBtn');
      if (logoutBtn) logoutBtn.textContent = tr('logout');
      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      refreshStatusDd();
      refreshLimitDd();
      renderAutoRefreshState();
      renderRows();
    }

    function applyTheme() {
      const light = theme === 'light';
      document.body.className = light
        ? 'min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300'
        : 'min-h-screen bg-slate-950 text-slate-100 transition-colors duration-300';

      const topbar = byId('topbar');
      if (topbar) {
        topbar.className = light
          ? 'relative z-40 w-full border-b border-slate-200 bg-white/90 px-4 py-4 shadow-[0_20px_60px_rgba(15,23,42,0.12)] backdrop-blur-xl transition-colors duration-300'
          : 'relative z-40 w-full border-b border-white/20 bg-slate-800/85 px-4 py-4 shadow-[0_20px_60px_rgba(2,6,23,0.6)] backdrop-blur-xl transition-colors duration-300';
      }

      const pageCard = byId('pageCard');
      pageCard.className = light
        ? 'rounded-3xl border border-slate-200 bg-white/95 p-5 shadow-2xl transition-colors duration-300'
        : 'rounded-3xl border border-white/20 bg-slate-900/65 p-5 shadow-2xl transition-colors duration-300';

      const tableWrap = byId('tableWrap');
      tableWrap.className = light
        ? 'overflow-x-auto rounded-2xl border border-slate-200'
        : 'overflow-x-auto rounded-2xl border border-white/15';

      const thead = byId('thead');
      thead.className = light ? 'sticky top-0 z-10 bg-slate-50/95' : 'sticky top-0 z-10 bg-slate-900/95';

      const refreshBtn = byId('refreshBtn');
      refreshBtn.className = light
        ? 'inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
        : 'inline-flex items-center gap-2 rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      const autoRefreshBtn = byId('autoRefreshBtn');
      if (autoRefreshBtn) {
        autoRefreshBtn.className = light
          ? 'inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'inline-flex items-center gap-2 rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }

      const searchInput = byId('searchInput');
      searchInput.className = light
        ? 'w-full rounded-xl border border-slate-300 bg-white px-10 py-2 text-sm text-slate-900 outline-none transition focus:border-emerald-300'
        : 'w-full rounded-xl border border-white/20 bg-slate-950/40 px-10 py-2 text-sm text-slate-100 outline-none transition focus:border-emerald-400/60';

      const profileBtn = byId('profileBtn');
      if (profileBtn) {
        profileBtn.className = light
          ? 'rounded-2xl border border-slate-300 bg-white px-4 py-2 text-left transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'rounded-2xl border border-white/20 bg-slate-900/50 px-4 py-2 text-left transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }
      const logoutBtn = byId('logoutBtn');
      if (logoutBtn) {
        logoutBtn.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 shadow-sm transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 shadow-sm transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none';
      }
      const navHome = byId('navHome');
      if (navHome) {
        navHome.className = light
          ? 'rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 transition duration-200 hover:bg-slate-50 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2'
          : 'rounded-xl border border-white/20 bg-slate-900/50 px-4 py-2 text-sm font-semibold text-slate-100 transition duration-200 hover:bg-white/10 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer focus:outline-none inline-flex items-center gap-2';
      }

      refreshLangDd();
      refreshThemeDd();
      refreshNavManagement();
      refreshNavSystem();
      refreshStatusDd();
      refreshLimitDd();
      renderAutoRefreshState();
      renderRows();
    }

    function renderProfileCard() {
      byId('profileName').textContent = me && me.username ? me.username : 'user';
      byId('profileRole').textContent = me && me.role ? me.role : tr('unknown');
    }

    function renderRows() {
      const q = String(byId('searchInput').value || '').trim().toLowerCase();
	      const filtered = rows.filter((row) => {
	        if (!q) return true;
	        const blob = [
	          row.id, row.lab_name, row.node_name, row.requested_by, row.error_text, row.worker_name, row.worker_host
	        ].map((x) => String(x || '').toLowerCase()).join(' ');
	        return blob.includes(q);
	      });

      const bodyClass = theme === 'light'
        ? 'border-t border-slate-200 text-slate-800'
        : 'border-t border-white/10 text-slate-100';
      const rowHover = theme === 'light' ? 'hover:bg-slate-50/70' : 'hover:bg-white/5';

	      byId('tbody').innerHTML = filtered.map((row) => {
        const error = String(row.error_text || '').trim();
        const requestedBy = String(row.requested_by || '');
        const createdAt = formatDateTimeParts(row.created_at);
        const worker = taskWorkerDisplay(row);
        return `
          <tr class="${bodyClass} ${rowHover}">
            <td class="px-3 py-2 align-top whitespace-nowrap">
              <div class="font-semibold">${esc(createdAt.date)}</div>
              <div class="text-xs opacity-75">${esc(createdAt.time)}</div>
            </td>
            <td class="px-3 py-2 align-top whitespace-nowrap">
              <span class="inline-flex rounded-xl border px-2 py-1 text-xs font-semibold ${statusBadgeClass(row.status)}">${esc(statusText(row.status))}</span>
            </td>
            <td class="px-3 py-2 align-top whitespace-nowrap">${esc(actionText(row.action))}</td>
            <td class="px-3 py-2 align-top">
              <div class="font-semibold">${esc(row.lab_name || tr('unknown'))}</div>
            </td>
            <td class="px-3 py-2 align-top">
              <div>${esc(row.node_name || tr('unknown'))}</div>
            </td>
	            <td class="px-3 py-2 align-top">${esc(requestedBy || tr('unknown'))}</td>
	            <td class="px-3 py-2 text-center align-top">${Number(row.attempts || 0)}</td>
	            <td class="px-3 py-2 align-top">
	              <div>${esc(worker.main)}</div>
	              ${worker.sub ? `<div class="text-xs opacity-75">${esc(worker.sub)}</div>` : ''}
	            </td>
	            <td class="px-3 py-2 align-top whitespace-nowrap">${taskActionCell(row)}</td>
	            <td class="px-3 py-2 align-top">${esc(error || '')}</td>
	          </tr>`;
	      }).join('');

      byId('emptyState').classList.toggle('hidden', filtered.length > 0);
    }

    async function loadTasks(showToastOnError = true) {
      const params = new URLSearchParams();
      params.set('limit', String(limitFilter));
      if (statusFilter !== 'all') {
        params.set('status', statusFilter);
      }
      try {
        const res = await jget(`${api.tasks}?${params.toString()}`);
        rows = Array.isArray(res && res.data) ? res.data : [];
        byId('lastUpdateValue').textContent = formatDateTime(new Date().toISOString());
        renderRows();
      } catch (e) {
        if (showToastOnError) {
          toast((e && e.message) ? e.message : tr('errLoad'));
        }
      }
    }

	    byId('searchInput').addEventListener('input', () => renderRows());
	    byId('tbody').addEventListener('click', async (e) => {
	      const btn = e.target.closest('button[data-task-op][data-task-id]');
	      if (!btn) return;
	      const taskId = String(btn.getAttribute('data-task-id') || '').trim();
	      const op = String(btn.getAttribute('data-task-op') || '').trim();
	      if (!taskId || !op) return;
	      btn.disabled = true;
	      btn.classList.add('opacity-60', 'cursor-not-allowed');
	      try {
	        const res = await jpost(`${api.tasks}/${encodeURIComponent(taskId)}/${encodeURIComponent(op)}`);
	        if (op === 'stop' || op === 'cancel') {
	          toast(tr('taskStopped'), 'success');
	        } else {
	          toast(String(res && res.message ? res.message : tr('refresh')), 'success');
	        }
	        await loadTasks(false);
	      } catch (err) {
	        toast((err && err.message) ? err.message : tr('errTaskAction'));
	      } finally {
	        btn.disabled = false;
	        btn.classList.remove('opacity-60', 'cursor-not-allowed');
	      }
	    });
	    byId('refreshBtn').addEventListener('click', async () => {
	      await loadTasks(true);
	      toast(tr('refresh'), 'success');
	    });
    byId('autoRefreshBtn').addEventListener('click', () => {
      autoRefreshEnabled = !autoRefreshEnabled;
      localStorage.setItem('eve_v2_task_queue_auto_refresh', autoRefreshEnabled ? '1' : '0');
      renderAutoRefreshState();
    });
    byId('logoutBtn').addEventListener('click', async () => {
      try {
        await jget(api.logout);
        location.href = '/login';
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
      }
    });
    byId('profileBtn').addEventListener('click', () => {
      if (hasPerm('page.management.usermgmt.view')) {
        location.href = '/usermgmt';
      } else if (hasPerm('page.management.roles.view')) {
        location.href = '/roles';
      } else {
        location.href = '/main';
      }
    });

    (async () => {
      try {
        const auth = await jget(api.auth);
        me = auth.data || null;
        lang = (me && me.lang) || lang;
        theme = (me && me.theme) || theme;
        localStorage.setItem('eve_v2_lang', lang);
        localStorage.setItem('eve_v2_theme', theme);

        refreshLangDd = makeDropdown(
          document.querySelector('[data-dd="lang"]'),
          langOptions,
          () => lang,
          async (v) => {
            lang = v;
            localStorage.setItem('eve_v2_lang', v);
            applyI18n();
            await persistPrefs();
          },
          null
        );
        refreshThemeDd = makeDropdown(
          document.querySelector('[data-dd="theme"]'),
          themeOptions,
          () => theme,
          async (v) => {
            theme = v;
            localStorage.setItem('eve_v2_theme', v);
            applyTheme();
            await persistPrefs();
          },
          null
        );
        refreshNavManagement = makeNavDropdown(
          document.getElementById('navManagement'),
          'navManagement',
          [
            { key: 'navLabs', href: '/labmgmt' },
            { key: 'navUsers', href: '/usermgmt' },
            { key: 'navClouds', href: '/cloudmgmt' },
            { key: 'navRoles', href: '/roles' }
          ]
        );
        refreshNavSystem = makeNavDropdown(
          document.getElementById('navSystem'),
          'navSystem',
          [
            { key: 'navSysStatus', href: '/system-status' },
            { key: 'navTaskQueue', href: '/taskqueue' },
            { key: 'navSysLogs', href: '/system-logs' }
          ]
        );
        refreshStatusDd = makeDropdown(
          document.querySelector('[data-dd="status"]'),
          statusOptions,
          () => statusFilter,
          async (v) => {
            statusFilter = v;
            await loadTasks(false);
          },
          () => tr('status')
        );
        refreshLimitDd = makeDropdown(
          document.querySelector('[data-dd="limit"]'),
          limitOptions,
          () => limitFilter,
          async (v) => {
            limitFilter = v;
            await loadTasks(false);
          },
          () => tr('limit')
        );

        renderProfileCard();
        applyI18n();
        applyTheme();
        await loadTasks(false);

	        if (pollTimer) window.clearInterval(pollTimer);
	        pollTimer = window.setInterval(async () => {
          if (!autoRefreshEnabled) return;
          if (document.visibilityState === 'hidden') return;
	          await loadTasks(false);
	        }, autoRefreshIntervalMs);

        if (window.startV2Heartbeat) {
          window.startV2Heartbeat({
            pingUrl: api.ping,
            intervalMs: 30000,
            onUnauthorized: () => { location.href = '/login'; }
          });
        }
      } catch (e) {
        toast((e && e.message) ? e.message : tr('errAuth'));
        setTimeout(() => { location.href = '/login'; }, 900);
      }
    })();
  </script>
</body>
</html>
